<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lengkapi Profil · 20fit</title>
<style>
  :root{--red:#e11d2a;--bg:#0a0a0a;--card:#141414;--line:#262626;--txt:#f5f5f5;--muted:#8a8a8a;--inp:#1c1c1c}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px 26px}
  .logo{display:flex;align-items:center;gap:2px;font-weight:900;font-size:24px;margin-bottom:14px}
  .logo .dot{width:16px;height:16px;border-radius:50%;background:var(--red);margin:0 1px}
  h2{margin:0 0 4px;font-size:20px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  input,select{width:100%;padding:13px 14px;background:var(--inp);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px}
  input:focus,select:focus{outline:none;border-color:var(--red)}
  .row{display:flex;gap:12px}.row>div{flex:1}
  .gender{display:flex;gap:10px}
  .gender button{flex:1;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--inp);cursor:pointer;font-weight:700;color:var(--muted)}
  .gender button.active{border-color:var(--red);background:rgba(225,29,42,.12);color:#fff}
  .btn{width:100%;margin-top:24px;padding:14px;border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .btn:disabled{opacity:.55}
  .msg{margin-top:12px;font-size:13px;min-height:18px;text-align:center;color:#ff6b6b}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">20<span class="dot"></span>FIT</div>
    <h2>Sedikit lagi 🙌</h2>
    <div class="sub">Lengkapi data ini biar profil kamu pas.</div>

    <label>Jenis Kelamin</label>
    <div class="gender">
      <button type="button" data-g="male" onclick="pickGender('male')">Pria</button>
      <button type="button" data-g="female" onclick="pickGender('female')">Wanita</button>
    </div>

    <label>Tanggal Lahir</label>
    <input id="birthdate" type="date" max="2026-06-27" />

    <div class="row">
      <div><label>Berat (kg)</label><input id="weight" type="number" inputmode="decimal" placeholder="65" min="20" max="400" /></div>
      <div><label>Tinggi (cm)</label><input id="height" type="number" inputmode="decimal" placeholder="170" min="80" max="250" /></div>
    </div>

    <button class="btn" id="save" onclick="save()">Simpan & Lanjut</button>
    <div class="msg" id="msg"></div>
  </div>
  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    let gender=null;
    (async function(){await Auth.requireAuth()})();
    function pickGender(g){gender=g;document.querySelectorAll(".gender button").forEach(b=>b.classList.toggle("active",b.dataset.g===g))}
    async function save(){
      const birthdate=document.getElementById("birthdate").value;
      const weight=parseFloat(document.getElementById("weight").value);
      const height=parseFloat(document.getElementById("height").value);
      const msg=document.getElementById("msg");
      if(!gender)return msg.textContent="Pilih jenis kelamin dulu.";
      if(!birthdate)return msg.textContent="Isi tanggal lahir.";
      if(!weight)return msg.textContent="Isi berat badan.";
      if(!height)return msg.textContent="Isi tinggi badan.";
      const btn=document.getElementById("save");btn.disabled=true;
      try{
        await Auth.saveOnboarding({gender,birthdate,weight_kg:weight,height_cm:height});
        Auth.go("dashboard.html");
      }catch(e){msg.textContent=e.message;btn.disabled=false}
    }
  </script>
</body>
</html>
