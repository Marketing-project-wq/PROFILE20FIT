<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lengkapi Profil · 20fit</title>
<style>
  :root { --green:#1db954; --dark:#0e1b13; --muted:#6b7c70; --line:#e3eae5; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#f4f8f5; color:var(--dark); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; width:100%; max-width:400px; border-radius:20px; padding:28px 24px;
          box-shadow:0 10px 40px rgba(0,0,0,.06); }
  h2 { margin:0 0 4px; font-size:20px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
  input, select { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:11px; font-size:15px; background:#fff; }
  input:focus, select:focus { outline:none; border-color:var(--green); }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  .gender { display:flex; gap:10px; }
  .gender button { flex:1; padding:12px; border:1px solid var(--line); border-radius:11px; background:#fff; cursor:pointer; font-weight:600; color:var(--muted); }
  .gender button.active { border-color:var(--green); background:#eafaf0; color:var(--green); }
  .btn { width:100%; margin-top:22px; padding:14px; border:0; border-radius:12px; background:var(--green); color:#fff; font-weight:700; font-size:15px; cursor:pointer; }
  .msg { margin-top:12px; font-size:13px; min-height:18px; color:#d63031; text-align:center; }
</style>
</head>
<body>
  <div class="card">
    <h2>Sedikit lagi 🙌</h2>
    <div class="sub">Lengkapi data ini biar profil kamu pas.</div>

    <label>Jenis Kelamin</label>
    <div class="gender">
      <button type="button" data-g="male" onclick="pickGender('male')">Pria</button>
      <button type="button" data-g="female" onclick="pickGender('female')">Wanita</button>
    </div>

    <label for="birthdate">Tanggal Lahir</label>
    <input id="birthdate" type="date" max="2026-06-26" />

    <div class="row">
      <div>
        <label for="weight">Berat (kg)</label>
        <input id="weight" type="number" inputmode="decimal" placeholder="cth: 65" min="20" max="400" />
      </div>
      <div>
        <label for="height">Tinggi (cm)</label>
        <input id="height" type="number" inputmode="decimal" placeholder="cth: 170" min="80" max="250" />
      </div>
    </div>

    <button class="btn" id="save" onclick="save()">Simpan & Lanjut</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    let gender = null;
    (async function () { await Auth.requireAuth(); })();
    function pickGender(g) {
      gender = g;
      document.querySelectorAll(".gender button").forEach((b) =>
        b.classList.toggle("active", b.dataset.g === g)
      );
    }
    async function save() {
      const birthdate = document.getElementById("birthdate").value;
      const weight = parseFloat(document.getElementById("weight").value);
      const height = parseFloat(document.getElementById("height").value);
      const msg = document.getElementById("msg");
      if (!gender) return (msg.textContent = "Pilih jenis kelamin dulu.");
      if (!birthdate) return (msg.textContent = "Isi tanggal lahir.");
      if (!weight) return (msg.textContent = "Isi berat badan.");
      if (!height) return (msg.textContent = "Isi tinggi badan.");
      const btn = document.getElementById("save");
      btn.disabled = true;
      try {
        await Auth.saveOnboarding({
          gender,
          birthdate,
          weight_kg: weight,
          height_cm: height,
        });
        Auth.go("dashboard.html");
      } catch (e) {
        msg.textContent = e.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
