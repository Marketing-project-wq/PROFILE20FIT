<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lengkapi Profil · 20FIT</title>
<style>
  :root{--red:#C41101;--bg:#F3F2F0;--card:#FFFFFF;--line:#ECE8E1;--txt:#1A1714;--muted:#8C8578;--inp:#F3F2F0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
  .card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 24px}
  .logo{display:flex;align-items:center;margin-bottom:14px}
  .logo img{height:48px;width:auto}
  h2{margin:0 0 4px;font-size:20px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  input{width:100%;padding:13px 14px;background:var(--inp);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px}
  input:focus{outline:none;border-color:var(--red)}
  .row{display:flex;gap:12px}.row>div{flex:1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt{padding:13px;border:1px solid var(--line);border-radius:10px;background:var(--inp);cursor:pointer;font-weight:700;color:var(--muted);text-align:center;font-size:14px}
  .opt.active{border-color:var(--red);background:rgba(225,29,42,.12);color:#fff}
  .chk{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--inp);cursor:pointer;font-size:14px;color:var(--txt)}
  .chk.active{border-color:var(--red);background:rgba(225,29,42,.10)}
  .chk input{width:auto}
  .bmi{margin-top:14px;border-radius:12px;padding:14px;display:none;border:1px solid}
  .bmi .num{font-size:30px;font-weight:900;line-height:1}
  .bmi .lab{font-weight:700;margin-top:2px}
  .bmi .d{font-size:12px;color:var(--muted);margin-top:4px}
  .btn{width:100%;margin-top:24px;padding:14px;border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .btn:disabled{opacity:.55}
  .msg{margin-top:12px;font-size:13px;min-height:18px;text-align:center;color:#ff6b6b}
  .sec{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red);font-weight:700;margin:22px 0 2px}
</style>
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<link rel="stylesheet" href="css/20fit-design-system.css">
<link rel="stylesheet" href="css/glass-app.css">
</head>
<body>
  <div class="card">
    <div class="logo"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20FIT" /></div>
    <h2>Lengkapi Profil</h2>
    <div class="sub">Data ini bikin rekomendasi kamu makin pas.</div>
    <div id="obStatus" style="display:none;align-items:center;gap:9px;padding:11px 13px;border-radius:12px;margin:2px 0 14px;font-size:13.5px;font-weight:700"></div>

    <div id="genderBlock">
    <label>Jenis Kelamin</label>
    <div class="grid2">
      <div class="opt" data-g="male" onclick="pickGender('male')">Pria</div>
      <div class="opt" data-g="female" onclick="pickGender('female')">Wanita</div>
    </div>
    </div>

    <div id="dobBlock">
    <label>Tanggal Lahir</label>
    <input id="birthdate" type="date" max="2026-06-27" />
    </div>

    <div class="row">
      <div><label>Berat (kg)</label><input id="weight" type="number" inputmode="decimal" placeholder="65" min="30" max="200" oninput="updateBmi()" /></div>
      <div><label>Tinggi (cm)</label><input id="height" type="number" inputmode="decimal" placeholder="170" min="100" max="250" oninput="updateBmi()" /></div>
    </div>

    <!-- Preview BMI live -->
    <div class="bmi" id="bmiCard">
      <div class="num" id="bmiNum">–</div>
      <div class="lab" id="bmiLab"></div>
      <div class="d" id="bmiDesc"></div>
    </div>

    <div class="sec">Tujuan Utama Kamu</div>
    <label style="margin-top:8px">Mau capai apa?</label>
    <div class="grid2">
      <div class="opt" data-goal="lose" onclick="pickGoal('lose')">Turunkan Berat</div>
      <div class="opt" data-goal="muscle" onclick="pickGoal('muscle')">Bangun Otot</div>
      <div class="opt" data-goal="health" onclick="pickGoal('health')">Lebih Sehat</div>
      <div class="opt" data-goal="fit" onclick="pickGoal('fit')">Tingkatkan Kebugaran</div>
    </div>

    <div class="sec">Kondisi Kesehatan</div>
    <label style="margin-top:8px">Ada yang perlu kami tahu? (boleh lebih dari satu / kosong)</label>
    <div class="grid2" id="conditions">
      <label class="chk"><input type="checkbox" value="Hipertensi"> Hipertensi</label>
      <label class="chk"><input type="checkbox" value="Diabetes"> Diabetes</label>
      <label class="chk"><input type="checkbox" value="Kolesterol"> Kolesterol</label>
      <label class="chk"><input type="checkbox" value="Jantung"> Jantung</label>
      <label class="chk"><input type="checkbox" value="Asma"> Asma</label>
      <label class="chk"><input type="checkbox" value="Cedera"> Cedera</label>
    </div>
    <label>Lainnya (opsional)</label>
    <input id="condOther" type="text" placeholder="cth: alergi tertentu" />

    <button class="btn" id="save" onclick="save()">Simpan & Lanjut</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="js/vendor-supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let gender=null, goal=null, knownIdentity=false;
    (async function(){
      try{ var _bd=document.getElementById("birthdate"); if(_bd) _bd.max=new Date().toISOString().slice(0,10); }catch(e){}
      await Auth.requireAuth();
      try{ const p=await Auth.getProfile(); if(p){ prefill(p); showObStatus(p); } }catch(e){}
    })();
    // Keterangan status onboarding user (sudah / belum) di halaman ini juga.
    function showObStatus(p){
      var el=document.getElementById("obStatus"); if(!el) return;
      var done=!!(p && p.onboarding_completed && p.weight_kg && p.gender);
      el.style.display="flex";
      el.style.background=done?"rgba(42,122,79,.10)":"rgba(196,17,1,.08)";
      el.style.color=done?"#2A7A4F":"#C41101";
      el.style.border="1px solid "+(done?"rgba(42,122,79,.35)":"rgba(196,17,1,.30)");
      el.textContent=done?"✅ Kamu sudah onboarding — data di bawah bisa kamu perbarui.":"⚠️ Kamu belum onboarding — lengkapi data di bawah lalu simpan.";
    }
    function prefill(p){
      if(p.gender) pickGender(p.gender);
      if(p.main_goal) pickGoal(p.main_goal);
      if(p.weight_kg) document.getElementById("weight").value=p.weight_kg;
      if(p.height_cm) document.getElementById("height").value=p.height_cm;
      // Kalau gender & umur SUDAH ada (mis. akun 20FIT) -> nggak usah tanya jenis kelamin & tgl lahir lagi.
      if(p.gender && p.age){
        knownIdentity=true;
        const gb=document.getElementById("genderBlock"); if(gb) gb.style.display="none";
        const db=document.getElementById("dobBlock"); if(db) db.style.display="none";
      }
      updateBmi();
    }

    function pickGender(g){gender=g;document.querySelectorAll('[data-g]').forEach(b=>b.classList.toggle("active",b.dataset.g===g))}
    function pickGoal(g){goal=g;document.querySelectorAll('[data-goal]').forEach(b=>b.classList.toggle("active",b.dataset.goal===g))}

    // chk active styling
    document.querySelectorAll('#conditions .chk').forEach(l=>{
      l.querySelector('input').addEventListener('change',e=>l.classList.toggle('active',e.target.checked));
    });

    function updateBmi(){
      const w=parseFloat(document.getElementById("weight").value);
      const h=parseFloat(document.getElementById("height").value);
      const info=Auth.bmiInfo(w,h);
      const card=document.getElementById("bmiCard");
      if(!info){card.style.display="none";return}
      card.style.display="block";
      card.style.borderColor=info.color;
      card.style.background=info.color+"1a";
      const num=document.getElementById("bmiNum");
      num.textContent="BMI "+info.bmi; num.style.color=info.color;
      const lab=document.getElementById("bmiLab"); lab.textContent=info.label; lab.style.color=info.color;
      document.getElementById("bmiDesc").textContent=info.desc;
    }

    async function save(){
      const birthdate=document.getElementById("birthdate").value;
      const weight=parseFloat(document.getElementById("weight").value);
      const height=parseFloat(document.getElementById("height").value);
      const msg=document.getElementById("msg");
      if(!knownIdentity && !gender)return msg.textContent="Pilih jenis kelamin dulu.";
      if(!knownIdentity && !birthdate)return msg.textContent="Isi tanggal lahir.";
      if(!weight)return msg.textContent="Isi berat badan.";
      if(!height)return msg.textContent="Isi tinggi badan.";
      if(!goal)return msg.textContent="Pilih tujuan utama kamu.";
      // kumpulkan kondisi kesehatan
      const conds=[...document.querySelectorAll('#conditions input:checked')].map(i=>i.value);
      const other=document.getElementById("condOther").value.trim();
      if(other)conds.push(other);
      const btn=document.getElementById("save");btn.disabled=true;
      try{
        await Auth.saveOnboarding({gender,birthdate,weight_kg:weight,height_cm:height,main_goal:goal,health_conditions:conds});
        await Auth.routeAfterAuth();   // data lengkap -> buat password kalau belum ada, lalu dashboard
      }catch(e){msg.textContent=e.message;btn.disabled=false}
    }
  </script>
</body>
</html>
