# Gerbang keamanan CI: memblokir merge kalau ada token/API key ter-commit.
# Bagian dari aturan workflow di docs/GIT_WORKFLOW.md.
name: CI — Secret Scan & Checks

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Scan secret (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download gitleaks
        run: |
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      # Scan isi working tree (bukan riwayat lama — riwayat lama sudah diketahui
      # bocor dan ditangani terpisah via rotasi token + pembersihan riwayat,
      # lihat docs/GITHUB_SECRETS.md).
      - name: Scan working tree
        run: ./gitleaks dir . --config .gitleaks.toml --redact --verbose

  syntax-check:
    name: Cek sintaks server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check
        run: |
          node --check server.js
          node --check sw.js
          for f in js/*.js; do
            case "$f" in js/vendor-*) continue ;; esac
            node --check "$f"
          done
