<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reset Password · 20fit</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--red:#C41101;--bg:#EDE8DF;--card:#fff;--dark:#0A0908;--txt:#0A0908;--muted:#9E8E7A;--border:#E8E2DB;--inp:#F0EDE5}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:Manrope,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px 26px}
  .logo{display:inline-block;background:var(--dark);padding:9px 13px;border-radius:10px}
  .logo img{height:30px;display:block}
  h2{font-family:Anton;font-size:24px;margin:14px 0 4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  input{width:100%;padding:13px 14px;background:var(--inp);border:1px solid var(--border);border-radius:11px;font-size:15px;color:var(--txt)}
  input:focus{outline:none;border-color:var(--red)}
  .otp{text-align:center;letter-spacing:8px;font-size:22px}
  .btn{width:100%;margin-top:20px;padding:14px;border:0;border-radius:12px;background:var(--red);color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 14px rgba(196,17,1,.25)}
  .btn:disabled{opacity:.6}
  .msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px}
  .msg.err{color:var(--red)}.msg.ok{color:#2A7A4F}
  .link{margin-top:16px;text-align:center;font-size:13px}.link a{color:var(--red);text-decoration:none;font-weight:600}
  .hide{display:none}
  .dev{margin-top:12px;font-size:12px;color:#b07a00;background:#fff6e0;border:1px solid #efe0b0;border-radius:8px;padding:8px;display:none}
</style>
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<link rel="stylesheet" href="20fit-design-system.css">
<link rel="stylesheet" href="glass-app.css">
</head>
<body>
  <div class="card">
    <div class="logo"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit"></div>
    <h2 id="title">Lupa Password</h2>
    <div class="sub" id="sub">Masukkan email kamu, kami kirim kode verifikasi.</div>

    <!-- Step 1: minta kode -->
    <div id="step1">
      <label>Email</label>
      <input id="email" type="email" placeholder="nama@email.com" autocomplete="email" />
      <button class="btn" id="btn1" onclick="sendCode()">Kirim Kode</button>
    </div>

    <!-- Step 2: kode + password baru -->
    <div id="step2" class="hide">
      <label>Kode dari Email</label>
      <input id="code" class="otp" inputmode="numeric" maxlength="6" placeholder="------" />
      <label>Password Baru (min 8 karakter)</label>
      <div style="position:relative">
        <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" style="padding-right:74px" />
        <button type="button" id="togglePw" onclick="togglePw()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--red);font-size:12px;font-weight:700;cursor:pointer">Lihat</button>
      </div>
      <button class="btn" id="btn2" onclick="resetPw()">Simpan Password Baru</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="dev" id="dev"></div>
    <div class="link"><a href="login.html">← Kembali ke Masuk</a></div>
  </div>

  <script>
    const SUPABASE_URL = "https://cpvzwqptzcxnwzfzgrmt.supabase.co";
    const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnp3cXB0emN4bnd6Znpncm10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzE0MzksImV4cCI6MjA5MTIwNzQzOX0.DIP-tTFxa3GHMhT6b1Tq-Zz0a24P-vbU9ixEtITbqpI";
    const FN = SUPABASE_URL + "/functions/v1/my20fit-otp";
    let theEmail = "";
    function msg(t,type){const e=document.getElementById("msg");e.textContent=t||"";e.className="msg"+(type?" "+type:"")}
    function togglePw(){const i=document.getElementById("password");const b=document.getElementById("togglePw");if(i.type==="password"){i.type="text";b.textContent="Sembunyikan";}else{i.type="password";b.textContent="Lihat";}}
    async function call(body){
      const r = await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},body:JSON.stringify(body)});
      let j={}; try{ j=await r.json(); }catch(e){}
      if(!r.ok) throw new Error(j.error||("Gagal ("+r.status+")"));
      return j;
    }
    async function sendCode(){
      const email=document.getElementById("email").value.trim();
      if(!email)return msg("Isi email dulu.","err");
      const b=document.getElementById("btn1");b.disabled=true;msg("Mengirim kode...","");
      try{
        const r=await call({action:"send",email,purpose:"reset"});
        theEmail=email;
        document.getElementById("step1").classList.add("hide");
        document.getElementById("step2").classList.remove("hide");
        document.getElementById("title").textContent="Masukkan Kode";
        document.getElementById("sub").textContent="Kode dikirim ke "+email+". Cek email kamu.";
        msg(r.sent?"Kode terkirim! Cek email.":"Kode dibuat.","ok");
        if(r.devCode){const d=document.getElementById("dev");d.style.display="block";d.textContent="MODE TES — kode: "+r.devCode;}
      }catch(e){msg(e.message,"err");b.disabled=false}
    }
    async function resetPw(){
      const code=document.getElementById("code").value.trim();
      const password=document.getElementById("password").value;
      if(!code)return msg("Isi kode dari email.","err");
      if(password.length<8)return msg("Password minimal 8 karakter.","err");
      const b=document.getElementById("btn2");b.disabled=true;msg("Menyimpan...","");
      try{
        await call({action:"reset",email:theEmail,code,password});
        msg("Password berhasil diubah! Mengarahkan ke Masuk...","ok");
        setTimeout(()=>location.href="login.html",1500);
      }catch(e){msg(e.message,"err");b.disabled=false}
    }
  </script>
</body>
</html>
