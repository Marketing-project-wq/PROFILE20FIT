<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Progress · 20fit</title>
<style>
  :root{--red:#e11d2a;--bg:#0a0a0a;--card:#141414;--line:#262626;--txt:#f5f5f5;--muted:#8a8a8a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .box{text-align:center;max-width:380px}
  .logo img{height:42px;margin-bottom:24px}
  .ic{width:84px;height:84px;border-radius:24px;background:rgba(225,29,42,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .ic svg{width:40px;height:40px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;animation:rise 2s ease-in-out infinite}
  @keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  h1{font-size:26px;font-weight:900;margin:0 0 10px;text-transform:uppercase}
  p{color:var(--muted);font-size:15px;line-height:1.6}
  .badge{display:inline-block;margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;color:var(--red)}
</style>
</head>
<body>
  <div class="box">
    <div class="logo"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit" /></div>
    <div class="ic"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
    <h1>Progress</h1>
    <p>Statistik mingguan, achievement, dan kalender latihan kamu lagi disiapin di sini.</p>
    <div class="badge">🚧 Segera Hadir</div>
  </div>
  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script>(async function(){try{await Auth.requireAuth()}catch(e){}})();</script>
</body>
</html>
