<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Progress · 20FIT</title>
<style>
  :root{--red:#C41101;--bg:#0b0b0c;--card:#FFFFFF;--line:#E8E2DB;--txt:#0A0908;--muted:#9a907f;--inp:#F4F1EC;--dark:#000000;--pagetx:#EDE8DF;--pagemut:#9a907f}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--pagetx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:0 0 90px}
  .wrap{max-width:920px;margin:0 auto;padding:18px 16px}
  .top{background:var(--dark);border-radius:0 0 18px 18px;padding:16px 18px;display:flex;align-items:center;justify-content:center;margin:0 -16px 4px}
  .top img{height:38px}
  .hk{color:var(--red);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin:16px 2px 0}
  .hello{font-size:28px;font-weight:900;margin:2px 2px 6px;text-transform:uppercase;letter-spacing:-.5px}
  .sec{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--pagemut);font-weight:700;margin:22px 2px 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(10,9,8,.04);color:var(--txt)}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .stat .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .stat .v{font-size:26px;font-weight:900;margin-top:6px;font-family:'JetBrains Mono',monospace}
  .stat .v small{font-size:12px;color:var(--muted);font-weight:600;font-family:inherit}
  .muted{color:var(--muted);font-size:13px}
  /* streak */
  .streak{display:flex;align-items:center;gap:16px}
  .streak .fire{font-size:40px;line-height:1}
  .streak .big{font-size:34px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1}
  .cbar{height:9px;background:var(--inp);border-radius:6px;overflow:hidden;margin-top:8px}
  .cbar i{display:block;height:100%;background:linear-gradient(90deg,#ff7a45,#C41101);border-radius:6px}
  /* bar chart */
  .chrow{display:flex;align-items:center;gap:10px;margin:9px 0}
  .chrow .lbl{width:34px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;flex:0 0 auto;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
  .chtrack{flex:1;height:20px;background:var(--inp);border-radius:6px;overflow:hidden;min-width:0}
  .chtrack i{display:block;height:100%;border-radius:6px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .chrow .val{width:64px;text-align:right;font-size:12px;font-weight:700;flex:0 0 auto;font-family:'JetBrains Mono',monospace}
  .chgoal{font-size:11px;color:var(--muted);margin-top:2px}
  /* weight */
  .wlog{display:flex;gap:8px;margin-top:12px}
  .wlog input{flex:1;min-width:0;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--inp);color:var(--txt);font-size:15px;font-family:inherit;text-align:center}
  .wlog button{flex:0 0 auto;background:var(--red);color:#fff;border:0;border-radius:10px;padding:0 18px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
  .cycrec{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  @media(max-width:480px){ .cycrec{grid-template-columns:1fr} }
  .cyccol{background:var(--inp);border-radius:12px;padding:10px 12px}
  .cyclbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  .cyccol ul{margin:0;padding-left:16px}
  .cyccol li{font-size:12.5px;line-height:1.5;margin-bottom:4px}
  .bkrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
  .bkrow:first-of-type{border-top:0}
  .bkdate{flex:0 0 auto;width:46px;text-align:center;background:var(--red);color:#fff;border-radius:10px;padding:6px 0}
  .bkdate .bkd{font-size:18px;font-weight:900;line-height:1}
  .bkdate .bkm{font-size:10px;font-weight:700;text-transform:uppercase}
  .bkinfo{min-width:0}.bkinfo .bkt{font-weight:800;font-size:14px}
  .wrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .wrow:last-child{border-bottom:0}
  .wrow .kg{font-weight:800;font-family:'JetBrains Mono',monospace}
  .delta{font-size:12px;font-weight:800;padding:2px 8px;border-radius:20px}
  /* achievements */
  .achg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ach{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--inp)}
  .ach.on{background:rgba(42,122,79,.10);border-color:rgba(42,122,79,.35)}
  .ach.off{opacity:.5}
  .ach .em{font-size:22px;flex:0 0 auto}
  .ach .t{font-size:12px;font-weight:800;line-height:1.25}
  .ach .s{font-size:10px;color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:22px 8px;font-size:14px}
  @media(min-width:900px){ .main2{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;align-items:start} }
  @media(max-width:560px){ .wrap{padding:16px 12px} .card{padding:14px} .achg{grid-template-columns:1fr} .hello{font-size:24px} }
</style>
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<link rel="stylesheet" href="20fit-design-system.css">
<link rel="stylesheet" href="glass-app.css">
</head>
<body>
  <div class="wrap">
    <div class="hk" id="hk">Your journey</div>
    <div class="hello" id="hello">Progress</div>
    <div id="content"><div class="card"><div class="muted" id="loading">Loading…</div></div></div>
  </div>

  <div class="toast" id="toast" style="position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:12px 18px;border-radius:12px;font-weight:700;font-size:14px;opacity:0;transition:all .4s;z-index:9;pointer-events:none"></div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="achievements.js"></script>
  <script src="cycle.js"></script>
  <script src="nav.js"></script>
  <script>
    let user=null, profile=null, days=[], weights=[], arenaData=null;
    const WD_EN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], WD_ID=["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
    function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
    function lastNDates(n){const out=[];const base=new Date();for(let i=n-1;i>=0;i--){const d=new Date(base);d.setDate(base.getDate()-i);out.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));}return out;}
    // Minggu berjalan MULAI SENIN (Mon..Sun)
    function currentWeekDates(){
      const base=new Date();base.setHours(0,0,0,0);
      const dow=base.getDay();               // 0=Min..6=Sab
      const offset=(dow===0?6:dow-1);        // jarak hari ke Senin
      const mon=new Date(base);mon.setDate(base.getDate()-offset);
      const out=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);out.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));}
      return out;
    }
    function wdLabel(ds){const d=new Date(ds+"T00:00:00");return (I18N.lang==="id"?WD_ID:WD_EN)[d.getDay()];}
    function readCal(d){try{const it=JSON.parse(localStorage.getItem("my20fit_cal_"+d)||"[]");return it.reduce((s,i)=>s+(+i.kcal||0),0);}catch(e){return 0;}}
    function readWeights(){try{return JSON.parse(localStorage.getItem("my20fit_weight")||"[]");}catch(e){return [];}}
    function calGoal(p){const w=+p.weight_kg,h=+p.height_cm,age=+p.age||25;if(!w||!h)return 2000;const bmr=10*w+6.25*h-5*age+((p.gender==="female")?-161:5);const af={sedentary:1.2,light:1.375,moderate:1.55,active:1.725}[p.activity_level]||1.375;let t=bmr*af;const g=p.main_goal;t+=(g==="lose"?-400:g==="muscle"?300:g==="fit"?100:0);return Math.max(1200,Math.round(t/10)*10);}
    function calcMacros(p,goal){const w=+p.weight_kg||0,g=p.main_goal;const proteinG=w?Math.round(w*(g==="muscle"?1.8:g==="lose"?1.6:1.4)):Math.round(goal*0.25/4);const fatG=Math.round(goal*0.25/9);let carbsG=Math.round((goal-proteinG*4-fatG*9)/4);if(carbsG<0)carbsG=Math.round(goal*0.45/4);return {p:proteinG,c:carbsG,f:fatG};}
    function toast(t){const el=document.getElementById("toast");el.textContent=t;el.style.opacity=1;el.style.transform="translateX(-50%) translateY(0)";setTimeout(()=>{el.style.opacity=0;el.style.transform="translateX(-50%) translateY(20px)";},2600);}

    function barChart(title,rows,goal,unit,color,goalTxt){
      const max=Math.max(goal||0,...rows.map(r=>r.v),1);
      const bars=rows.map(r=>{const pct=Math.max(r.v>0?6:0,Math.min(100,r.v/max*100));
        return '<div class="chrow"><span class="lbl">'+r.l+'</span><div class="chtrack"><i style="width:'+pct+'%;background:'+(r.v>0?color:"transparent")+'"></i></div><span class="val">'+(r.v>0?r.disp:'–')+'</span></div>';}).join("");
      return '<div class="card"><div style="font-weight:800;margin-bottom:4px">'+title+'</div>'+(goalTxt?'<div class="chgoal">'+goalTxt+'</div>':'')+bars+'</div>';
    }

    // ---- Overall: apakah kebutuhan harian user (dari data mereka) sudah terpenuhi ----
    function metricRow(label,cur,tgt,unit,met,curDisp){
      const pct=tgt?Math.min(100,Math.round(cur/tgt*100)):0;
      return '<div style="margin:12px 0 0"><div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700">'+
        '<span>'+(met?'✅':'⬜')+' '+label+'</span>'+
        '<span style="font-family:JetBrains Mono,monospace;color:'+(met?'#2A7A4F':'var(--muted)')+'">'+(curDisp!=null?curDisp:cur)+' / '+tgt+' '+unit+'</span></div>'+
        '<div class="chtrack" style="height:9px;margin-top:5px"><i style="width:'+pct+'%;background:'+(met?'#2A7A4F':'#C87000')+'"></i></div></div>';
    }
    function overallCard(){
      const head='<div class="sec">'+L({en:"Overall · Today",id:"Overall · Hari Ini"})+'</div>';
      if(!profile||!profile.weight_kg||!profile.height_cm){
        return head+'<a class="card" href="onboarding.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--txt);border-color:rgba(196,17,1,.35);background:rgba(196,17,1,.06)"><div style="flex:1"><div style="font-weight:800">'+L({en:"Complete your profile first",id:"Lengkapi profil dulu"})+'</div><div class="muted" style="font-size:12px">'+L({en:"Add weight, height & goal so we can calculate what your body needs.",id:"Isi berat, tinggi & tujuan biar kami bisa hitung kebutuhan tubuhmu."})+'</div></div><span style="color:var(--pagemut);font-weight:800">›</span></a>';
      }
      const tday=todayStr();
      const todayLog=(days.find(d=>d.date===tday)||{}).log;
      let items=[]; if(todayLog&&Array.isArray(todayLog.cal_items))items=todayLog.cal_items; else { try{items=JSON.parse(localStorage.getItem("my20fit_cal_"+tday)||"[]");}catch(e){} }
      const eaten=items.reduce((s,i)=>s+(+i.kcal||0),0);
      const pE=items.reduce((s,i)=>s+(+i.p||0),0), cE=items.reduce((s,i)=>s+(+i.c||0),0), fE=items.reduce((s,i)=>s+(+i.f||0),0);
      const water=todayLog?+todayLog.water_glasses||0:0, sleep=todayLog?+todayLog.sleep_hours||0:0;
      const goal=calGoal(profile), mac=calcMacros(profile,goal);
      const M=[
        {l:L({en:"Calories",id:"Kalori"}),      cur:eaten, tgt:goal,  u:L({en:"kcal",id:"kkal"}), met:eaten>=goal*0.85},
        {l:L({en:"Protein",id:"Protein"}),      cur:Math.round(pE), tgt:mac.p, u:"g", met:pE>=mac.p*0.9},
        {l:L({en:"Carbs",id:"Karbo"}),          cur:Math.round(cE), tgt:mac.c, u:"g", met:cE>=mac.c*0.9},
        {l:L({en:"Fat",id:"Lemak"}),            cur:Math.round(fE), tgt:mac.f, u:"g", met:fE>=mac.f*0.9},
        {l:L({en:"Water",id:"Air"}),            cur:water, tgt:8, u:L({en:"gl",id:"gls"}), met:water>=8},
        {l:L({en:"Sleep",id:"Tidur"}),          cur:sleep, tgt:8, u:L({en:"h",id:"jam"}), met:sleep>=7, disp:(sleep?sleep.toFixed(1):0)}
      ];
      const metN=M.filter(m=>m.met).length, score=Math.round(metN/M.length*100);
      const col=score>=70?"#2A7A4F":score>=40?"#C87000":"#C41101";
      const rows=M.map(m=>metricRow(m.l,m.cur,m.tgt,m.u,m.met,m.disp)).join("");
      return head+'<div class="card"><div style="display:flex;align-items:center;gap:16px">'+
        '<div style="font-size:36px;font-weight:900;font-family:JetBrains Mono,monospace;color:'+col+';line-height:1">'+score+'%</div>'+
        '<div style="flex:1"><div style="font-weight:800">'+metN+' / '+M.length+' '+L({en:"needs met today",id:"kebutuhan terpenuhi hari ini"})+'</div>'+
        '<div class="cbar" style="margin-top:6px"><i style="width:'+score+'%;background:'+col+'"></i></div></div></div>'+
        rows+
        '<div class="muted" style="font-size:11px;margin-top:12px">'+L({en:"Targets from your BMI, weight & goal. Log meals, water & sleep to complete them.",id:"Target dari BMI, berat & tujuanmu. Catat makan, air & tidur untuk memenuhinya."})+'</div></div>';
    }

    // ---- Siklus menstruasi (khusus female) ----
    function cycleCard(){
      if(!profile || String(profile.gender||"").toLowerCase()!=="female") return "";
      const head='<div class="sec">'+L({en:"Menstrual Cycle",id:"Siklus Menstruasi"})+'</div>';
      const last=profile.cycle_last_period;
      const dateInput='<div class="wlog"><input id="periodIn" type="date" value="'+(last||"")+'" max="'+todayStr()+'" /><button onclick="savePeriod()">'+L({en:"Save",id:"Simpan"})+'</button></div>';
      if(!last){
        return head+'<div class="card"><div style="font-weight:800">'+L({en:"Track your cycle 🌸",id:"Lacak siklusmu 🌸"})+'</div>'+
          '<div class="muted" style="font-size:12px;margin:4px 0 2px">'+L({en:"When did your last period start? We’ll show your phase & tips.",id:"Kapan menstruasi terakhir kamu mulai? Kami tampilkan fase & sarannya."})+'</div>'+dateInput+'</div>';
      }
      const ci=window.Cycle?Cycle.info(last,profile.cycle_length,profile.period_length):null;
      if(!ci) return head+'<div class="card">'+dateInput+'</div>';
      const m=ci.meta;
      const doList=m.doTips.map(t=>'<li>'+L(t)+'</li>').join('');
      const eatList=m.eatTips.map(t=>'<li>'+L(t)+'</li>').join('');
      return head+'<div class="card">'+
        '<div style="display:flex;align-items:center;gap:14px">'+
          '<div style="width:34px;height:34px;border-radius:50%;flex:0 0 auto;background:'+m.color+';box-shadow:0 0 0 5px color-mix(in srgb,'+m.color+' 20%,transparent)"></div>'+
          '<div style="flex:1"><div style="font-weight:800;font-size:16px;color:'+m.color+'">'+L(m.name)+'</div>'+
          '<div class="muted" style="font-size:12.5px">'+L({en:"Day",id:"Hari ke-"})+' '+ci.day+' · '+L({en:"next period ~"+ci.daysToNext+" days",id:"menstruasi berikutnya ~"+ci.daysToNext+" hari"})+'</div></div>'+
        '</div>'+
        '<div style="margin-top:10px;font-size:13px;line-height:1.5">'+L(m.summary)+'</div>'+
        '<div class="cycrec"><div class="cyccol"><div class="cyclbl">🏃 '+L({en:"Do",id:"Lakukan"})+'</div><ul>'+doList+'</ul></div>'+
        '<div class="cyccol"><div class="cyclbl">🥗 '+L({en:"Eat",id:"Makan"})+'</div><ul>'+eatList+'</ul></div></div>'+
        '<div class="muted" style="font-size:11.5px;margin-top:12px">'+L({en:"Started your period? Update the date:",id:"Menstruasi mulai? Perbarui tanggalnya:"})+'</div>'+dateInput+'</div>';
    }
    async function savePeriod(){
      const v=document.getElementById("periodIn").value;
      if(!v){toast(L({en:"Pick a date",id:"Pilih tanggal"}));return;}
      try{await Auth.supabase.from("my20fit_profile").update({cycle_last_period:v,updated_at:new Date().toISOString()}).eq("auth_user_id",user.id);profile.cycle_last_period=v;}catch(e){}
      toast(L({en:"Cycle updated 🌸",id:"Siklus diperbarui 🌸"}));
      render();
    }

    // ---- Kalender booking 20FIT (hanya muncul kalau ada booking) ----
    // bookings diisi dari ekosistem 20FIT (butuh token/API 20FIT). Kosong -> kartu tidak muncul.
    let bookings=[];
    function calendarCard(){
      if(!bookings || !bookings.length) return "";
      const head='<div class="sec">'+L({en:"Your 20FIT Bookings",id:"Booking 20FIT Kamu"})+'</div>';
      const rows=bookings.slice().sort((a,b)=>String(a.date+a.time)<String(b.date+b.time)?-1:1).map(function(b){
        return '<div class="bkrow"><div class="bkdate"><div class="bkd">'+(b.day||"")+'</div><div class="bkm">'+(b.mon||"")+'</div></div>'+
          '<div class="bkinfo"><div class="bkt">'+(b.title||L({en:"Booking",id:"Booking"}))+'</div>'+
          '<div class="muted" style="font-size:12px">'+[b.time,b.location,b.coach].filter(Boolean).join(" · ")+'</div></div></div>';
      }).join("");
      return head+'<div class="card"><div style="font-weight:800;margin-bottom:8px">'+L({en:"Upcoming",id:"Akan Datang"})+'</div>'+rows+'</div>';
    }

    function render(){
      const c=document.getElementById("content");
      document.getElementById("hk").textContent=L({en:"Your journey",id:"Perjalananmu"});
      document.getElementById("hello").textContent=L({en:"Progress",id:"Progress"});
      if(!days.length){ c.innerHTML=overallCard()+cycleCard()+calendarCard()+'<div class="card" style="margin-top:14px"><div class="empty">'+L({en:"Start tracking your water, sleep & meals — your weekly progress will appear here.",id:"Mulai catat air, tidur & makananmu — progres mingguanmu akan muncul di sini."})+'</div></div>'+'<div id="arenaHist"></div>'; renderArena(); return; }

      // ---- summary ----
      const tracked=days.filter(d=>d.log&&(d.log.water_glasses>0||d.log.sleep_hours>0||d.cal>0)).length;
      const sleepVals=days.filter(d=>d.log&&d.log.sleep_hours>0).map(d=>+d.log.sleep_hours);
      const avgSleep=sleepVals.length?(sleepVals.reduce((a,b)=>a+b,0)/sleepVals.length):0;
      const waterVals=days.filter(d=>d.log&&d.log.water_glasses>0).map(d=>+d.log.water_glasses);
      const avgWater=waterVals.length?(waterVals.reduce((a,b)=>a+b,0)/waterVals.length):0;
      // streak (dari hari ini mundur)
      let streak=0; for(let i=days.length-1;i>=0;i--){const d=days[i];if(d.log&&(d.log.water_glasses>0||d.log.sleep_hours>0||d.cal>0))streak++;else break;}
      const consist=Math.round(tracked/days.length*100);

      const summary='<div class="grid3">'+
        '<div class="card stat"><div class="k">'+L({en:"Days tracked",id:"Hari tercatat"})+'</div><div class="v">'+tracked+'<small>/7</small></div></div>'+
        '<div class="card stat"><div class="k">'+L({en:"Avg sleep",id:"Rata2 tidur"})+'</div><div class="v">'+(avgSleep?avgSleep.toFixed(1):'–')+'<small>'+(avgSleep?'h':'')+'</small></div></div>'+
        '<div class="card stat"><div class="k">'+L({en:"Avg water",id:"Rata2 air"})+'</div><div class="v">'+(avgWater?avgWater.toFixed(1):'–')+'<small>'+(avgWater?L({en:"gl",id:"gls"}):'')+'</small></div></div>'+
        '</div>';

      const streakCard='<div class="sec">'+L({en:"Consistency",id:"Konsistensi"})+'</div>'+
        '<div class="card streak"><div class="fire">🔥</div><div style="flex:1"><div class="big">'+streak+' <span style="font-size:15px;font-weight:700;font-family:inherit;color:var(--muted)">'+L({en:streak===1?"day streak":"day streak",id:"hari beruntun"})+'</span></div>'+
        '<div class="muted" style="font-size:12px;margin-top:2px">'+L({en:"Weekly consistency",id:"Konsistensi mingguan"})+': '+consist+'%</div><div class="cbar"><i style="width:'+consist+'%"></i></div></div></div>';

      // ---- charts ----
      const goal=calGoal(profile);
      const waterChart=barChart(L({en:"💧 Water this week",id:"💧 Air minggu ini"}),
        days.map(d=>({l:wdLabel(d.date),v:d.log?+d.log.water_glasses||0:0,disp:(d.log?+d.log.water_glasses||0:0)+''})),8,"gl","#3b82f6",L({en:"Target 8 glasses/day",id:"Target 8 gelas/hari"}));
      const sleepChart=barChart(L({en:"😴 Sleep this week",id:"😴 Tidur minggu ini"}),
        days.map(d=>({l:wdLabel(d.date),v:d.log?+d.log.sleep_hours||0:0,disp:(d.log&&d.log.sleep_hours?(+d.log.sleep_hours).toFixed(1)+'h':'0')})),8,"h","#7c5cff",L({en:"Target 7–8 hours/night",id:"Target 7–8 jam/malam"}));
      const calChart=barChart(L({en:"🔥 Calories this week",id:"🔥 Kalori minggu ini"}),
        days.map(d=>({l:wdLabel(d.date),v:d.cal||0,disp:(d.cal||0)+''})),goal,"kcal","#C41101",L({en:"Daily target ≈ "+goal+" kcal",id:"Target harian ≈ "+goal+" kkal"})+' · '+L({en:"synced to your account",id:"tersinkron ke akunmu"}));

      const charts='<div class="sec">'+L({en:"This Week",id:"Minggu Ini"})+'</div><div class="main2"><div>'+waterChart+'<div style="height:14px"></div>'+sleepChart+'</div><div>'+calChart+'</div></div>';

      // ---- weight ----
      let wRows='';
      if(weights.length){
        const sorted=[...weights].sort((a,b)=>a.d<b.d?1:-1).slice(0,6);
        wRows=sorted.map((w,i)=>{const prev=sorted[i+1];let dl='';
          if(prev){const diff=+(w.kg-prev.kg).toFixed(1);const down=diff<0;dl='<span class="delta" style="background:'+(down?"rgba(42,122,79,.15);color:#2A7A4F":diff>0?"rgba(196,17,1,.12);color:#C41101":"rgba(154,144,127,.15);color:#9a907f")+'">'+(diff>0?'+':'')+diff+' kg</span>';}
          return '<div class="wrow"><span class="muted">'+w.d+'</span><span><span class="kg">'+w.kg+'</span> kg '+dl+'</span></div>';}).join("");
      } else { wRows='<div class="muted" style="padding:6px 0">'+L({en:"No entries yet. Log your weight to see your trend.",id:"Belum ada catatan. Catat beratmu untuk lihat tren."})+'</div>'; }
      const firstW=weights.length?[...weights].sort((a,b)=>a.d<b.d?-1:1)[0]:null;
      const lastW=weights.length?[...weights].sort((a,b)=>a.d<b.d?1:-1)[0]:null;
      let totalDelta='';
      if(firstW&&lastW&&firstW.d!==lastW.d){const dt=+(lastW.kg-firstW.kg).toFixed(1);totalDelta='<div class="muted" style="margin-top:6px;font-size:12px">'+L({en:"Since you started: ",id:"Sejak mulai: "})+'<b style="color:'+(dt<0?"#2A7A4F":dt>0?"#C41101":"#9a907f")+'">'+(dt>0?'+':'')+dt+' kg</b></div>';}
      const weightCard='<div class="sec">'+L({en:"Weight",id:"Berat Badan"})+'</div>'+
        '<div class="card"><div style="font-weight:800">'+L({en:"Track your weight",id:"Catat berat badanmu"})+'</div>'+
        '<div class="muted" style="font-size:12px">'+L({en:"Add today\'s weight to build your trend.",id:"Tambahkan berat hari ini untuk bikin tren."})+'</div>'+
        '<div class="wlog"><input id="wIn" type="number" inputmode="decimal" step="0.1" placeholder="'+(profile.weight_kg||"kg")+'" /><button onclick="logWeight()">'+L({en:"Save",id:"Simpan"})+'</button></div>'+
        totalDelta+'<div style="margin-top:12px">'+wRows+'</div></div>';

      // ---- achievements ----
      const stats=Ach.buildStats(days,{hasFasting:!!localStorage.getItem("my20fit_if"),hasMcu:!!profile._hasMcu});
      const earnedIds=Ach.earned(stats);
      const achCard='<div class="sec">'+L({en:"Achievements",id:"Pencapaian"})+'</div><div class="card"><div class="achg">'+
        Ach.DEFS.map(a=>{const on=earnedIds.indexOf(a.id)>-1;return '<div class="ach '+(on?"on":"off")+'"><div class="em">'+(on?a.em:"🔒")+'</div><div><div class="t">'+L(a.t)+'</div><div class="s">'+L(a.s)+'</div></div></div>';}).join("")+'</div></div>';

      // ---- medical summary ----
      let medCard='';
      if(profile._mcu){const res=profile._mcu;const att=(res.abnormal_findings||[]).length;
        medCard='<div class="sec">'+L({en:"Health Check-up",id:"Medical Check-up"})+'</div>'+
          '<a class="card" href="medical.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--txt)"><div class="em" style="width:40px;height:40px;border-radius:11px;background:'+(att?"rgba(196,17,1,.1)":"rgba(42,122,79,.12)")+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:20px">'+(att?"⚠️":"✓")+'</div>'+
          '<div style="flex:1"><div style="font-weight:800">'+(att?L({en:att+" thing(s) to watch",id:att+" hal perlu diperhatikan"}):L({en:"Latest MCU: all normal",id:"MCU terakhir: semua normal"}))+'</div><div class="muted" style="font-size:12px">'+L({en:"Tap to view full results",id:"Ketuk untuk lihat hasil lengkap"})+'</div></div><span style="color:var(--pagemut);font-weight:800">›</span></a>';
      }

      c.innerHTML=overallCard()+cycleCard()+calendarCard()+summary+streakCard+charts+weightCard+achCard+medCard+'<div id="arenaHist"></div>';
      renderArena();
    }

    // ---- History 20FIT / Riwayat 20FIT (20FIT Arena: kelas, paket, venue) ----
    function arRupiah(n){ return "Rp "+(+n||0).toLocaleString("id-ID"); }
    function arDate(s){ if(!s)return"—"; try{ const d=new Date(String(s).length<=10?s+"T00:00:00":s); return d.toLocaleDateString(I18N.lang==="id"?"id-ID":"en-GB",{day:"2-digit",month:"short",year:"numeric"}); }catch(e){ return s; } }
    function arTime(t){ return t?String(t).slice(0,5):""; }
    function arBadge(s){
      const map={confirmed:["#2A7A4F","rgba(42,122,79,.14)"],pending_payment:["#C87000","rgba(200,112,0,.14)"],cancelled:["#C41101","rgba(196,17,1,.12)"]};
      const c=map[s]||["#9a907f","rgba(154,144,127,.15)"];
      const lbl={confirmed:L({en:"Confirmed",id:"Terkonfirmasi"}),pending_payment:L({en:"Pending",id:"Menunggu"}),cancelled:L({en:"Cancelled",id:"Batal"})}[s]||s||"—";
      return '<span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;color:'+c[0]+';background:'+c[1]+'">'+lbl+'</span>';
    }
    function renderArena(){
      const box=document.getElementById("arenaHist"); if(!box) return;
      const head='<div class="sec">'+L({en:"History 20FIT",id:"Riwayat 20FIT"})+'</div>';
      if(arenaData===null){ box.innerHTML=head+'<div class="card"><div class="muted" style="font-size:13px">'+L({en:"Loading your 20FIT Arena history…",id:"Memuat riwayat 20FIT Arena kamu…"})+'</div></div>'; return; }
      if(arenaData.error){
        const noPhone=arenaData.error==="no_phone";
        box.innerHTML=head+'<div class="card"><div class="muted" style="font-size:13px">'+
          (noPhone?L({en:"Add your phone number in your profile to see your class, package & venue history.",id:"Isi nomor HP di profil untuk melihat riwayat kelas, paket & venue kamu."})
                  :L({en:"Couldn't load your 20FIT history right now.",id:"Belum bisa memuat riwayat 20FIT kamu sekarang."}))+'</div></div>';
        return;
      }
      const bk=arenaData.bookings||[], pk=arenaData.packages||[], vn=arenaData.venue||[];
      if(!bk.length && !pk.length && !vn.length){
        box.innerHTML=head+'<div class="card"><div class="empty">'+L({en:"No 20FIT Arena activity yet. Book a class at booking.20fit.id and it will appear here.",id:"Belum ada aktivitas 20FIT Arena. Booking kelas di booking.20fit.id dan riwayatnya muncul di sini."})+'</div></div>';
        return;
      }
      let html=head;
      if(bk.length){
        html+='<div class="card"><div style="font-weight:800;margin-bottom:6px">'+L({en:"Class bookings",id:"Booking Kelas"})+'</div>'+
          bk.map(b=>{ const sc=b.arena_class_schedules||{}, ct=sc.arena_class_types||{}, color=ct.color||"#C41101";
            return '<div style="display:flex;gap:11px;padding:10px 0;border-top:1px solid var(--line,#eee)">'+
              '<span style="width:10px;height:10px;border-radius:3px;margin-top:5px;flex:0 0 auto;background:'+color+'"></span>'+
              '<div style="flex:1;min-width:0"><div style="font-weight:800;font-size:14px">'+(ct.name||L({en:"Class",id:"Kelas"}))+'</div>'+
                '<div class="muted" style="font-size:12px">'+arDate(sc.schedule_date)+(sc.start_time?' · '+arTime(sc.start_time)+(sc.end_time?'–'+arTime(sc.end_time):''):'')+(sc.instructor?' · '+sc.instructor:'')+'</div></div>'+
              '<div style="text-align:right;flex:0 0 auto">'+arBadge(b.status)+'<div class="muted" style="font-size:12px;margin-top:3px">'+arRupiah(b.price)+'</div></div>'+
            '</div>';
          }).join("")+'</div>';
      }
      if(pk.length){
        html+='<div class="card"><div style="font-weight:800;margin-bottom:6px">'+L({en:"Session packages",id:"Paket Sesi"})+'</div>'+
          pk.map(p=>{ const v=(p.arena_package_vouchers||[])[0]||null, used=v?v.used_sessions:0, tot=v?v.total_sessions:p.sessions;
            return '<div style="padding:10px 0;border-top:1px solid var(--line,#eee)">'+
              '<div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div style="font-weight:800;font-size:14px">'+(p.package_name||L({en:"Package",id:"Paket"}))+'</div>'+arBadge(p.status)+'</div>'+
              '<div class="muted" style="font-size:12px;margin-top:2px">'+arRupiah(p.price)+(v?' · '+L({en:"used",id:"terpakai"})+' '+used+'/'+tot+(v.is_active?'':' · '+L({en:"inactive",id:"nonaktif"})):'')+'</div>'+
            '</div>';
          }).join("")+'</div>';
      }
      if(vn.length){
        html+='<div class="card"><div style="font-weight:800;margin-bottom:6px">'+L({en:"Venue bookings",id:"Booking Venue"})+'</div>'+
          vn.map(b=>'<div style="display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid var(--line,#eee)">'+
              '<div><div style="font-weight:800;font-size:14px">'+arDate(b.booking_date)+'</div>'+
                '<div class="muted" style="font-size:12px">'+arTime(b.start_time)+(b.end_time?'–'+arTime(b.end_time):'')+' · '+(b.customer_type==="corporation"?L({en:"Corporate",id:"Korporasi"}):L({en:"Individual",id:"Individu"}))+'</div></div>'+
              '<div style="text-align:right">'+arBadge(b.status)+'<div class="muted" style="font-size:12px;margin-top:3px">'+arRupiah(b.price)+'</div></div>'+
            '</div>').join("")+'</div>';
      }
      box.innerHTML=html;
    }
    async function loadArena(){
      try{
        const tk=await Auth.token(); if(!tk){ arenaData={error:"unauth"}; renderArena(); return; }
        const r=await fetch("/api/arena/history",{headers:{Authorization:"Bearer "+tk}});
        const j=await r.json().catch(()=>({}));
        arenaData = r.ok ? j : {error:(j.error||"failed")};
      }catch(e){ arenaData={error:"failed"}; }
      renderArena();
    }

    async function logWeight(){
      const v=parseFloat(document.getElementById("wIn").value);
      if(!v||v<20||v>400){toast(L({en:"Enter a valid weight",id:"Masukkan berat yang valid"}));return;}
      const d=todayStr(); const kg=+v.toFixed(1);
      weights=weights.filter(w=>w.d!==d); weights.push({d:d,kg:kg});
      try{localStorage.setItem("my20fit_weight",JSON.stringify(weights));}catch(e){}
      try{await Auth.saveDaily({weight_kg:kg});}catch(e){}                       // riwayat per hari di DB
      try{await Auth.supabase.from("my20fit_profile").update({weight_kg:kg,updated_at:new Date().toISOString()}).eq("auth_user_id",user.id);profile.weight_kg=kg;}catch(e){}
      toast(L({en:"Weight saved 💪",id:"Berat tersimpan 💪"}));
      render();
    }

    (async function(){
      try{ user=await Auth.requireAuth(); }catch(e){ return; }
      try{ profile=await Auth.getProfile(); }catch(e){ profile={}; }
      const dates=currentWeekDates();
      let logMap={};
      try{ const {data}=await Auth.supabase.from("my20fit_daily_log").select("*").eq("auth_user_id",user.id).gte("log_date",dates[0]).order("log_date"); (data||[]).forEach(r=>logMap[r.log_date]=r); }catch(e){}
      days=dates.map(d=>{const r=logMap[d]||null;const cal=(r&&Array.isArray(r.cal_items))?r.cal_items.reduce((s,i)=>s+(+i.kcal||0),0):readCal(d);return {date:d,log:r,cal:cal};});
      // Riwayat berat dari DB (lintas-device), fallback ke localStorage
      try{ const {data}=await Auth.supabase.from("my20fit_daily_log").select("log_date,weight_kg").eq("auth_user_id",user.id).not("weight_kg","is",null).order("log_date",{ascending:false}).limit(30); weights=(data||[]).map(r=>({d:r.log_date,kg:+r.weight_kg})); }catch(e){ weights=readWeights(); }
      if(!weights.length && profile.weight_kg){ weights=[{d:todayStr(),kg:+profile.weight_kg}]; }
      // MCU terakhir untuk achievement + kartu medical
      try{ const {data}=await Auth.supabase.from("my20fit_mcu_result").select("result").eq("auth_user_id",user.id).order("created_at",{ascending:false}).limit(1); if(data&&data[0]){profile._hasMcu=true;profile._mcu=data[0].result;} }catch(e){}
      render();
      loadArena();   // tarik riwayat 20FIT Arena (async, isi section History 20FIT)
      if(window.Ach)Ach.check({days:days,hasFasting:!!localStorage.getItem("my20fit_if"),hasMcu:!!profile._hasMcu});
      if(window.I18N&&I18N.onChange)I18N.onChange(render);
    })();
  </script>
</body>
</html>
