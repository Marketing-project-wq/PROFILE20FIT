<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Progress · 20fit</title>
<style>
  :root{--red:#e11d2a;--bg:#0a0a0a;--card:#141414;--line:#262626;--txt:#f5f5f5;--muted:#8a8a8a;--inp:#1c1c1c}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:22px 18px 70px}
  .wrap{max-width:640px;margin:0 auto}
  .logo img{height:38px;margin-bottom:16px}
  h1{font-size:24px;font-weight:900;margin:0 0 16px;text-transform:uppercase}
  .sec{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:20px 2px 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
  .dark{background:var(--dark,#000);border:1px solid var(--line)}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat .k{color:var(--muted);font-size:11px;text-transform:uppercase}
  .stat .v{font-size:30px;font-weight:900;margin-top:4px}
  .big{font-size:44px;font-weight:900;color:var(--red);line-height:1}
  .week{display:flex;gap:6px;margin-top:14px}
  .week .d{flex:1;text-align:center}
  .week .bar{height:60px;background:var(--inp);border-radius:6px;display:flex;align-items:flex-end;overflow:hidden}
  .week .bar i{display:block;width:100%;background:var(--red);border-radius:6px}
  .week .lbl{font-size:10px;color:var(--muted);margin-top:4px}
  .ach{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .ach:last-child{border-bottom:0}
  .ach .em{width:38px;height:38px;border-radius:10px;background:rgba(225,29,42,.12);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .ach .em svg{width:20px;height:20px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .ach .nm{font-weight:700;font-size:14px}.ach .ds{font-size:12px;color:var(--muted)}
  .ach .pts{margin-left:auto;font-weight:800;color:var(--red);font-size:13px}
  .off{opacity:.35}
  .muted{color:var(--muted);font-size:13px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit" /></div>
    <h1>Progress</h1>

    <div class="card dark">
      <div class="muted">Minggu Ini</div>
      <div class="big" id="weekPct">0%</div>
      <div class="muted" id="weekSub">hari aktif</div>
      <div class="week" id="week"></div>
    </div>

    <div class="sec">Statistik</div>
    <div class="grid3">
      <div class="card stat"><div class="k">BMI</div><div class="v" id="bmi">–</div></div>
      <div class="card stat"><div class="k">Berat</div><div class="v" id="berat">–</div></div>
      <div class="card stat"><div class="k">Hari Aktif</div><div class="v" id="activeDays">0</div></div>
    </div>

    <div class="sec">Achievement Hari Ini</div>
    <div class="card" id="ach"></div>
  </div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script>
    function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
    (async function(){
      const user=await Auth.requireAuth();
      const p=await Auth.getProfile();
      const info=Auth.bmiInfo(p.weight_kg,p.height_cm);
      if(info){const b=document.getElementById("bmi");b.textContent=info.bmi;b.style.color=info.color}
      if(p.weight_kg)document.getElementById("berat").innerHTML=p.weight_kg+' <span style="font-size:13px;color:#8a8a8a">kg</span>';
      // ambil 7 hari terakhir daily_log
      const since=new Date(Date.now()-6*864e5).toISOString().slice(0,10);
      let logs=[];
      try{const {data}=await Auth.supabase.from("my20fit_daily_log").select("*").eq("auth_user_id",user.id).gte("log_date",since);logs=data||[]}catch(e){}
      // bangun 7 hari
      const days=["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
      let html="",activeCount=0;
      for(let i=6;i>=0;i--){
        const dt=new Date(Date.now()-i*864e5);const ds=dt.toISOString().slice(0,10);
        const log=logs.find(l=>l.log_date===ds);
        let score=0;
        if(log){ if((log.water_glasses||0)>=8)score++; if((log.sleep_hours||0)>=7)score++; if(log.breathing_done)score++; }
        if(score>0)activeCount++;
        const h=Math.round((score/3)*100);
        html+=`<div class="d"><div class="bar"><i style="height:${h}%"></i></div><div class="lbl">${days[dt.getDay()]}</div></div>`;
      }
      document.getElementById("week").innerHTML=html;
      document.getElementById("weekPct").textContent=Math.round(activeCount/7*100)+"%";
      document.getElementById("weekSub").textContent=activeCount+" dari 7 hari aktif";
      document.getElementById("activeDays").textContent=activeCount;
      // achievement hari ini
      const t=logs.find(l=>l.log_date===todayStr())||{};
      const I={
        drop:'<svg viewBox="0 0 24 24"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>',
        moon:'<svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>',
        wind:'<svg viewBox="0 0 24 24"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>'
      };
      const ach=[
        {em:I.drop,nm:"Hydration Hero",ds:"Minum 8 gelas air",pts:50,done:(t.water_glasses||0)>=8},
        {em:I.moon,nm:"Sleep Champion",ds:"Tidur 7+ jam",pts:50,done:(t.sleep_hours||0)>=7},
        {em:I.wind,nm:"Calm Mind",ds:"Selesai latihan napas",pts:40,done:!!t.breathing_done},
      ];
      document.getElementById("ach").innerHTML=ach.map(a=>
        `<div class="ach ${a.done?"":"off"}"><div class="em">${a.em}</div><div><div class="nm">${a.nm}</div><div class="ds">${a.ds}</div></div><div class="pts">${a.done?"+"+a.pts:"+0"}</div></div>`
      ).join("");
    })();
  </script>
</body>
</html>
