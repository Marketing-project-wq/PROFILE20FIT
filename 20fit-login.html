document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ant;box-shadow:0 0 0 3px rgba(196,17,1,0.1)!important}\n\n/* ── LAYOUT ── */\n.root{display:flex;min-height:100vh}\n.panel-l{width:50%;min-height:100vh;background:#FFFFFF;border-right:1px solid #EBEBEB;display:flex;flex-direction:column;padding:48px 52px;position:relative;overflow:hidden;flex-shrink:0}\n.panel-r{flex:1;background:#F7F7F7;display:flex;align-items:center;justify-content:center;padding:48px 40px;overflow-y:auto}\n\n/* ── GRID + SCAN ── */\n.grid-bg{display:none;background-image:linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;animation:gridShift 20s linear infinite}\n@keyframes gridShift{0%{background-position:0 0}100%{background-position:44px 44px}}\n.scan-line{position:absolute;left:0;right:0;height:140px;background:linear-gradient(to bottom,transparent,rgba(196,17,1,0.02),transparent);animation:scanMove 8s linear infinite;pointer-events:none}\n@keyframes scanMove{0%{top:-140px}100%{top:100%}}\n\n/* ── HUD CORNERS ── */\n.hud-corners{display:none}\n\n\n\n.hud-corner-tr,.hud-corner-bl{display:none}\n\n\n\n/* ── GLOWING ORB ── */\n.orb{display:none}\n.orb-1{width:320px;height:320px;top:-120px;right:-80px;background:radial-gradient(circle,rgba(196,17,1,0.07) 0%,transparent 70%)}\n.orb-2{width:200px;height:200px;bottom:-60px;left:-60px;background:radial-gradient(circle,rgba(196,17,1,0.07) 0%,transparent 70%);animation-delay:2s}\n@keyframes orbPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}\n\n/* ── ANIMATED RING ── */\n.ring-wrap{display:none}\n.ring{position:absolute;inset:0;border-radius:50%;border:1px solid #C41101;animation:ringPulse 3s ease-in-out infinite;opacity:0.3}\n.ring-2{inset:14px;animation-delay:.6s;animation-duration:3.5s}\n.ring-3{inset:28px;animation-delay:1.2s;animation-duration:4s}\n.ring-dot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}\n.ring-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:#C41101;animation:orbPulse 2s ease-in-out infinite}\n@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.04);opacity:1}}\n\n/* ── DATA LINES ── */\n.data-line{display:none}\n.dl1{width:60%;top:35%;left:0;animation-delay:0s}\n.dl2{width:40%;bottom:30%;left:0;animation-delay:1.5s}\n@keyframes dataSlide{0%{transform:translateX(-100%);opacity:0}50%{opacity:1}100%{transform:translateX(200%);opacity:0}}\n\n/* ── GLITCH HEADLINE ── */\n.glitch{position:relative}\n.glitch::before,.glitch::after{display:none}\n.glitch::before{color:#C41101;animation:glitchA 6s steps(1) infinite;clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);opacity:0.5}\n.glitch::after{color:#F0EDE6;animation:glitchB 6s steps(1) infinite 0.1s;clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);opacity:0.4}\n@keyframes shimmerText{0%{background-position:200% center}100%{background-position:-200% center}}\n@keyframes colorShift{0%,100%{color:#0A0908}45%,55%{color:#C41101}}100%{background-position:-200% center}}\n@keyframes headlinePulse{0%,100%{color:#0A0908}50%{color:#C41101}}\n\n/* ── TICKER ── */\n.ticker-wrap{overflow:hidden;border-top:1px solid #EBEBEB;margin-top:auto;padding-top:16px;flex-shrink:0}\n.ticker-inner{display:flex;gap:40px;animation:tick 18s linear infinite;white-space:nowrap;width:max-content}\n@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}\n.ticker-item{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#555;display:flex;align-items:center;gap:12px}\n.ticker-dot{width:4px;height:4px;border-radius:50%;background:#C41101;flex-shrink:0}\n\n/* ── LOGO + LANG ── */\n.logo-row{display:flex;align-items:center;margin-bottom:4px;position:relative;z-index:3}\n.lang-btn{display:flex;background:#F5F5F5;border:1px solid #EBEBEB;border-radius:6px;padding:2px;gap:2px;margin-left:auto}\n.lang-opt{padding:5px 11px;border-r 9px;color:#9E8E7A;margin-top:1px;\">BMI<\u002Fp>\n              <\u002Fdiv>\n              <div>\n                <p style=\"font-size:13px;font-weight:600;color:#0A0908;margin-bottom:2px;\">{{ bmiLabel }}<\u002Fp>\n                <p style=\"font-size:11px;color:#9E8E7A;line-height:1.5;\">{{ bmiDesc }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ hasErr }}\"><div class=\"err-box\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"7\" r=\"5.5\" stroke=\"#C41101\" stroke-width=\"1.2\" fill=\"none\"><\u002Fcircle><path d=\"M7 4.5v3\" stroke=\"#C41101\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"7\" cy=\"9.5\" r=\".7\" fill=\"#C41101\"><\u002Fcircle><\u002Fsvg>{{ errMsg }}<\u002Fdiv><\u002Fsc-if>\n          <button class=\"btn-red\" onclick=\"{{ doRegister }}\">\n            <sc-if value=\"{{ loading }}\"><div class=\"spinner\"><\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ notLoading }}\">{{ t.registerBtn }}<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M8 4l3 3-3 3\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n          <\u002Fbutton>\n          <p class=\"link-switch\" onclick=\"{{ showLogin }}\">{{ t.haveAccount }} <span>{{ t.signIn }}<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- LOGIN -->\n      <sc-if value=\"{{ isLogin }}\">\n        <form autocomplete=\"on\" onsubmit=\"{{ preventSubmit }}\" style=\"animation:fadeUp .22s ease both;\">\n          <div class=\"field\"><label class=\"lbl\">{{ t.emailLabel }}<\u002Flabel><input class=\"inp\" type=\"email\" name=\"email\" autocomplete=\"email\" value=\"{{ loginEmail }}\" onchange=\"{{ onLoginEmail }}\" placeholder=\"name@email.com\"><\u002Fdiv>\n          <div class=\"field\" style=\"margin-bottom:20px;\">\n            <di  10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z\" fill=\"#FBBC05\"><\u002Fpath><path d=\"M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z\" fill=\"#EA4335\"><\u002Fpath><\u002Fsvg>{{ t.google }}<\u002Fbutton>\n          <button class=\"btn-out\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 15 15\" fill=\"none\"><path d=\"M2 7.5h11M9 4l4 3.5-4 3.5\" stroke=\"#666\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>{{ t.magicLink }}<\u002Fbutton>\n          <p class=\"link-switch\" onclick=\"{{ showRegister }}\">{{ t.noAccount }} <span>{{ t.createAccount }}<\u002Fspan><\u002Fp>\n        <\u002Fform>\n      <\u002Fsc-if>\n\n      <!-- SUCCESS -->\n      <sc-if value=\"{{ isSuccess }}\">\n        <div class=\"success-wrap\" style=\"animation:fadeUp .3s ease both;\">\n          <div class=\"success-icon\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 34 34\" fill=\"none\"><path d=\"M7 17L14 24L27 10\" stroke=\"#C41101\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#C41101;margin-bottom:10px;\">{{ t.successTag }}<\u002Fp>\n          <h2 style=\"font-family:'Anton',sans-serif;font-size:28px;margin-bottom:12px;letter-spacing:.3px;\">{{ t.successTitle }}<\u002Fh2>\n          <p style=\"font-size:14px;color:#666;line-height:1.65;margin-bottom:30px;max-width:290px;font-weight:300;\">{{ t.successBody }}<\u002Fp>\n          <button class=\"btn-red\" style=\"max-width:340px;\" onclick=\"{{ goDash }}\">{{ t.successBtn }} →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    lang: 'en',\n    screen: 'register',\n    gender: null,\n    nameVal: '', emailVal: '', phoneVal: '',\n    birthdateVal: '', heightVal: '', weightVal: '',\n    loginEmail: '', loginPw: '',\n    loading: false, errMsg: '',\n    mainGoal: null, exerciseDays: null, workoutTime: null,\n  };\n\n  get strings() {\n    const en = {\n      eyebrow: 'Digital Health Platform',\n      headline: 'ALL YOUR HEALTH NEEDS, ONE PLACE.',\n      subheadline: 'Upload medical check-up results from any hospital or clinic, track your health in real time, and get personalised recommendations from 20fit\\'s doctors & trainers.',\n      statMembers: 'Members', statSatisfied: 'Satisfied', statServices: 'Services',\n      f1: 'Upload lab results — PDF, JPG or PNG from any facility',\n      f2: 'Personalised plan: Gym, PT, EMS & Physiotherapy',\n      f3: 'Secure & private — only you and your 20fit doctor',\n      formSub: 'Manage your health profile and get personalised recommendations.',\n      tabRegister: 'Create Account', tabLogin: 'Sign In',\n      genderLabel: 'Gender', male: 'Male', female: 'Female',\n      nameLabel: 'Full Name', namePh: 'Enter your full name',\n      emailLabel: 'Email Address', phoneLabel: 'Phone Number',\n      passLabel: 'Password', forgot: 'Forgot password?',\n      registerBtn: 'Create Account', loginBtn: 'Sign In',\n      haveAccount: 'Already have an account?', signIn: 'Sign in',\n      noAccount: \"Don't have an account?\", createAccount: 'Create one',\n      or: 'or', google: 'Continue with Google', magicLink: 'Send Magic Link via Email',\n      successTag: 'Account Created', successTitle: \"YOU'RE ALL SET.\",\n      successBody: 'Welcome to 20fit Health Profile. Start tracking your health journey today.',\n      successBtn: 'Go to Health Profile',\n      errGender: 'Please select your gender.',\n      errName: 'Full name is required.',\n      errEmail: 'Please enter a valid email address.',\n      errPhone: 'Please enter a valid phone number.',\n      errLoginEmail: 'Please enter a valid email address.',\n      errLoginPw: 'Password must be at least 6 characters.',\n    };\n    const id = {\n      eyebrow: 'Platform Kesehatan Digital',\n      headline: 'SEMUA KEBUTUHAN KESEHATANMU, SATU TEMPAT.',\n      subheadline: 'Upload hasil medical check-up dari RS atau klinik mana pun, pantau kondisi tubuh secara real-time, dan dapatkan rekomendasi program dari dokter & trainer 20fit.',\n      statMembers: 'Member', statSatisfied: 'Puas', statServices: 'Layanan',\n      f1: 'Upload hasil lab — PDF, JPG atau PNG dari mana pun',\n      f2: 'Rekomendasi personal: Gym, PT, EMS & Physiotherapy',\n      f3: 'Aman & privat — hanya kamu dan dokter 20fit',\n      formSub: 'Kelola profil kesehatan dan dapatkan rekomendasi personal dari 20fit.',\n      tabRegister: 'Buat Akun', tabLogin: 'Masuk',\n      genderLabel: 'Jenis Kelamin', male: 'Pria', female: 'Wanita',\n      nameLabel: 'Nama Lengkap', namePh: 'Masukkan nama lengkap',\n      emailLabel: 'Alamat Email', phoneLabel: 'Nomor HP',\n      passLabel: 'Password', forgot: 'Lupa password?',\n      registerBtn: 'Buat Akun', loginBtn: 'Masuk',\n      haveAccount: 'Sudah punya akun?', signIn: 'Masuk',\n      noAccount: 'Belum punya akun?', createAccount: 'Daftar sekarang',\n      or: 'atau', google: 'Lanjutkan dengan Google', magicLink: 'Kirim Magic Link via Email',\n      successTag: 'Akun Berhasil Dibuat', successTitle: 'AKUN KAMU SIAP!',\n      successBody: 'Selamat bergabung di 20fit Health Profile. Mulai track kesehatanmu sekarang.',\n      successBtn: 'Masuk ke Health Profile',\n      errGender: 'Pilih jenis kelamin kamu dulu.',\n      errName: 'Nama lengkap tidak boleh kosong.',\n      errEmail: 'Masukkan alamat email yang valid.',\n      errPhone: 'Nomor HP tidak valid.',\n      errLoginEmail: 'Masukkan email yang valid.',\n      errLoginPw: 'Password minimal 6 karakter.',\n    };\n    return this.state.lang === 'id' ? id : en;\n  }\n\n  validate() {\n    const { screen, gender, nameVal, emailVal, phoneVal, loginEmail, loginPw } = this.state;\n    const t = this.strings;\n    if (screen === 'register') {\n      if (!gender) return t.errGender;\n      if (!nameVal.trim()) return t.errName;\n      if (!emailVal.includes('@')) return t.errEmail;\n      if (phoneVal.replace(/\\D/g,'').length < 8) return t.errPhone;\n    } else {\n      if (!loginEmail.includes('@')) return t.errLoginEmail;\n      if (loginPw.length < 6) return t.errLoginPw;\n    }\n    return '';\n  }\n\n  renderVals() {\n    const { lang, screen, gender, nameVal, emailVal, phoneVal, loginEmail, loginPw, loading, errMsg } = this.state;\n    const t = this.strings;\n    return {\n      t,\n      enClass: lang === 'en' ? 'active' : '',\n      idClass: lang === 'id' ? 'active' : '',\n      setEN: () => this.setState({ lang: 'en' }),\n      setID: () => this.setState({ lang: 'id' }),\n      isRegister: screen === 'register',\n      isLogin: screen === 'login',\n      isSuccess: screen === 'success',\n      isGoals: screen === 'goals',\n      registerTabOn: screen === 'register' ? 'on' : '',\n      loginTabOn: screen === 'login' ? 'on' : '',\n      // Goals step\n      goalLoseOn: this.state.mainGoal === 'lose' ? 'on' : '',\n      goalMuscleOn: this.state.mainGoal === 'muscle' ? 'on' : '',\n      goalHealthOn: this.state.mainGoal === 'health' ? 'on' : '',\n      goalFitOn: this.state.mainGoal === 'fit' ? 'on' : '',\n      setGoalLose: () => this.setState({ mainGoal: 'lose' }),\n      setGoalMuscle: () => this.setState({ mainGoal: 'muscle' }),\n      setGoalHealth: () => this.setState({ mainGoal: 'health' }),\n      setGoalFit: () => this.setState({ mainGoal: 'fit' }),\n      days2On: this.state.exerciseDays === 2 ? 'on' : '',\n      days3On: this.state.exerciseDays === 3 ? 'on' : '',\n      days4On: this.state.exerciseDays === 4 ? 'on' : '',\n      days5On: this.state.exerciseDays === 5 ? 'on' : '',\n      setDays2: () => this.setState({ exerciseDays: 2 }),\n      setDays3: () => this.setState({ exerciseDays: 3 }),\n      setDays4: () => this.setState({ exerciseDays: 4 }),\n      setDays5: () => this.setState({ exerciseDays: 5 }),\n      timeMornOn: this.state.workoutTime === 'morning' ? 'on' : '',\n      timeAfternOn: this.state.workoutTime === 'afternoon' ? 'on' : '',\n      timeEveOn: this.state.workoutTime === 'evening' ? 'on' : '',\n      setTimeMorn: () => this.setState({ workoutTime: 'morning' }),\n      setTimeAftern: () => this.setState({ workoutTime: 'afternoon' }),\n      setTimeEve: () => this.setState({ workoutTime: 'evening' }),\n      doSetGoals: () => {\n        const raw = localStorage.getItem('20fit_profile');\n        if (raw) {\n          const p = JSON.parse(raw);\n          p.mainGoal = this.state.mainGoal;\n          p.exerciseDays = this.state.exerciseDays;\n          p.workoutTime = this.state.workoutTime;\n          localStorage.setItem('20fit_profile', JSON.stringify(p));\n        }\n        this.setState({ screen: 'success' });\n      },\n      skipGoals: () => this.setState({ screen: 'success' }),\n      // End goals\n      showRegister: () => this.setState({ screen: 'register', errMsg: '' }),\n      showLogin: () => this.setState({ screen: 'login', errMsg: '' }),\n      selectMen: () => this.setState({ gender: 'men' }),\n      selectWomen: () => this.setState({ gender: 'women' }),\n      menOn: gender === 'men' ? 'on' : '',\n      womenOn: gender === 'women' ? 'on' : '',\n      nameVal, emailVal, phoneVal, loginEmail, loginPw,\n      birthdateVal: this.state.birthdateVal,\n      heightVal: this.state.heightVal,\n      weightVal: this.state.weightVal,\n      todayDate: new Date().toISOString().split('T')[0],\n      onName: (e) => this.setState({ nameVal: e.target.value }),\n      onEmail: (e) => this.setState({ emailVal: e.target.value }),\n      onPhone: (e) => this.setState({ phoneVal: e.target.value }),\n      onBirthdate: (e) => this.setState({ birthdateVal: e.target.value }),\n      onHeight: (e) => this.setState({ heightVal: e.target.value }),\n      onWeight: (e) => this.setState({ weightVal: e.target.value }),\n      // BMI calculation\n      ...(() => {\n        const h = parseFloat(this.state.heightVal);\n        const w = parseFloat(this.state.weightVal);\n        const showBMI = h > 0 && w > 0;\n        if (!showBMI) return { showBMI: false, bmiVal: '--', bmiLabel: '', bmiDesc: '', bmiColor: '#9E8E7A', bmiCardBg: '#F7F5F2', bmiCardBorder: '#E8E2DB' };\n        const bmi = w / ((h / 100) * (h / 100));\n        const bmiVal = bmi.toFixed(1);\n        let bmiLabel, bmiDesc, bmiColor, bmiCardBg, bmiCardBorder;\n        if (bmi < 18.5) { bmiLabel = 'Underweight'; bmiDesc = 'Consider increasing calorie intake with quality nutrition.'; bmiColor = '#C41101'; bmiCardBg = 'rgba(196,17,1,0.04)'; bmiCardBorder = 'rgba(196,17,1,0.15)'; }\n        else if (bmi < 25) { bmiLabel = 'Normal Weight'; bmiDesc = 'Great starting point — maintain with balanced nutrition and exercise.'; bmiColor = '#2A7A4F'; bmiCardBg = 'rgba(42,122,79,0.05)'; bmiCardBorder = 'rgba(42,122,79,0.15)'; }\n        else if (bmi < 30) { bmiLabel = 'Overweight'; bmiDesc = 'Structured training and nutrition guidance can help reach your goal.'; bmiColor = '#C87000'; bmiCardBg = 'rgba(200,112,0,0.05)'; bmiCardBorder = 'rgba(200,112,0,0.15)'; }\n        else { bmiLabel = 'Obese'; bmiDesc = 'Our medical team can help design a safe, effective program for you.'; bmiColor = '#C41101'; bmiCardBg = 'rgba(196,17,1,0.04)'; bmiCardBorder = 'rgba(196,17,1,0.15)'; }\n        return { showBMI: true, bmiVal, bmiLabel, bmiDesc, bmiColor, bmiCardBg, bmiCardBorder };\n      })(),\n      onLoginEmail: (e) => this.setState({ loginEmail: e.target.value }),\n      onLoginPw: (e) => this.setState({ loginPw: e.target.value }),\n      hasErr: !!errMsg, errMsg,\n      loading, notLoading: !loading,\n      doRegister: () => {\n        const e = this.validate();\n        if (e) { this.setState({ errMsg: e }); return; }\n        // Save profile data to localStorage for Dashboard\n        const h = parseFloat(this.state.heightVal);\n        const w = parseFloat(this.state.weightVal);\n        const bmi = h > 0 && w > 0 ? (w / ((h/100)*(h/100))).toFixed(1) : null;\n        localStorage.setItem('20fit_profile', JSON.stringify({\n          name: this.state.nameVal,\n          email: this.state.emailVal,\n          gender: this.state.gender === 'women' ? 'female' : 'male',\n          birthdate: this.state.birthdateVal,\n          height: h || null,\n          weight: w || null,\n          bmi: bmi ? parseFloat(bmi) : null,\n        }));\n        this.setState({ loading: true, errMsg: '' });\n        setTimeout(() => this.setState({ loading: false, screen: 'goals' }), 1200);\n      },\n      doLogin: () => {\n        const e = this.validate();\n        if (e) { this.setState({ errMsg: e }); return; }\n        this.setState({ loading: true, errMsg: '' });\n        setTimeout(() => { window.location.href = '20fit Health Profile.dc.html'; }, 1600);\n      },\n      goDash: () => { window.location.href = '20fit Health Profile.dc.html'; },\n      preventSubmit: (e) => { if (e && e.preventDefault) e.preventDefault(); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
