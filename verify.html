<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verifikasi · 20fit</title>
<style>
  :root { --green:#1db954; --dark:#0e1b13; --muted:#6b7c70; --line:#e3eae5; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#f4f8f5; color:var(--dark); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; width:100%; max-width:380px; border-radius:20px; padding:28px 24px;
          box-shadow:0 10px 40px rgba(0,0,0,.06); text-align:center; }
  h2 { margin:0 0 6px; font-size:20px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  .sub b { color:var(--dark); }
  input { width:100%; padding:14px; border:1px solid var(--line); border-radius:11px; font-size:22px; text-align:center; letter-spacing:8px; }
  input:focus { outline:none; border-color:var(--green); }
  .btn { width:100%; margin-top:18px; padding:14px; border:0; border-radius:12px; background:var(--green); color:#fff; font-weight:700; font-size:15px; cursor:pointer; }
  .btn:disabled { opacity:.6; }
  .link { margin-top:14px; font-size:13px; color:var(--muted); }
  .link a { color:var(--green); cursor:pointer; text-decoration:none; }
  .msg { margin-top:12px; font-size:13px; min-height:18px; }
  .msg.err { color:#d63031; } .msg.ok { color:var(--green); }
  .dev { margin-top:14px; font-size:12px; color:#b07a00; background:#fff6e0; border-radius:8px; padding:8px; display:none; }
</style>
</head>
<body>
  <div class="card">
    <h2>Verifikasi Email</h2>
    <div class="sub">Kami kirim 6 digit kode ke <b id="mail">email kamu</b>.</div>

    <input id="otp" inputmode="numeric" maxlength="6" placeholder="______" />
    <button class="btn" id="btn" onclick="verify()">Verifikasi</button>
    <div class="link">Belum dapat kode? <a onclick="resend()">Kirim ulang</a></div>
    <div class="msg" id="msg"></div>
    <div class="dev" id="dev"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    function msg(t, type) {
      const el = document.getElementById("msg");
      el.textContent = t || ""; el.className = "msg" + (type ? " " + type : "");
    }
    (async function init() {
      const user = await Auth.requireAuth();
      document.getElementById("mail").textContent = user.email;
      await resend();
    })();
    async function resend() {
      msg("Mengirim kode...", "");
      try {
        const r = await Auth.sendOtp();
        if (r.sent) msg("Kode terkirim ke email kamu.", "ok");
        else msg("Kode dibuat (email belum aktif — lihat catatan).", "ok");
        // Mode dev (tanpa SMTP): tampilkan kode supaya bisa dites
        if (r.devCode) {
          const d = document.getElementById("dev");
          d.style.display = "block";
          d.textContent = "MODE TES — kode kamu: " + r.devCode;
        }
      } catch (e) { msg(e.message, "err"); }
    }
    async function verify() {
      const code = document.getElementById("otp").value.trim();
      const btn = document.getElementById("btn");
      btn.disabled = true;
      try {
        await Auth.verifyOtp(code);
        await Auth.routeAfterAuth();
      } catch (e) { msg(e.message, "err"); btn.disabled = false; }
    }
  </script>
</body>
</html>
