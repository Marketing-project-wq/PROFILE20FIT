<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verifikasi · 20FIT</title>
<style>
  :root{--red:#e11d2a;--bg:#0a0a0a;--card:#141414;--line:#262626;--txt:#f5f5f5;--muted:#8a8a8a;--inp:#1c1c1c}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px 26px;text-align:center}
  .logo{display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .logo img{height:54px;width:auto}
  h2{margin:0 0 6px;font-size:20px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  .sub b{color:var(--txt)}
  input{width:100%;padding:14px;background:var(--inp);border:1px solid var(--line);border-radius:11px;color:var(--txt);font-size:24px;text-align:center;letter-spacing:10px}
  input:focus{outline:none;border-color:var(--red)}
  .btn{width:100%;margin-top:18px;padding:14px;border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .btn:disabled{opacity:.55}
  .link{margin-top:14px;font-size:13px;color:var(--muted)}
  .link a{color:var(--red);cursor:pointer;text-decoration:none;font-weight:600}
  .msg{margin-top:12px;font-size:13px;min-height:18px}.msg.err{color:#ff6b6b}.msg.ok{color:#46d369}
  .dev{margin-top:14px;font-size:12px;color:#ffcf66;background:#2a2410;border:1px solid #4a4020;border-radius:9px;padding:9px;display:none}
</style>
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<link rel="stylesheet" href="css/20fit-design-system.css">
<link rel="stylesheet" href="css/glass-app.css">
</head>
<body>
  <div class="card">
    <div class="logo"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20FIT" /></div>
    <h2>Verifikasi Email</h2>
    <div class="sub">Kode 6 digit dikirim ke <b id="mail">email kamu</b>.</div>
    <input id="otp" inputmode="numeric" maxlength="6" placeholder="------" />
    <button class="btn" id="btn" onclick="verify()">Verifikasi</button>
    <div class="link">Belum dapat kode? <a onclick="resend()">Kirim ulang</a></div>
    <div class="msg" id="msg"></div>
    <div class="dev" id="dev"></div>
  </div>
  <script src="js/vendor-supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function msg(t,type){const el=document.getElementById("msg");el.textContent=t||"";el.className="msg"+(type?" "+type:"")}
    let userEmail=null;
    (async function init(){
      const user=await Auth.requireAuth();
      userEmail=user.email;
      document.getElementById("mail").textContent=user.email;
      // JANGAN auto-resend di sini — 20FIT sudah kirim OTP pertama otomatis saat
      // registrasi. Resend cuma boleh terjadi kalau user KLIK tombolnya sendiri
      // (lihat resend()), supaya kode yang sudah diterima user tidak jadi invalid.
      msg("Kode verifikasi sudah dikirim ke email kamu saat mendaftar. Masukkan kode tersebut di bawah.","");
    })();
    async function resend(){
      msg("Mengirim kode...","");
      try{
        await Auth.fitcoResendVerifyEmail(userEmail);
        msg("Kode terkirim ke email kamu.","ok");
      }catch(e){msg(e.message,"err")}
    }
    async function verify(){
      const code=document.getElementById("otp").value.trim();
      const btn=document.getElementById("btn");btn.disabled=true;
      try{await Auth.fitcoVerifyEmail(userEmail,code);await Auth.routeAfterAuth()}
      catch(e){msg(e.message,"err");btn.disabled=false}
    }
  </script>
</body>
</html>
