<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard · 20fit</title>
<style>
  :root { --green:#1db954; --dark:#0e1b13; --muted:#6b7c70; --line:#e3eae5; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#f4f8f5; color:var(--dark); padding:20px; }
  .wrap { max-width:440px; margin:0 auto; }
  .top { display:flex; justify-content:space-between; align-items:center; margin:10px 4px 20px; }
  .logo { font-weight:800; font-size:20px; }
  .logo span { color:var(--green); }
  .logout { border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 12px; font-size:13px; cursor:pointer; }
  .hello { font-size:22px; font-weight:800; margin:0 4px 16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat { background:#fff; border-radius:16px; padding:16px; box-shadow:0 4px 16px rgba(0,0,0,.04); }
  .stat .k { color:var(--muted); font-size:12px; }
  .stat .v { font-size:22px; font-weight:800; margin-top:4px; }
  .stat .v small { font-size:13px; color:var(--muted); font-weight:600; }
  .note { background:#eafaf0; border-radius:14px; padding:14px; margin-top:16px; font-size:13px; color:#2a6b43; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo">20<span>fit</span></div>
      <button class="logout" onclick="Auth.signOut()">Keluar</button>
    </div>

    <div class="hello" id="hello">Halo 👋</div>

    <div class="grid">
      <div class="stat"><div class="k">Berat</div><div class="v" id="berat">–</div></div>
      <div class="stat"><div class="k">Tinggi</div><div class="v" id="tinggi">–</div></div>
      <div class="stat"><div class="k">Umur</div><div class="v" id="umur">–</div></div>
      <div class="stat"><div class="k">BMI</div><div class="v" id="bmi">–</div></div>
    </div>

    <div class="note">
      ✅ Profil kamu tersimpan di database 20fit. Halaman ini contoh dashboard
      fungsional — desain lengkap dari Claude Design bisa kita pasang berikutnya.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    (async function () {
      const p = await Auth.getProfile();
      const nm = p.full_name || (p.email ? p.email.split("@")[0] : "");
      document.getElementById("hello").textContent = "Halo, " + nm + " 👋";
      if (p.weight_kg) document.getElementById("berat").innerHTML = p.weight_kg + " <small>kg</small>";
      if (p.height_cm) document.getElementById("tinggi").innerHTML = p.height_cm + " <small>cm</small>";
      if (p.age) document.getElementById("umur").innerHTML = p.age + " <small>th</small>";
      if (p.weight_kg && p.height_cm) {
        const m = p.height_cm / 100;
        document.getElementById("bmi").textContent = (p.weight_kg / (m * m)).toFixed(1);
      }
    })();
  </script>
</body>
</html>
