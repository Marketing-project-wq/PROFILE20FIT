<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard · 20fit</title>
<style>
  :root{--red:#e11d2a;--bg:#0a0a0a;--card:#141414;--line:#262626;--txt:#f5f5f5;--muted:#8a8a8a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:20px}
  .wrap{max-width:460px;margin:0 auto}
  .top{display:flex;justify-content:space-between;align-items:center;margin:6px 2px 22px}
  .logo{display:flex;align-items:center;gap:2px;font-weight:900;font-size:22px}
  .logo .dot{width:15px;height:15px;border-radius:50%;background:var(--red);margin:0 1px}
  .logout{border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:9px;padding:8px 13px;font-size:13px;cursor:pointer}
  .hello-k{color:var(--red);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:0 2px}
  .hello{font-size:26px;font-weight:900;margin:2px 2px 20px;text-transform:uppercase;letter-spacing:-.5px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .stat .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .stat .v{font-size:26px;font-weight:900;margin-top:6px}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600}
  .note{background:rgba(225,29,42,.08);border:1px solid rgba(225,29,42,.25);border-radius:13px;padding:14px;margin-top:16px;font-size:13px;color:#ffb3b8}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo">20<span class="dot"></span>FIT</div>
      <button class="logout" onclick="Auth.signOut()">Keluar</button>
    </div>
    <div class="hello-k">Selamat datang</div>
    <div class="hello" id="hello">—</div>
    <div class="grid">
      <div class="stat"><div class="k">Berat</div><div class="v" id="berat">–</div></div>
      <div class="stat"><div class="k">Tinggi</div><div class="v" id="tinggi">–</div></div>
      <div class="stat"><div class="k">Umur</div><div class="v" id="umur">–</div></div>
      <div class="stat"><div class="k">BMI</div><div class="v" id="bmi">–</div></div>
    </div>
    <div class="note">✅ Profil kamu tersimpan di database 20fit. Ini dashboard fungsional dasar — fitur lengkap (medical record, progress, dll) bisa ditambah berikutnya.</div>
  </div>
  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    (async function(){
      const p=await Auth.getProfile();
      const nm=p.full_name||(p.email?p.email.split("@")[0]:"");
      document.getElementById("hello").textContent=nm;
      if(p.weight_kg)document.getElementById("berat").innerHTML=p.weight_kg+' <small>kg</small>';
      if(p.height_cm)document.getElementById("tinggi").innerHTML=p.height_cm+' <small>cm</small>';
      if(p.age)document.getElementById("umur").innerHTML=p.age+' <small>th</small>';
      if(p.weight_kg&&p.height_cm){const m=p.height_cm/100;document.getElementById("bmi").textContent=(p.weight_kg/(m*m)).toFixed(1)}
    })();
  </script>
</body>
</html>
