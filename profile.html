<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile · 20fit</title>
<style>
  :root{--red:#C41101;--bg:#0b0b0c;--card:#FFFFFF;--line:#E8E2DB;--txt:#0A0908;--muted:#8A7C68;--inp:#F0EDE5;--dark:#000000;--pagetx:#EDE8DF}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--pagetx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:22px 18px 70px}
  .wrap{max-width:560px;margin:0 auto}
  @media(min-width:900px){ .wrap{max-width:720px} }
  .logobar{background:var(--dark);border-radius:16px;padding:13px 18px;margin-bottom:16px;display:flex;align-items:center}
  .logobar img{height:36px}
  h1{font-size:24px;font-weight:900;margin:0 0 16px;text-transform:uppercase}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.3);color:var(--txt)}
  .ava{width:72px;height:72px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  input,select{width:100%;padding:13px 14px;background:var(--inp);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px}
  input:focus,select:focus{outline:none;border-color:var(--red)}
  input:disabled{opacity:.6}
  .row{display:flex;gap:12px}.row>div{flex:1}
  .gender{display:flex;gap:10px}
  .gender button{flex:1;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--inp);color:var(--muted);font-weight:700;cursor:pointer}
  .gender button.active{border-color:var(--red);background:rgba(196,17,1,.10);color:var(--red)}
  .btn{width:100%;margin-top:18px;padding:14px;border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .btn.out{background:transparent;border:1px solid var(--red);color:var(--red);margin-top:10px}
  .muted{color:var(--muted);font-size:13px}
  .msg{margin-top:12px;font-size:13px;text-align:center;min-height:18px}
  .ok{color:#2A7A4F}.err{color:var(--red)}
</style>
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<link rel="stylesheet" href="20fit-design-system.css">
<link rel="stylesheet" href="glass-app.css">
</head>
<body>
  <div class="wrap">
    <div class="logobar"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit" /></div>
    <h1 data-i18n="prof_title">My Profile</h1>

    <div class="card" style="display:flex;align-items:center;gap:16px">
      <div class="ava" id="ava">?</div>
      <div>
        <div style="font-size:18px;font-weight:800" id="pname">—</div>
        <div class="muted" id="pemail">—</div>
      </div>
    </div>

    <div class="card">
      <label data-i18n="prof_name">Full Name</label>
      <input id="full_name" type="text" />
      <label data-i18n="prof_email">Email</label>
      <input id="email" type="email" disabled />
      <label data-i18n="prof_phone">Phone</label>
      <input id="phone" type="tel" placeholder="+62..." />

      <label data-i18n="prof_gender">Gender</label>
      <div class="gender">
        <button type="button" data-g="male" onclick="pickGender('male')" data-i18n="prof_male">Male</button>
        <button type="button" data-g="female" onclick="pickGender('female')" data-i18n="prof_female">Female</button>
      </div>

      <div class="row">
        <div><label data-i18n="prof_weight">Weight (kg)</label><input id="weight" type="number" /></div>
        <div><label data-i18n="prof_height">Height (cm)</label><input id="height" type="number" /></div>
      </div>

      <label data-i18n="prof_goal">Main Goal</label>
      <select id="goal">
        <option value="" data-i18n="prof_pick">— choose —</option>
        <option value="lose" data-i18n="prof_lose">Lose Weight</option>
        <option value="muscle" data-i18n="prof_muscle">Build Muscle</option>
        <option value="health" data-i18n="prof_healthier">Get Healthier</option>
        <option value="fit" data-i18n="prof_fit">Improve Fitness</option>
      </select>

      <button class="btn" id="save" onclick="save()" data-i18n="prof_save">Save Changes</button>
      <div class="msg" id="msg"></div>
    </div>

    <button class="btn out" onclick="startTour()" data-i18n="prof_tour" style="border-color:var(--line);color:var(--txt)">Replay app tutorial</button>
    <button class="btn out" onclick="Auth.signOut()" data-i18n="prof_logout">Log Out</button>
  </div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="nav.js"></script>
  <script src="tour.js"></script>
  <script>
    let gender=null, user=null;
    function pickGender(g){gender=g;document.querySelectorAll('.gender button').forEach(b=>b.classList.toggle("active",b.dataset.g===g))}
    function msg(t,c){const e=document.getElementById("msg");e.textContent=t||"";e.className="msg"+(c?" "+c:"")}
    function applyI18nSelect(){ // data-i18n on <option> updates text too via I18N.apply()
    }
    (async function(){
      user=await Auth.requireAuth();
      const p=await Auth.getProfile();
      const nm=p.full_name||(p.email?p.email.split("@")[0]:"");
      document.getElementById("ava").textContent=(nm[0]||"?").toUpperCase();
      document.getElementById("pname").textContent=nm;
      document.getElementById("pemail").textContent=p.email||"";
      document.getElementById("full_name").value=p.full_name||"";
      document.getElementById("email").value=p.email||"";
      document.getElementById("phone").value=p.phone||"";
      document.getElementById("weight").value=p.weight_kg||"";
      document.getElementById("height").value=p.height_cm||"";
      document.getElementById("goal").value=p.main_goal||"";
      if(p.gender)pickGender(p.gender);
    })();
    async function save(){
      const fields={
        full_name:document.getElementById("full_name").value.trim()||null,
        phone:document.getElementById("phone").value.trim()||null,
        weight_kg:parseFloat(document.getElementById("weight").value)||null,
        height_cm:parseFloat(document.getElementById("height").value)||null,
        main_goal:document.getElementById("goal").value||null,
        gender:gender||null,
        updated_at:new Date().toISOString()
      };
      const btn=document.getElementById("save");btn.disabled=true;msg(L({en:"Saving...",id:"Menyimpan..."}),"");
      try{
        const {error}=await Auth.supabase.from("my20fit_profile").update(fields).eq("auth_user_id",user.id);
        if(error)throw error;
        msg(L({en:"Saved! ✅",id:"Tersimpan! ✅"}),"ok");document.getElementById("pname").textContent=fields.full_name||"";
      }catch(e){msg(e.message,"err")}
      btn.disabled=false;
    }
  </script>
</body>
</html>
