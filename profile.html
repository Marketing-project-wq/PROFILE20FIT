<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile · 20FIT</title>
<style>
  :root{--red:#C41101;--bg:#0b0b0c;--card:#FFFFFF;--line:#E8E2DB;--txt:#0A0908;--muted:#8A7C68;--inp:#F0EDE5;--dark:#000000;--pagetx:#EDE8DF}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--pagetx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:22px 18px 70px}
  .wrap{max-width:560px;margin:0 auto}
  @media(min-width:900px){ .wrap{max-width:720px} }
  .logobar{background:var(--dark);border-radius:16px;padding:13px 18px;margin-bottom:16px;display:flex;align-items:center}
  .logobar img{height:36px}
  h1{font-size:24px;font-weight:900;margin:0 0 16px;text-transform:uppercase}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.3);color:var(--txt)}
  .ava{position:relative;width:72px;height:72px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff;cursor:pointer;background-size:cover;background-position:center;flex:0 0 auto}
  .ava.has #avaInit{display:none}
  .avacam{position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:50%;background:var(--card);display:grid;place-items:center;box-shadow:0 1px 5px rgba(0,0,0,.3)}
  .avacam svg{width:14px;height:14px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  input,select{width:100%;padding:13px 14px;background:var(--inp);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px}
  input:focus,select:focus{outline:none;border-color:var(--red)}
  input:disabled{opacity:.6}
  .row{display:flex;gap:12px}.row>div{flex:1}
  .gender{display:flex;gap:10px}
  .gender button{flex:1;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--inp);color:var(--muted);font-weight:700;cursor:pointer}
  .gender button.active{border-color:var(--red);background:rgba(196,17,1,.10);color:var(--red)}
  .btn{width:100%;margin-top:18px;padding:14px;border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .btn.out{background:transparent;border:1px solid var(--red);color:var(--red);margin-top:10px}
  .muted{color:var(--muted);font-size:13px}
  .msg{margin-top:12px;font-size:13px;text-align:center;min-height:18px}
  .ok{color:#2A7A4F}.err{color:var(--red)}
  .sec{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:8px 2px 8px}
  /* Riwayat pembelian */
  .ord{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .ord:first-child{border-top:0}
  .ord .oq{width:46px;height:46px;border-radius:11px;background:var(--red);color:#fff;display:grid;place-items:center;font-weight:900;font-size:15px;line-height:1;flex:0 0 auto;text-align:center}
  .ord .oq small{display:block;font-size:8px;font-weight:700;opacity:.85;margin-top:2px}
  .ord .oi{flex:1;min-width:0}
  .ord .oi .op{font-weight:800;font-size:15px}
  .ord .oi .od{font-size:12px;color:var(--muted);margin-top:1px}
  .ord .oi .ono{font-size:11px;color:var(--muted);margin-top:1px}
  .badge{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:999px;margin-top:5px}
  .badge.pending{background:rgba(200,112,0,.15);color:#C87000}
  .badge.paid{background:rgba(42,122,79,.15);color:#2A7A4F}
  .badge.cancelled,.badge.expired{background:var(--inp);color:var(--muted)}
  .ord-acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .ord-acts button{border:0;border-radius:9px;font-weight:800;font-size:12px;padding:8px 12px;cursor:pointer;font-family:inherit}
  .oa-pay{background:var(--red);color:#fff}
  .oa-cancel{background:var(--inp);color:var(--txt);border:1px solid var(--line)}
  .oa-again{background:var(--inp);color:var(--txt);border:1px solid var(--line)}
  .oa-detail{background:var(--inp);color:var(--txt);border:1px solid var(--line)}
  .loadmore{width:100%;margin-top:12px;border:1px solid var(--line);background:var(--inp);color:var(--txt);border-radius:11px;font-weight:800;font-size:13.5px;padding:12px;cursor:pointer}
  /* Touchpoint kuota scan */
  .quota-card{display:flex;align-items:center;gap:14px}
  .quota-ic{width:48px;height:48px;border-radius:14px;background:rgba(196,17,1,.10);display:grid;place-items:center;flex:0 0 auto}
  .quota-ic svg{width:24px;height:24px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .quota-info{flex:1;min-width:0}
  .quota-info .qn{font-size:16px;font-weight:800}
  .quota-info .qs{font-size:12.5px;color:var(--muted);margin-top:2px}
  .quota-btn{border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:13.5px;padding:11px 16px;cursor:pointer;flex:0 0 auto;white-space:nowrap}
  /* Read-only field list */
  .kv{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--line);font-size:14.5px}
  .kv:first-child{border-top:0}
  .kv .k{color:var(--muted)}.kv .v{font-weight:700;text-align:right}
  .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .card-hd h2{margin:0;font-size:16px;font-weight:800}
  .edit-btn{border:1px solid var(--line);background:var(--inp);color:var(--txt);border-radius:9px;font-weight:800;font-size:12.5px;padding:8px 13px;cursor:pointer}
  /* Modal edit */
  .pm-bg{position:fixed;inset:0;z-index:200;background:rgba(10,12,16,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;padding:0}
  .pm-bg.open{display:flex}
  .pm{width:100%;max-width:560px;background:var(--card);color:var(--txt);border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;padding:10px 20px calc(env(safe-area-inset-bottom) + 24px);box-shadow:0 -12px 44px rgba(0,0,0,.3);animation:pmUp .28s cubic-bezier(.2,.85,.25,1)}
  @keyframes pmUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .pm .grab{width:42px;height:5px;border-radius:999px;background:var(--line);margin:8px auto 12px}
  .pm h2{margin:0 0 6px;font-size:19px;font-weight:800}
  @media(min-width:620px){ .pm-bg{align-items:center;padding:24px} .pm{border-radius:22px} .pm .grab{display:none} }

  /* ===== Struk / bon detail pembayaran ===== */
  .pm-rcpt{max-width:430px;background:transparent;box-shadow:none;padding:6px 14px calc(env(safe-area-inset-bottom) + 22px)}
  .rc-x{position:absolute;top:16px;right:16px;z-index:3;width:34px;height:34px;border:0;border-radius:10px;background:var(--inp);color:var(--txt);font-size:15px;line-height:1;cursor:pointer}
  .rcpt{position:relative;background:var(--card);color:var(--txt);border-radius:16px;padding:26px 24px 24px;
        box-shadow:0 10px 40px rgba(16,18,22,.16);
        -webkit-mask:radial-gradient(7px at 12px 0,#0000 98%,#000) 0 0/24px 51% repeat-x,
                     radial-gradient(7px at 12px 100%,#0000 98%,#000) 0 100%/24px 51% repeat-x;
                mask:radial-gradient(7px at 12px 0,#0000 98%,#000) 0 0/24px 51% repeat-x,
                     radial-gradient(7px at 12px 100%,#0000 98%,#000) 0 100%/24px 51% repeat-x}
  .rc-head{text-align:center;margin-bottom:14px}
  .rc-brand{font-size:24px;font-weight:900;letter-spacing:1px;line-height:1}
  .rc-brand span{color:var(--red,#C41101)}
  .rc-sub{margin-top:5px;font-size:10.5px;font-weight:800;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
  .rc-stamp{position:absolute;top:20px;left:18px;transform:rotate(-9deg);font-size:12px;font-weight:900;letter-spacing:1px;padding:4px 10px;border-radius:6px;border:2px solid currentColor;text-transform:uppercase;opacity:.92}
  .rc-stamp.paid{color:var(--green-ink,#1B7A4D)}
  .rc-stamp.pending{color:var(--amber-ink,#9A5D12)}
  .rc-stamp.cancelled,.rc-stamp.expired{color:var(--muted)}
  .rc-rule{border-top:1px dashed var(--faint,#CBC2B4);margin:14px 0}
  .rc-rule.solid{border-top-style:solid;border-color:var(--line)}
  .rc-item{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
  .rc-item-name{font-size:15px;font-weight:800}
  .rc-item-desc{font-size:12.5px;color:var(--muted);margin-top:3px}
  .rc-item-amt{font-size:15px;font-weight:800;white-space:nowrap}
  .rc-line{display:flex;align-items:baseline;gap:6px;font-size:14px;margin:9px 0}
  .rc-line .k{color:var(--muted)}
  .rc-line .lead{flex:1;border-bottom:1.5px dotted var(--faint,#CBC2B4);transform:translateY(-4px)}
  .rc-line .v{font-weight:700;white-space:nowrap}
  .rc-line.disc .k,.rc-line.disc .v{color:var(--green-ink,#1B7A4D)}
  .rc-total{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .rc-total .k{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .rc-total .v{font-size:24px;font-weight:900;line-height:1}
  .rc-meta{display:flex;flex-direction:column;gap:8px}
  .rc-meta .r{display:flex;justify-content:space-between;gap:12px;font-size:12.5px}
  .rc-meta .mk{color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-size:11px;font-weight:700}
  .rc-meta .mv{font-weight:700;text-align:right}
  .rc-meta .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;letter-spacing:.3px}
  .rc-foot{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);line-height:1.7}
  .rc-foot b{color:var(--txt);font-weight:800}
</style>
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<link rel="stylesheet" href="css/20fit-design-system.css">
<link rel="stylesheet" href="css/glass-app.css">
</head>
<body>
  <div class="wrap">
    <h1 data-i18n="prof_title">My Profile</h1>

    <div class="card" style="display:flex;align-items:center;gap:16px">
      <div class="ava" id="ava" onclick="document.getElementById('avafile').click()" title="Ganti foto profil"><span id="avaInit">?</span><span class="avacam"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span></div>
      <input id="avafile" type="file" accept="image/*" style="display:none" onchange="onAvaPick(event)" />
      <div>
        <div style="font-size:18px;font-weight:800" id="pname">—</div>
        <div class="muted" id="pemail">—</div>
      </div>
    </div>

    <!-- Touchpoint: tambah kuota scan (pakai modal deals bersama) -->
    <div class="card quota-card">
      <div class="quota-ic"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <div class="quota-info">
        <div class="qn" id="quotaN">—</div>
        <div class="qs" id="quotaS"></div>
      </div>
      <button class="quota-btn" id="topupBtn" onclick="openTopup()">+ <span data-i18n="prof_topup">Add scans</span></button>
    </div>

    <!-- Ringkasan profil (read-only) + tombol Edit -> popup -->
    <div class="card">
      <div class="card-hd">
        <h2 data-i18n="prof_detail">Profile details</h2>
        <button class="edit-btn" id="editBtn" onclick="openEdit()">✏️ <span data-i18n="prof_edit">Edit</span></button>
      </div>
      <div id="pSummary"></div>
      <div class="msg" id="msg"></div>
    </div>

    <!-- Riwayat Pembelian (paket scan) -->
    <div class="sec" id="histSec" data-i18n="prof_hist_sec">Purchase History</div>
    <div class="card" id="histCard">
      <div class="muted" id="histEmpty" data-i18n="prof_hist_empty">No purchases yet.</div>
      <div id="histList"></div>
    </div>

    <button class="btn out" onclick="Auth.signOut()" data-i18n="prof_logout">Log Out</button>
  </div>

  <!-- Modal Edit Profil -->
  <div class="pm-bg" id="editBg">
    <div class="pm">
      <div class="grab"></div>
      <h2 data-i18n="prof_edit_title">Edit profile</h2>
      <label data-i18n="prof_name">Full Name</label>
      <input id="full_name" type="text" />
      <label data-i18n="prof_email">Email</label>
      <input id="email" type="email" disabled />
      <label data-i18n="prof_phone">Phone</label>
      <input id="phone" type="tel" placeholder="+62..." />
      <label data-i18n="prof_gender">Gender</label>
      <div class="gender">
        <button type="button" data-g="male" onclick="pickGender('male')" data-i18n="prof_male">Male</button>
        <button type="button" data-g="female" onclick="pickGender('female')" data-i18n="prof_female">Female</button>
      </div>
      <div class="row">
        <div><label data-i18n="prof_weight">Weight (kg)</label><input id="weight" type="number" /></div>
        <div><label data-i18n="prof_height">Height (cm)</label><input id="height" type="number" /></div>
      </div>
      <label data-i18n="prof_goal">Main Goal</label>
      <select id="goal">
        <option value="" data-i18n="prof_pick">— choose —</option>
        <option value="lose" data-i18n="prof_lose">Lose Weight</option>
        <option value="muscle" data-i18n="prof_muscle">Build Muscle</option>
        <option value="health" data-i18n="prof_healthier">Get Healthier</option>
        <option value="fit" data-i18n="prof_fit">Improve Fitness</option>
      </select>
      <button class="btn" id="save" onclick="save()" data-i18n="prof_save">Save Changes</button>
      <button class="btn out" onclick="closeEdit()" data-i18n="prof_cancel">Cancel</button>
      <div class="msg" id="editMsg"></div>
    </div>
  </div>

  <!-- Pop-up detail pembayaran (bentuk struk/bon) -->
  <div class="pm-bg" id="odBg">
    <div class="pm pm-rcpt">
      <div class="grab"></div>
      <button class="rc-x" onclick="closeOrderDetail()" aria-label="Close">✕</button>
      <div id="odBody"></div>
    </div>
  </div>

  <script src="js/vendor-supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/deals.js"></script>
  <script>
    let gender=null, user=null, PROFILE=null;
    function pickGender(g){gender=g;document.querySelectorAll('.gender button').forEach(b=>b.classList.toggle("active",b.dataset.g===g))}
    function msg(t,c){const e=document.getElementById("editMsg")||document.getElementById("msg");e.textContent=t||"";e.className="msg"+(c?" "+c:"")}
    (async function(){
      user=await Auth.requireAuth();
      const p=await Auth.getProfile(); PROFILE=p;
      const nm=p.full_name||(p.email?p.email.split("@")[0]:"");
      document.getElementById("avaInit").textContent=(nm[0]||"?").toUpperCase();
      if(p.avatar_url){ setAva(p.avatar_url); try{ localStorage.setItem(avaKey(),p.avatar_url); }catch(e){} }
      else loadAvatar();
      document.getElementById("pname").textContent=nm;
      document.getElementById("pemail").textContent=p.email||"";
      fillForm(p); renderSummary(p); renderHistory(); refreshQuota();
    })();
    function fillForm(p){
      document.getElementById("full_name").value=p.full_name||"";
      document.getElementById("email").value=p.email||"";
      document.getElementById("phone").value=p.phone||"";
      document.getElementById("weight").value=p.weight_kg||"";
      document.getElementById("height").value=p.height_cm||"";
      document.getElementById("goal").value=p.main_goal||"";
      gender=null; document.querySelectorAll('.gender button').forEach(b=>b.classList.remove("active"));
      if(p.gender)pickGender(p.gender);
    }
    function goalLabel(g){ return L({lose:{en:"Lose Weight",id:"Turun Berat"},muscle:{en:"Build Muscle",id:"Bentuk Otot"},health:{en:"Get Healthier",id:"Lebih Sehat"},fit:{en:"Improve Fitness",id:"Tingkatkan Fitness"}}[g]||{en:"—",id:"—"}); }
    function renderSummary(p){
      function row(k,v){ return '<div class="kv"><span class="k">'+k+'</span><span class="v">'+(v||"—")+'</span></div>'; }
      document.getElementById("pSummary").innerHTML=
        row(L({en:"Full name",id:"Nama"}), p.full_name?escapeHtml(p.full_name):"")+
        row("Email", p.email?escapeHtml(p.email):"")+
        row(L({en:"Phone",id:"Telepon"}), p.phone?escapeHtml(p.phone):"")+
        row(L({en:"Gender",id:"Gender"}), p.gender?(p.gender==="male"?L({en:"Male",id:"Pria"}):L({en:"Female",id:"Wanita"})):"")+
        row(L({en:"Weight",id:"Berat"}), p.weight_kg?(p.weight_kg+" kg"):"")+
        row(L({en:"Height",id:"Tinggi"}), p.height_cm?(p.height_cm+" cm"):"")+
        row(L({en:"Main goal",id:"Tujuan"}), p.main_goal?goalLabel(p.main_goal):"");
    }
    function escapeHtml(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
    async function refreshQuota(){
      try{
        var q=await Auth.getScanQuota();
        document.getElementById("quotaN").textContent=L({en:q.remaining+" scans left",id:"Sisa "+q.remaining+" scan"});
        document.getElementById("quotaS").textContent=q.credits>0?L({en:"+"+q.credits+" from top-up · never expires",id:"+"+q.credits+" dari top-up · tidak hangus"}):L({en:"Top up anytime — extra scans never expire.",id:"Top up kapan saja — scan tambahan tidak hangus."});
      }catch(e){ document.getElementById("quotaN").textContent=L({en:"Top up scans",id:"Top up scan"}); }
    }
    // ---- Touchpoint & Edit popup ----
    function openTopup(){ if(window.Deals) Deals.open({ onCredited: function(){ refreshQuota(); renderHistory(); } }); }
    function openEdit(){ if(PROFILE) fillForm(PROFILE); document.getElementById("editMsg").textContent=""; document.getElementById("editBg").classList.add("open"); }
    function closeEdit(){ document.getElementById("editBg").classList.remove("open"); }
    (function(){ var bg=document.getElementById("editBg"); if(bg) bg.addEventListener("click",function(e){ if(e.target===bg) closeEdit(); });
      document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeEdit(); }); })();

    // ---- Riwayat pembelian paket scan (commerce) ----
    function rupiah(n){ return "Rp "+(+n||0).toLocaleString("id-ID"); }
    function fmtDate(ts){ try{ return new Date(ts).toLocaleString(I18N.lang==="id"?"id-ID":"en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
    function statusLabel(s){
      return L({
        pending:{en:"Unpaid",id:"Belum dibayar"},
        paid:{en:"Paid",id:"Lunas"},
        cancelled:{en:"Cancelled",id:"Dibatalkan"},
        expired:{en:"Expired",id:"Kadaluarsa"}
      }[s]||{en:s,id:s});
    }
    var HIST_SHOWN=5;
    function orderTotal(o){ return (o.total!=null)?(+o.total||0):Math.max(0,(+o.price||0)-(+o.discount||0)); }
    function renderHistory(){
      if(!window.Orders) return;
      var list=Orders.all();
      var box=document.getElementById("histList"), empty=document.getElementById("histEmpty");
      if(!list.length){ if(empty)empty.style.display=""; box.innerHTML=""; return; }
      if(empty)empty.style.display="none";
      var shown=list.slice(0,HIST_SHOWN);
      var html=shown.map(function(o){
        var acts='<button class="oa-detail" onclick="showOrderDetail(\''+o.id+'\')">'+L({en:"Payment details",id:"Detail pembayaran"})+'</button>';
        if(o.status==="pending"){
          if(o.link) acts+='<button class="oa-pay" onclick="payOrder(\''+o.id+'\')">'+L({en:"Pay",id:"Bayar"})+'</button>';
          acts+='<button class="oa-cancel" onclick="cancelOrder(\''+o.id+'\')">'+L({en:"Cancel",id:"Batalkan"})+'</button>';
        } else if(o.status==="cancelled"||o.status==="expired"){
          acts+='<button class="oa-again" onclick="buyAgain()">'+L({en:"Buy again",id:"Beli lagi"})+'</button>';
        }
        return '<div class="ord">'+
          '<div class="oq">'+(o.credits||0)+'<small>SCAN</small></div>'+
          '<div class="oi">'+
            '<div class="op">'+rupiah(orderTotal(o))+' · '+(o.credits||0)+'x '+L({en:"scans",id:"scan"})+'</div>'+
            '<div class="od">'+fmtDate(o.paid_ts||o.ts)+(o.discount>0?' · '+L({en:"voucher",id:"voucher"}):'')+'</div>'+
            (o.order_no?'<div class="ono">Order '+o.order_no+'</div>':'')+
            '<span class="badge '+o.status+'">'+statusLabel(o.status)+'</span>'+
            '<div class="ord-acts">'+acts+'</div>'+
          '</div>'+
        '</div>';
      }).join("");
      if(list.length>HIST_SHOWN){
        html+='<button class="loadmore" onclick="loadMoreHist()">'+L({en:"Load more ("+(list.length-HIST_SHOWN)+" more)",id:"Muat lebih ("+(list.length-HIST_SHOWN)+" lagi)"})+'</button>';
      }
      box.innerHTML=html;
    }
    function loadMoreHist(){ HIST_SHOWN+=5; renderHistory(); }
    function methodLabel(o){
      var p=(o.provider||"").toLowerCase();
      if(p==="voucher") return L({en:"Voucher (free)",id:"Voucher (gratis)"});
      if(p==="xendit") return "Xendit";
      if(p==="singapay") return "SingaPay"; // order historis sebelum migrasi ke Xendit
      return p ? (p.charAt(0).toUpperCase()+p.slice(1)) : "—";
    }
    function showOrderDetail(id){
      var o=Orders.get(id); if(!o) return;
      var disc=+o.discount||0, price=+o.price||0, total=orderTotal(o), st=o.status||"paid";
      var h='<div class="rcpt">';
      h+='<div class="rc-stamp '+st+'">'+statusLabel(st)+'</div>';
      h+='<div class="rc-head"><div class="rc-brand">20<span>FIT</span></div>'
        +'<div class="rc-sub">'+L({en:"Payment Receipt",id:"Struk Pembayaran"})+'</div></div>';
      h+='<div class="rc-rule"></div>';
      // Item yang dibeli
      h+='<div class="rc-item"><div><div class="rc-item-name">'+(o.credits||0)+'× '+L({en:"calorie scans",id:"scan kalori"})+'</div>'
        +'<div class="rc-item-desc">'+L({en:(o.credits||0)+" extra scan credits added",id:(o.credits||0)+" kredit scan tambahan masuk ke akun"})+'</div></div>'
        +'<div class="rc-item-amt">'+rupiah(price)+'</div></div>';
      h+='<div class="rc-rule dash"></div>';
      // Rincian harga
      h+='<div class="rc-line"><span class="k">'+L({en:"Subtotal",id:"Subtotal"})+'</span><span class="lead"></span><span class="v">'+rupiah(price)+'</span></div>';
      if(disc>0) h+='<div class="rc-line disc"><span class="k">'+L({en:"Voucher discount",id:"Potongan voucher"})+'</span><span class="lead"></span><span class="v">− '+rupiah(disc)+'</span></div>';
      h+='<div class="rc-rule"></div>';
      h+='<div class="rc-total"><span class="k">'+L({en:"Total paid",id:"Total bayar"})+'</span><span class="v">'+rupiah(total)+'</span></div>';
      h+='<div class="rc-rule dash"></div>';
      // Meta
      h+='<div class="rc-meta">';
      if(o.order_no) h+='<div class="r"><span class="mk">'+L({en:"Order no",id:"No. order"})+'</span><span class="mv mono">'+o.order_no+'</span></div>';
      h+='<div class="r"><span class="mk">'+L({en:"Date",id:"Tanggal"})+'</span><span class="mv">'+fmtDate(o.paid_ts||o.ts)+'</span></div>';
      h+='<div class="r"><span class="mk">'+L({en:"Method",id:"Metode"})+'</span><span class="mv">'+methodLabel(o)+'</span></div>';
      h+='</div>';
      h+='<div class="rc-rule dash"></div>';
      h+='<div class="rc-foot">'+L({en:"Thank you for your purchase 💚",id:"Terima kasih atas pembelianmu 💚"})+'<br><b>my.20fit.id</b></div>';
      h+='</div>';
      document.getElementById("odBody").innerHTML=h;
      document.getElementById("odBg").classList.add("open");
    }
    function closeOrderDetail(){ document.getElementById("odBg").classList.remove("open"); }
    (function(){ var bg=document.getElementById("odBg"); if(bg) bg.addEventListener("click",function(e){ if(e.target===bg) closeOrderDetail(); }); })();
    // Bayar / ganti metode: buka kembali invoice Xendit (di sana bisa pilih VA/e-wallet/QRIS/kartu).
    function payOrder(id){ var o=Orders.get(id); if(o&&o.link){ window.open(o.link,"_blank"); } }
    // Batalkan: tandai lokal + best-effort batalkan di 20FIT.
    async function cancelOrder(id){
      var o=Orders.get(id); if(!o)return;
      if(!confirm(L({en:"Cancel this unpaid order?",id:"Batalkan order yang belum dibayar ini?"})))return;
      Orders.markCancelled(id); renderHistory();
      try{
        var tk=await Auth.token(); var ftk=localStorage.getItem("fitco_token")||"";
        await fetch("/api/scan/order-cancel",{method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+(tk||"")},
          body:JSON.stringify({ sales_order_id:o.sales_order_id||o.id, fitco_token:ftk })});
      }catch(e){}
    }
    function buyAgain(){ if(window.Deals) Deals.open({ onCredited: function(){ refreshQuota(); renderHistory(); } }); else location.href="calories"; }
    try{ if(window.I18N&&I18N.onChange) I18N.onChange(renderHistory); }catch(e){}

    // ---- Foto profil (di-resize kecil, disimpan per-akun di device) ----
    function avaKey(){ return "my20fit_avatar_"+((user&&user.id)||"me"); }
    function setAva(dataUrl){ var a=document.getElementById("ava"); a.style.backgroundImage="url('"+dataUrl+"')"; a.classList.add("has"); }
    function loadAvatar(){ try{ var d=localStorage.getItem(avaKey()); if(d) setAva(d); }catch(e){} }
    function resizeImg(src,max,cb){ var img=new Image(); img.onload=function(){ var w=img.width,h=img.height,s=Math.min(max/w,max/h,1),cw=Math.round(w*s),ch=Math.round(h*s); var c=document.createElement("canvas"); c.width=cw; c.height=ch; c.getContext("2d").drawImage(img,0,0,cw,ch); try{ cb(c.toDataURL("image/jpeg",0.82)); }catch(e){ cb(src); } }; img.onerror=function(){ cb(src); }; img.src=src; }
    function onAvaPick(e){ var f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f)return;
      msg(L({en:"Uploading photo…",id:"Mengunggah foto…"}),"");
      var rd=new FileReader(); rd.onload=function(){ resizeImg(rd.result,240,function(out){
        setAva(out); try{ localStorage.setItem(avaKey(),out); }catch(err){}
        // Simpan ke akun (Supabase) supaya sinkron lintas device
        if(window.Auth&&Auth.supabase&&user){
          Auth.supabase.from("my20fit_profile").update({avatar_url:out,updated_at:new Date().toISOString()}).eq("auth_user_id",user.id).then(function(r){
            if(r&&r.error){ msg(L({en:"Saved on this device, but sync failed. Try again.",id:"Tersimpan di device, tapi gagal sinkron. Coba lagi."}),"err"); }
            else { msg(L({en:"Profile photo saved & synced ✓",id:"Foto profil tersimpan & sinkron ✓"}),"ok"); }
          });
        } else { msg(L({en:"Photo saved ✓",id:"Foto tersimpan ✓"}),"ok"); }
      }); }; rd.readAsDataURL(f); }
    async function save(){
      const fields={
        full_name:document.getElementById("full_name").value.trim()||null,
        phone:document.getElementById("phone").value.trim()||null,
        weight_kg:parseFloat(document.getElementById("weight").value)||null,
        height_cm:parseFloat(document.getElementById("height").value)||null,
        main_goal:document.getElementById("goal").value||null,
        gender:gender||null,
        updated_at:new Date().toISOString()
      };
      const btn=document.getElementById("save");btn.disabled=true;msg(L({en:"Saving...",id:"Menyimpan..."}),"");
      try{
        const {error}=await Auth.supabase.from("my20fit_profile").update(fields).eq("auth_user_id",user.id);
        if(error)throw error;
        PROFILE=Object.assign({},PROFILE,fields);
        renderSummary(PROFILE);
        document.getElementById("pname").textContent=fields.full_name||"";
        msg(L({en:"Saved! ✓",id:"Tersimpan! ✓"}),"ok");
        setTimeout(closeEdit,700);
      }catch(e){msg(e.message,"err")}
      btn.disabled=false;
    }
  </script>
</body>
