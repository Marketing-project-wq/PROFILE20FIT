<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medical Record · 20fit</title>
<style>
  :root{--red:#C41101;--bg:#0b0b0c;--card:#FFFFFF;--line:#E8E2DB;--txt:#0A0908;--muted:#8A7C68;--inp:#F0EDE5;--dark:#000000;--pagetx:#EDE8DF}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--pagetx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:22px 18px 70px}
  .wrap{max-width:640px;margin:0 auto}
  .logobar{background:var(--dark);border-radius:16px;padding:13px 18px;margin-bottom:14px;display:flex;align-items:center}
  .logobar img{height:36px}
  h1{font-size:24px;font-weight:900;margin:0 0 4px;text-transform:uppercase}
  .muted{color:var(--muted);font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:14px;box-shadow:0 2px 10px rgba(0,0,0,.3);color:var(--txt)}
  .up{border:1px dashed var(--red);background:rgba(225,29,42,.06);text-align:center;cursor:pointer}
  .up .ic svg{width:38px;height:38px;fill:none;stroke:var(--red);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .btn{margin-top:12px;padding:12px 16px;border:0;border-radius:10px;background:var(--red);color:#fff;font-weight:800;cursor:pointer}
  .rec{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .rec:last-child{border-bottom:0}
  .grade{width:38px;height:38px;border-radius:10px;background:rgba(225,29,42,.15);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:900}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}
  .soon{display:inline-block;font-size:11px;background:var(--inp);color:#aaa;padding:3px 9px;border-radius:20px;margin-top:6px}
  .param{padding:11px 0;border-bottom:1px solid var(--line)}
  .param:last-child{border-bottom:0}
  .param .ph{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .param .pv{font-weight:800;display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .find{border-left:3px solid;border-radius:10px;padding:12px 14px;margin-top:10px;background:var(--inp)}
  .find .ft{font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .sevtag{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .plan{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.5}
  .plan:last-child{border-bottom:0}
  .plan .pi{width:26px;height:26px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:14px}
  .ch{font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:9px}
  .ch svg{width:19px;height:19px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .rec{cursor:pointer}
  .seemore{flex:0 0 auto;color:var(--red);font-weight:800;font-size:12px;white-space:nowrap}
  .bookbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:13px;border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:14px;cursor:pointer;text-decoration:none}
  .bookbtn.alt{background:var(--inp);color:var(--txt);border:1px solid var(--line)}
  .bookbtn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  /* hasil scan: grid biar side-by-side di desktop */
  #result{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
  #result .card{margin-top:0}
  .rfull{grid-column:1/-1}
  @media(min-width:900px){ .wrap{max-width:1000px} #result{grid-template-columns:1fr 1fr} }
  /* overall summary stats */
  .ohrow{display:flex;gap:10px;margin-top:10px}
  .ohstat{flex:1;background:var(--inp);border-radius:12px;padding:10px 12px;text-align:center}
  .ohstat .l{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .ohstat .v{font-weight:900;font-size:20px;margin-top:2px}
  /* program rows (bookable) */
  .prow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .prow:last-child{border-bottom:0}
  .prow .pn{font-weight:800;font-size:14px}.prow .pd{font-size:12px;color:var(--muted)}
  .bookchip{flex:0 0 auto;background:var(--red);color:#fff;border:0;border-radius:9px;padding:8px 12px;font-weight:800;font-size:12px;text-decoration:none;cursor:pointer}
  .bookchip.clinic{background:#2563eb}
  /* achievement board */
  .achbar{height:8px;background:var(--inp);border-radius:6px;overflow:hidden;margin:4px 0 8px}
  .achbar>i{display:block;height:100%;background:linear-gradient(90deg,#C87000,#f0a93a);width:0;transition:width .4s}
  .achrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;font-size:13.5px}
  .achrow:last-child{border-bottom:0}
  .achbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .achbox svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;opacity:0}
  .achrow.done .achbox{background:#C87000;border-color:#C87000}
  .achrow.done .achbox svg{opacity:1}
  .achrow.done{color:var(--muted);text-decoration:line-through}
  /* banner konsultasi dokter */
  .consultbn{display:flex;align-items:center;gap:14px;margin-top:14px;padding:16px 18px;border-radius:16px;
    background:linear-gradient(135deg,#C41101,#7a0d00);color:#fff;box-shadow:0 6px 20px rgba(196,17,1,.3)}
  .consultbn .cbic{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .consultbn .cbic svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .consultbn .cbt{font-weight:900;font-size:16px}
  .consultbn .cbs{font-size:12.5px;opacity:.92;margin-top:2px;line-height:1.4}
  .cbbtn{flex:0 0 auto;background:#fff;color:#C41101;border-radius:11px;padding:11px 16px;font-weight:800;font-size:13px;text-decoration:none;white-space:nowrap}
  @media(max-width:560px){ .consultbn{flex-wrap:wrap} .cbbtn{width:100%;text-align:center} }
  /* banner belanja bahan makanan (affiliate) */
  .shopbn{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:16px;color:#fff;
    background:linear-gradient(135deg,#2A7A4F,#15512f);box-shadow:0 6px 20px rgba(42,122,79,.3)}
  .shopbn .cbic{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .shopbn .cbic svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .shopbn .cbt{font-weight:900;font-size:16px}.shopbn .cbs{font-size:12.5px;opacity:.92;margin-top:2px;line-height:1.4}
  @media(max-width:560px){ .shopbn{flex-wrap:wrap} .shopbn .cbbtn{width:100%;text-align:center} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logobar"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit" /></div>
    <h1 data-i18n="med_title">Medical Record</h1>
    <div class="muted" data-i18n="med_sub">Your medical check-up results & recommendations.</div>

    <div class="card up" onclick="document.getElementById('mcufile').click()">
      <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></div>
      <div style="font-weight:800;margin-top:6px" data-i18n="med_upload">Upload Medical Check-Up</div>
      <div class="muted" data-i18n="med_uploadsub">PDF / JPG / PNG from any facility — analysed automatically with AI</div>
    </div>
    <input id="mcufile" type="file" accept="image/*,application/pdf" style="display:none" onchange="analyzeMCU(event)" />

    <div class="consultbn">
      <div class="cbic"><svg viewBox="0 0 24 24"><path d="M11 2a2 2 0 0 0-2 2v1a2 2 0 0 0-2 2v3a6 6 0 0 0 12 0V7a2 2 0 0 0-2-2V4a2 2 0 0 0-2-2"/><path d="M8 15a6 6 0 0 0 12 0v-3"/><circle cx="20" cy="10" r="2"/></svg></div>
      <div style="flex:1">
        <div class="cbt" data-i18n="med_consult_t">Talk to a 20fit doctor</div>
        <div class="cbs" data-i18n="med_consult_s">Have questions about your results? Book a consultation with our Sport Clinic doctor.</div>
      </div>
      <a class="cbbtn" href="https://booking.20fit.id/clinic" target="_blank" rel="noopener" data-i18n="med_consult_cta">Consult a Doctor</a>
    </div>

    <div id="result"></div>

    <div class="card">
      <div style="font-weight:800;margin-bottom:6px" data-i18n="med_history">History</div>
      <div id="list"></div>
    </div>
  </div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="nav.js"></script>
  <script>
    const AI_URL="https://cpvzwqptzcxnwzfzgrmt.supabase.co/functions/v1/my20fit-ai";
    const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnp3cXB0emN4bnd6Znpncm10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzE0MzksImV4cCI6MjA5MTIwNzQzOX0.DIP-tTFxa3GHMhT6b1Tq-Zz0a24P-vbU9ixEtITbqpI";
    let user=null, history=[], profile=null;
    function readData(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
    // Perkecil gambar sebelum dikirim -> upload & OCR jauh lebih cepat (PDF dilewati)
    function fileURL(f){
      if(!String(f.type).startsWith("image/"))return readData(f);
      return new Promise(async(resolve)=>{
        try{
          const dataUrl=await readData(f);
          const img=new Image();
          img.onload=()=>{
            const MAX=1500; let{width:w,height:h}=img;
            if(Math.max(w,h)>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
            const c=document.createElement("canvas");c.width=w;c.height=h;
            c.getContext("2d").drawImage(img,0,0,w,h);
            resolve(c.toDataURL("image/jpeg",0.8));
          };
          img.onerror=()=>resolve(dataUrl);
          img.src=dataUrl;
        }catch(e){resolve(await readData(f));}
      });
    }
    // Muat PDF.js sekali (dari CDN) untuk render PDF -> gambar
    function loadScript(src){return new Promise((res,rej)=>{if([].some.call(document.scripts,s=>s.src===src))return res();const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=()=>rej(new Error("load fail"));document.head.appendChild(s);});}
    // PDF (sering hasil scan & berat) -> render maksimal 3 halaman jadi 1 JPEG kecil -> upload cepat
    async function pdfToImage(f){
      await loadScript("https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js");
      const pdfjsLib=window.pdfjsLib||window["pdfjs-dist/build/pdf"];
      pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      const buf=await f.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const n=Math.min(pdf.numPages,3);
      const canvases=[];let W=0,H=0;
      for(let i=1;i<=n;i++){
        const page=await pdf.getPage(i);
        let vp=page.getViewport({scale:1});
        const scale=Math.min(1400/vp.width,2.2);
        vp=page.getViewport({scale});
        const c=document.createElement("canvas");c.width=vp.width;c.height=vp.height;
        await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;
        canvases.push(c);W=Math.max(W,c.width);H+=c.height;
      }
      const big=document.createElement("canvas");big.width=W;big.height=H;
      const g=big.getContext("2d");g.fillStyle="#fff";g.fillRect(0,0,W,H);
      let y=0;for(const c of canvases){g.drawImage(c,0,y);y+=c.height;}
      return big.toDataURL("image/jpeg",0.82);
    }

    async function analyzeMCU(e){
      const f=e.target.files[0];if(!f)return;
      const box=document.getElementById("result");
      // Hanya izinkan file medical check-up: foto (image) atau PDF — tolak selain itu
      const okType=String(f.type||"").startsWith("image/")||String(f.type||"").includes("pdf");
      if(!okType){ box.innerHTML='<div class="card" style="color:var(--red)">'+L({en:"Only a medical check-up file is allowed — a photo (JPG/PNG) or PDF.",id:"Hanya file medical check-up yang boleh — foto (JPG/PNG) atau PDF."})+'</div>'; e.target.value=""; return; }
      const sig="mcu_"+(f.name||"")+"_"+f.size+"_"+(f.lastModified||0);
      // Kalau file yang sama pernah dianalisa -> tampilkan instan tanpa panggil AI lagi
      try{const cached=localStorage.getItem(sig);if(cached){renderResult(JSON.parse(cached));e.target.value="";return;}}catch(e0){}
      box.innerHTML='<div class="card"><div class="muted">'+I18N.t("med_analysing")+'</div></div>';
      let url,mime;
      try{
        if(String(f.type).includes("pdf")){
          try{ url=await pdfToImage(f); mime="image/jpeg"; }
          catch(e2){ url=await fileURL(f); mime=f.type; } // fallback: kirim PDF mentah
        }else{ url=await fileURL(f); mime=f.type; }
      }catch(e3){ box.innerHTML='<div class="card" style="color:var(--red)">'+L({en:"Couldn't read the file. Try another.",id:"Gagal membaca file. Coba file lain."})+'</div>'; e.target.value=""; return; }
      try{
        const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),90000);
        const r=await fetch(AI_URL,{method:"POST",signal:ctrl.signal,headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},body:JSON.stringify({action:"mcu",file:url,mime:mime,lang:I18N.lang})});
        clearTimeout(to);
        const j=await r.json();
        if(!r.ok||!j.result)throw new Error((j.error||L({en:"Failed to analyse document",id:"Gagal menganalisa dokumen"}))+(j.detail?" — "+j.detail:""));
        j.result._lang=I18N.lang;
        showResult(j.result);
        try{localStorage.setItem(sig,JSON.stringify(j.result));}catch(e1){}
        // Simpan ke akun (Supabase). Kalau GAGAL, kasih tahu user — jangan diam-diam hilang saat refresh.
        let saveErr=null;
        try{ const {error}=await Auth.supabase.from("my20fit_mcu_result").insert({auth_user_id:user.id,result:j.result,analyzed_at:new Date().toISOString()}); saveErr=error; }catch(err){ saveErr=err; }
        if(!saveErr){ loadList(); }
        else {
          const w=document.createElement("div"); w.className="card rfull";
          w.style.cssText="border-color:#e7c98a;background:#fbf3df;color:#8a6d1a;font-size:13px;font-weight:600";
          w.innerHTML='⚠️ '+L({en:"Result is shown but couldn't be saved to your account (network issue). Please re-upload when your connection is stable so it persists after refresh.",id:"Hasil tampil tapi belum tersimpan ke akunmu (masalah jaringan). Coba upload ulang saat koneksi stabil biar tetap ada setelah refresh."});
          const box2=document.getElementById("result"); if(box2) box2.prepend(w);
        }
      }catch(err){
        const msg=(err&&err.name==="AbortError")?L({en:"Took too long — please try again.",id:"Terlalu lama — coba lagi ya."}):
          /fetch/i.test(err.message||"")?L({en:"Connection failed. Check internet & try again.",id:"Koneksi gagal. Cek internet & coba lagi."}):err.message;
        box.innerHTML='<div class="card" style="color:var(--red)">'+msg+'</div>';
      }
      e.target.value="";
    }

    const SEV={tinggi:{c:"#ff3b30",t:"Perlu Perhatian"},sedang:{c:"#ff9500",t:"Sedang"},ringan:{c:"#ffcc00",t:"Ringan"}};
    function statusColor(s){return s==="attention"?"#ff6b6b":s==="unknown"?"#8a8a8a":"#46d369"}
    function planCard(title,icon,iconColor,items){
      if(!items||!items.length)return"";
      return '<div class="card"><div class="ch" style="color:'+iconColor+'"><svg viewBox="0 0 24 24" stroke="'+iconColor+'">'+icon+'</svg>'+title+'</div>'+
        items.map(it=>'<div class="plan"><div class="pi" style="background:'+iconColor+'22;color:'+iconColor+'">•</div><div>'+it+'</div></div>').join("")+'</div>';
    }
    // Rekomendasi makanan: kalimat pendek + "Explore more" -> Calorie Tracker
    function eatingShortCard(res){
      const items=(res.eating_plan||[]);
      const fork='<path d="M3 2v7c0 1.1.9 2 2 2a2 2 0 0 0 2-2V2"/><path d="M5 2v20"/><path d="M21 15V2a5 5 0 0 0-3 9v11"/>';
      const short = items.length ? items[0] : L({en:"Focus on balanced meals — enough protein, vegetables & fiber, and cut back on sugar & fried food.",id:"Fokus makan seimbang — cukup protein, sayur & serat, kurangi gula & gorengan."});
      return '<div class="card"><div class="ch" style="color:#2A7A4F"><svg viewBox="0 0 24 24" stroke="#2A7A4F">'+fork+'</svg>'+I18N.t("med_eating")+'</div>'+
        '<div style="margin-top:6px;line-height:1.55">'+short+'</div>'+
        '<a href="calories.html#mealideas" style="display:block;text-align:center;text-decoration:none;margin-top:12px;padding:12px;border-radius:12px;border:1px solid var(--line);color:#2A7A4F;font-weight:800">'+L({en:"Explore more food recommendations ›",id:"Lihat rekomendasi makanan lainnya ›"})+'</a></div>';
    }
    const BOOK_BOOK="https://booking.20fit.id/book";
    const BOOK_GYM="https://booking.20fit.id/gym";
    const BOOK_CLINIC="https://booking.20fit.id/clinic";
    // TODO: isi URL toko affiliate B2B kita di sini -> tombol langsung aktif
    const SHOP_URL="";
    function shopBanner(){
      const cart='<svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>';
      const btn = SHOP_URL
        ? '<a class="cbbtn" style="color:#1d6b41" href="'+SHOP_URL+'" target="_blank" rel="noopener">'+L({en:"Shop Food",id:"Belanja"})+'</a>'
        : '<span class="cbbtn" style="color:#1d6b41;opacity:.7;cursor:default">'+L({en:"Coming soon",id:"Segera hadir"})+'</span>';
      return '<div class="shopbn rfull"><div class="cbic">'+cart+'</div><div style="flex:1">'+
        '<div class="cbt">'+L({en:"Shop your ingredients",id:"Belanja bahan makanannya"})+'</div>'+
        '<div class="cbs">'+L({en:"Buy the recommended foods from our partner store.",id:"Beli makanan yang disarankan langsung dari toko partner kami."})+'</div></div>'+
        btn+'</div>';
    }
    function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return Math.abs(h).toString(36);}

    // Program 20fit yang bisa langsung di-booking sesuai health journey
    function programsCard(hasFindings){
      let list=[
        {n:"HYROX Foundation",d:{en:"Beginner functional strength",id:"Kekuatan fungsional, pemula"},u:BOOK_BOOK},
        {n:"Hyper Class",d:{en:"High-intensity training",id:"Latihan intensitas tinggi"},u:BOOK_GYM},
        {n:"EMS",d:{en:"Smart muscle activation",id:"Aktivasi otot pintar"},u:BOOK_GYM},
        {n:"Vinyasa Yoga",d:{en:"Gentle, breath-led",id:"Lembut, mengikuti napas"},u:BOOK_GYM}
      ];
      if(hasFindings){ list=[
        {n:L({en:"Doctor Consultation",id:"Konsultasi Dokter"}),d:{en:"Discuss your results with a doctor",id:"Bahas hasil check-up dengan dokter"},u:BOOK_CLINIC,clinic:true},
        {n:"Physiotherapy",d:{en:"Guided, safe recovery",id:"Pemulihan terpandu & aman"},u:BOOK_CLINIC,clinic:true}
      ].concat(list); }
      const exIcon='<svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:#2563eb;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>';
      return '<div class="card"><div class="ch" style="color:#2563eb">'+exIcon+L({en:"Recommended Programs",id:"Program yang Disarankan"})+'</div>'+
        list.map(p=>'<div class="prow"><div style="flex:1"><div class="pn">'+p.n+'</div><div class="pd">'+L(p.d)+'</div></div>'+
          '<a class="bookchip'+(p.clinic?" clinic":"")+'" href="'+p.u+'" target="_blank" rel="noopener">'+L({en:"Book",id:"Booking"})+'</a></div>').join("")+'</div>';
    }

    // Lifestyle follow-up -> Achievement Board (bisa dicentang & tersimpan)
    let achKey="", achState={}, achItems=[], currentRes=null, baseRes=null, transCache={};
    // Tampilkan hasil baru sebagai sumber (reset cache terjemahan)
    function showResult(res,noScroll){ baseRes=res; transCache={}; transCache[res._lang||"en"]=res; renderResult(res,noScroll); }
    function buildAch(res){
      achItems=res.lifestyle_plan||[];
      achKey="mcu_ach_"+simpleHash((res.date||"")+"|"+achItems.join("|"));
      try{achState=JSON.parse(localStorage.getItem(achKey)||"{}")}catch(e){achState={}}
    }
    function achCard(){
      if(!achItems.length)return"";
      const total=achItems.length, done=achItems.filter((_,i)=>achState[i]).length;
      const trophy='<svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:#C87000;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0z"/><path d="M5 4H3v2a3 3 0 0 0 3 3M19 4h2v2a3 3 0 0 1-3 3"/></svg>';
      const check='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
      return '<div class="card"><div class="ch" style="color:#C87000">'+trophy+L({en:"Achievement Board",id:"Papan Pencapaian"})+'</div>'+
        '<div class="muted" style="margin-bottom:4px">'+L({en:"Tick these off as you build the habit",id:"Centang saat kamu mulai membiasakan"})+' · '+done+'/'+total+(done===total?" 🎉":"")+'</div>'+
        '<div class="achbar"><i style="width:'+(total?done/total*100:0)+'%"></i></div>'+
        achItems.map((it,i)=>'<div class="achrow'+(achState[i]?" done":"")+'" onclick="toggleAch('+i+')"><div class="achbox">'+check+'</div><div>'+it+'</div></div>').join("")+'</div>';
    }
    function toggleAch(i){achState[i]=!achState[i];try{localStorage.setItem(achKey,JSON.stringify(achState))}catch(e){} if(currentRes)renderResult(currentRes,true);}

    function renderResult(res,noScroll){
      currentRes=res; buildAch(res);
      const att=res.abnormal_findings||[];
      const params=(res.parameters||[]).map(p=>{
        const col=statusColor(p.status);
        const arrow=p.direction==="high"?" ↑":p.direction==="low"?" ↓":"";
        return '<div class="param"><div class="ph"><b>'+(p.label||"")+'</b><span class="pv" style="color:'+col+'"><span class="dot" style="background:'+col+'"></span>'+(p.value||"")+arrow+'</span></div>'+
          '<div class="muted">Normal: '+(p.normal_range||"-")+'</div>'+
          (p.explanation?'<div style="font-size:13px;margin-top:4px;color:#555">'+p.explanation+'</div>':"")+'</div>';
      }).join("");
      const findings=att.map(fd=>{
        const sv=SEV[(fd.severity||"sedang").toLowerCase()]||SEV.sedang;
        return '<div class="find" style="border-color:'+sv.c+'"><div class="ft"><span>'+(fd.label||"")+(fd.value?' · '+fd.value:'')+'</span><span class="sevtag" style="background:'+sv.c+'22;color:'+sv.c+'">'+sv.t+'</span></div>'+
          (fd.why_it_matters?'<div style="font-size:13px;margin-top:6px;color:#9a2a22"><b>'+I18N.t("med_why")+'</b> '+fd.why_it_matters+'</div>':"")+
          (fd.what_to_do?'<div style="font-size:13px;margin-top:5px;color:#2A7A4F"><b>'+I18N.t("med_do")+'</b> '+fd.what_to_do+'</div>':"")+'</div>';
      }).join("");
      const unread=(res.unreadable&&res.unreadable.length)?'<div class="card rfull" style="border-color:#e7c98a;background:#fbf3df;color:#8a6d1a"><b>'+I18N.t("med_unread")+'</b><ul style="margin:6px 0 0 18px">'+res.unreadable.map(u=>'<li>'+u+'</li>').join("")+'</ul></div>':"";
      const ICO={fork:'<path d="M3 2v7c0 1.1.9 2 2 2a2 2 0 0 0 2-2V2"/><path d="M5 2v20"/><path d="M21 15V2a5 5 0 0 0-3 9v11"/>',
        ex:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'};
      const heart='<svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M19 14c1.5-1.5 3-3.3 3-5.5A4.5 4.5 0 0 0 12 5 4.5 4.5 0 0 0 2 8.5c0 4.5 7 9.5 10 11.5 1.5-1 4-2.8 6-5"/></svg>';
      const warn='<svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/></svg>';

      // ---- Overall summary (plain language + BMI/gender/age) ----
      const bi = profile ? Auth.bmiInfo(profile.weight_kg, profile.height_cm) : null;
      let stats="";
      if(bi) stats+='<div class="ohstat"><div class="l">BMI</div><div class="v" style="color:'+bi.color+'">'+bi.bmi+'</div><div class="muted" style="font-size:11px">'+bi.label+'</div></div>';
      if(profile&&profile.gender) stats+='<div class="ohstat"><div class="l">'+L({en:"Gender",id:"Gender"})+'</div><div class="v" style="font-size:15px;margin-top:6px">'+(profile.gender==="female"?L({en:"Female",id:"Perempuan"}):L({en:"Male",id:"Laki-laki"}))+'</div></div>';
      if(profile&&profile.age) stats+='<div class="ohstat"><div class="l">'+L({en:"Age",id:"Usia"})+'</div><div class="v">'+profile.age+'</div></div>';
      const attLine = att.length
        ? L({en:att.length+" thing(s) to watch: ",id:att.length+" hal perlu diperhatikan: "})+att.map(f=>f.label).join(", ")
        : L({en:"All readable values look within the normal range. 🎉",id:"Semua nilai yang terbaca tampak dalam batas normal. 🎉"});
      const overall='<div class="card rfull"><div class="ch" style="color:var(--red)">'+heart+L({en:"Overall Summary",id:"Ringkasan Keseluruhan"})+'</div>'+
        '<div class="muted">'+[res.document_type,res.patient_name,res.date].filter(Boolean).join(" · ")+'</div>'+
        (stats?'<div class="ohrow">'+stats+'</div>':'')+
        (res.summary?'<div style="margin-top:10px;line-height:1.55"><b>'+L({en:"What it means: ",id:"Artinya: "})+'</b>'+res.summary+'</div>':'')+
        '<div style="margin-top:8px;font-weight:700;color:'+(att.length?"#b3402f":"#2A7A4F")+'">'+attLine+'</div>'+
        (bi?'<div class="muted" style="margin-top:6px">'+L({en:"Overall, based on your BMI & profile: ",id:"Secara umum dari BMI & profilmu: "})+bi.desc+'</div>':'')+'</div>';

      document.getElementById("result").innerHTML=
        overall+
        (findings?'<div class="card rfull"><div class="ch" style="color:var(--red)">'+warn+I18N.t("med_attention")+'</div>'+findings+'</div>':"")+
        (params?'<div class="card"><div style="font-weight:800;margin-bottom:6px">'+I18N.t("med_params")+'</div>'+params+'</div>':"")+
        eatingShortCard(res)+
        programsCard(att.length>0)+
        planCard(I18N.t("med_exercise"),ICO.ex,"#2563eb",res.exercise_plan)+
        achCard()+
        unread+
        '<div class="card rfull" style="border-color:rgba(196,17,1,.3);background:rgba(196,17,1,.07);color:#8a1f15;font-size:13px">⚠️ '+(res.disclaimer||L({en:"This interpretation is not a substitute for a doctor. Consult the 20fit doctor for proper advice.",id:"Interpretasi ini bukan pengganti konsultasi dokter. Konsultasikan ke dokter 20fit untuk saran yang tepat."}))+'</div>';
      if(!noScroll)document.getElementById("result").scrollIntoView({behavior:"smooth"});
    }
    async function loadList(){
      try{const {data}=await Auth.supabase.from("my20fit_mcu_result").select("*").eq("auth_user_id",user.id).order("created_at",{ascending:false});history=data||[]}catch(e){history=[]}
      const el=document.getElementById("list");
      if(!history.length){el.innerHTML='<div class="empty">'+I18N.t("med_empty")+'</div>';return}
      el.innerHTML=history.map((r,i)=>{const res=r.result||{};const date=(r.analyzed_at||r.created_at||"").slice(0,10);const flag=(res.abnormal_findings||[]).length;
        return '<div class="rec" onclick="openHistory('+i+')"><div class="grade"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:var(--red);stroke-width:2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div style="flex:1"><div style="font-weight:700">'+(res.document_type||L({en:"MCU Result",id:"Hasil MCU"}))+'</div><div class="muted">'+date+(flag?' · '+flag+' '+L({en:"need attention",id:"perlu perhatian"}):'')+'</div></div><span class="seemore">'+L({en:"See more",id:"Lihat detail"})+' ›</span></div>';
      }).join("");
    }
    function openHistory(i){const r=history[i];if(r&&r.result)showResult(r.result);}
    // Terjemahkan hasil yang sedang tampil ke bahasa aktif (lewat AI), dengan cache + timeout
    async function translateCurrent(){
      const base=baseRes; if(!base){return;}
      const want=I18N.lang;
      // sudah pernah diterjemahkan -> instan
      if(transCache[want]){ renderResult(transCache[want],true); return; }
      // label langsung ganti bahasa dulu (teks AI nyusul beberapa detik)
      renderResult(base,true);
      try{
        const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),45000);
        const r=await fetch(AI_URL,{method:"POST",signal:ctrl.signal,headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},body:JSON.stringify({action:"translate",lang:want,data:base})});
        clearTimeout(to);
        const j=await r.json();
        if(r.ok&&j.result&&I18N.lang===want){ j.result._lang=want; transCache[want]=j.result; renderResult(j.result,true); }
      }catch(e){ /* biarkan render terkini — label sudah sesuai bahasa aktif */ }
    }
    (async function(){
      user=await Auth.requireAuth();
      try{ profile=await Auth.getProfile(); }catch(e){ profile=null; }
      await loadList();
      // Setelah refresh: tampilkan otomatis hasil terakhir (tanpa upload ulang)
      if(history[0]&&history[0].result){ showResult(history[0].result,true); }
    })();
    I18N.onChange(()=>{ loadList(); if(currentRes)translateCurrent(); });
  </script>
</body>
</html>
