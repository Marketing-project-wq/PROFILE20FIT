<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medical Record · 20fit</title>
<style>
  :root{--red:#e11d2a;--bg:#0a0a0a;--card:#141414;--line:#262626;--txt:#f5f5f5;--muted:#8a8a8a;--inp:#1c1c1c}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:22px 18px 70px}
  .wrap{max-width:640px;margin:0 auto}
  .logo img{height:38px;margin-bottom:16px}
  h1{font-size:24px;font-weight:900;margin:0 0 4px;text-transform:uppercase}
  .muted{color:var(--muted);font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:14px}
  .up{border:1px dashed var(--red);background:rgba(225,29,42,.06);text-align:center;cursor:pointer}
  .up .ic svg{width:38px;height:38px;fill:none;stroke:var(--red);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .btn{margin-top:12px;padding:12px 16px;border:0;border-radius:10px;background:var(--red);color:#fff;font-weight:800;cursor:pointer}
  .rec{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .rec:last-child{border-bottom:0}
  .grade{width:38px;height:38px;border-radius:10px;background:rgba(225,29,42,.15);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:900}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}
  .soon{display:inline-block;font-size:11px;background:var(--inp);color:#aaa;padding:3px 9px;border-radius:20px;margin-top:6px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit" /></div>
    <h1>Medical Record</h1>
    <div class="muted">Hasil medical check-up & rekomendasi kamu.</div>

    <div class="card up" onclick="document.getElementById('mcufile').click()">
      <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></div>
      <div style="font-weight:800;margin-top:6px">Upload Medical Check-Up</div>
      <div class="muted">PDF / JPG / PNG dari faskes mana pun — dianalisa otomatis dengan AI</div>
    </div>
    <input id="mcufile" type="file" accept="image/*,application/pdf" style="display:none" onchange="analyzeMCU(event)" />
    <div id="result"></div>

    <div class="card">
      <div style="font-weight:800;margin-bottom:6px">Riwayat</div>
      <div id="list"><div class="empty">Memuat…</div></div>
    </div>
  </div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script>
    const AI_URL="https://cpvzwqptzcxnwzfzgrmt.supabase.co/functions/v1/my20fit-ai";
    const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnp3cXB0emN4bnd6Znpncm10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzE0MzksImV4cCI6MjA5MTIwNzQzOX0.DIP-tTFxa3GHMhT6b1Tq-Zz0a24P-vbU9ixEtITbqpI";
    let user=null;
    function fileURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}

    async function analyzeMCU(e){
      const f=e.target.files[0];if(!f)return;
      const box=document.getElementById("result");
      box.innerHTML='<div class="card"><div class="muted">Membaca & menganalisa dokumen… ⏳ (bisa 10-30 detik)</div></div>';
      try{
        const url=await fileURL(f);
        const r=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},body:JSON.stringify({action:"mcu",file:url,mime:f.type})});
        const j=await r.json();
        if(!r.ok||!j.result)throw new Error(j.error||"Gagal menganalisa dokumen");
        renderResult(j.result);
        try{await Auth.supabase.from("my20fit_mcu_result").insert({auth_user_id:user.id,result:j.result,analyzed_at:new Date().toISOString()});loadList();}catch(err){}
      }catch(err){box.innerHTML='<div class="card" style="color:#ff6b6b">'+err.message+'</div>'}
      e.target.value="";
    }
    function renderResult(res){
      const params=(res.parameters||[]).map(p=>{
        const att=p.status==="attention";
        return '<div style="padding:10px 0;border-bottom:1px solid var(--line)"><div style="display:flex;justify-content:space-between"><b>'+p.label+'</b><span style="color:'+(att?"#ff8a8a":"#7fe0a8")+';font-weight:700">'+(p.value||"")+'</span></div><div class="muted">Normal: '+(p.normal_range||"-")+'</div><div style="font-size:13px;margin-top:4px">'+(p.explanation||"")+'</div></div>';
      }).join("");
      const unread=(res.unreadable&&res.unreadable.length)?'<div class="card" style="border-color:#5a4020;background:#2a2410;color:#ffcf66"><b>Bagian yang tidak terbaca:</b><ul style="margin:6px 0 0 18px">'+res.unreadable.map(u=>'<li>'+u+'</li>').join("")+'</ul></div>':"";
      document.getElementById("result").innerHTML=
        '<div class="card"><div style="font-weight:800">'+(res.document_type||"Hasil MCU")+'</div><div class="muted">'+[res.patient_name,res.date].filter(Boolean).join(" · ")+'</div><div style="margin-top:8px">'+(res.summary||"")+'</div></div>'+
        (params?'<div class="card"><div style="font-weight:800;margin-bottom:4px">Parameter</div>'+params+'</div>':"")+
        unread+
        '<div class="card" style="border-color:rgba(196,17,1,.3);background:rgba(196,17,1,.08);color:#ffb3b8;font-size:13px">⚠️ '+(res.disclaimer||"Interpretasi ini bukan pengganti konsultasi dokter. Konsultasikan ke dokter 20fit untuk saran yang tepat.")+'</div>';
    }
    async function loadList(){
      let rows=[];
      try{const {data}=await Auth.supabase.from("my20fit_mcu_result").select("*").eq("auth_user_id",user.id).order("created_at",{ascending:false});rows=data||[]}catch(e){}
      const el=document.getElementById("list");
      if(!rows.length){el.innerHTML='<div class="empty">Belum ada hasil MCU.<br>Upload hasil check-up kamu di atas.</div>';return}
      el.innerHTML=rows.map(r=>{const res=r.result||{};const date=(r.analyzed_at||r.created_at||"").slice(0,10);
        return '<div class="rec"><div class="grade"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:var(--red);stroke-width:2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div style="flex:1;cursor:pointer"><div style="font-weight:700">'+(res.document_type||"Hasil MCU")+'</div><div class="muted">'+date+'</div></div></div>';
      }).join("");
    }
    (async function(){ user=await Auth.requireAuth(); loadList(); })();
  </script>
</body>
</html>
