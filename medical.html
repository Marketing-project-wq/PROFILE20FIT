<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medical Record · 20fit</title>
<style>
  :root{--red:#e11d2a;--bg:#0a0a0a;--card:#141414;--line:#262626;--txt:#f5f5f5;--muted:#8a8a8a;--inp:#1c1c1c}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:22px 18px 70px}
  .wrap{max-width:640px;margin:0 auto}
  .logo img{height:38px;margin-bottom:16px}
  h1{font-size:24px;font-weight:900;margin:0 0 4px;text-transform:uppercase}
  .muted{color:var(--muted);font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:14px}
  .up{border:1px dashed var(--red);background:rgba(225,29,42,.06);text-align:center;cursor:pointer}
  .up .ic{font-size:34px}
  .btn{margin-top:12px;padding:12px 16px;border:0;border-radius:10px;background:var(--red);color:#fff;font-weight:800;cursor:pointer}
  .rec{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .rec:last-child{border-bottom:0}
  .grade{width:38px;height:38px;border-radius:10px;background:rgba(225,29,42,.15);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:900}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}
  .soon{display:inline-block;font-size:11px;background:var(--inp);color:#aaa;padding:3px 9px;border-radius:20px;margin-top:6px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit" /></div>
    <h1>Medical Record</h1>
    <div class="muted">Hasil medical check-up & rekomendasi kamu.</div>

    <div class="card up" onclick="uploadSoon()">
      <div class="ic">📄</div>
      <div style="font-weight:800;margin-top:6px">Upload Medical Check-Up</div>
      <div class="muted">PDF / JPG / PNG dari faskes mana pun</div>
      <div class="soon">Analisa otomatis (AI) segera hadir</div>
    </div>

    <div class="card">
      <div style="font-weight:800;margin-bottom:6px">Riwayat</div>
      <div id="list"><div class="empty">Memuat…</div></div>
    </div>
  </div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script>
    function uploadSoon(){alert("Fitur upload + analisa hasil lab (AI) lagi disiapin ya. Sebentar lagi bisa dipakai!");}
    (async function(){
      const user=await Auth.requireAuth();
      let rows=[];
      try{const {data}=await Auth.supabase.from("my20fit_mcu_result").select("*").eq("auth_user_id",user.id).order("created_at",{ascending:false});rows=data||[]}catch(e){}
      const el=document.getElementById("list");
      if(!rows.length){el.innerHTML='<div class="empty">Belum ada hasil MCU.<br>Upload hasil check-up kamu di atas.</div>';return}
      el.innerHTML=rows.map(r=>{
        const res=r.result||{};const grade=res.grade||"–";const date=(r.created_at||"").slice(0,10);
        return `<div class="rec"><div class="grade">${grade}</div><div><div style="font-weight:700">${res.document_type||"Hasil MCU"}</div><div class="muted">${date} · ${res.source||"upload"}</div></div></div>`;
      }).join("");
    })();
  </script>
</body>
</html>
