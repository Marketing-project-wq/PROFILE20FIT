<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calorie Tracker · 20fit</title>
<style>
  :root{--red:#C41101;--bg:#0b0b0c;--card:#FFFFFF;--line:#E8E2DB;--txt:#0A0908;--muted:#8A7C68;--inp:#F0EDE5;--dark:#000000;--pagetx:#EDE8DF;--pagemut:#9a907f}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--pagetx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:22px 18px 70px}
  .wrap{max-width:640px;margin:0 auto}
  .logobar{background:var(--dark);border-radius:16px;padding:13px 18px;margin-bottom:14px;display:flex;align-items:center}
  .logobar img{height:36px}
  h1{font-size:24px;font-weight:900;margin:0 0 12px;text-transform:uppercase}
  .sec{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--pagemut);font-weight:700;margin:20px 2px 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.3);color:var(--txt)}
  .ring{text-align:center}
  .ring .tlbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .ring .num{font-size:60px;font-weight:900;line-height:1;color:var(--red);margin:4px 0 2px}
  .ring .goal{color:var(--muted);font-size:13px}
  .rem{font-size:13px;color:var(--txt);margin-top:10px}
  .rem b{color:var(--red)}
  .bar{height:10px;background:var(--inp);border-radius:6px;overflow:hidden;margin-top:10px}
  .bar i{display:block;height:100%;background:var(--red);width:0;transition:width .35s}
  .scanbtn{width:100%;padding:14px;border:0;border-radius:11px;background:var(--red);color:#fff;font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .ormanual{font-size:11px;color:var(--muted);margin:14px 0 6px;text-align:center;text-transform:uppercase;letter-spacing:1px}
  .add{display:flex;gap:8px}
  .add input{flex:1;padding:11px;background:var(--inp);border:1px solid var(--line);border-radius:10px;color:var(--txt)}
  .add input.k{flex:0 0 90px}
  .add input:focus{outline:none;border-color:var(--red)}
  .add button{padding:11px 14px;border:0;border-radius:10px;background:var(--red);color:#fff;font-weight:800;cursor:pointer}
  .item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:0}
  .item .kc{color:var(--muted)}
  .muted{color:var(--muted);font-size:13px}
  /* meal tabs + recipes */
  .mtabs{display:flex;gap:8px;margin-bottom:10px}
  .mtabs button{flex:1;padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer}
  .mtabs button.on{border-color:var(--red);background:rgba(196,17,1,.08);color:var(--red)}
  .dish{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .dish:last-child{margin-bottom:0}
  .dhead{display:flex;align-items:center;gap:12px}
  .dhead .di{width:40px;height:40px;border-radius:10px;background:rgba(196,17,1,.10);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .dhead .di svg{width:21px;height:21px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .dhead .dn{font-weight:800;font-size:15px}
  .dhead .dk{font-size:12px;color:var(--muted)}
  .rlink{color:var(--red);font-weight:700;font-size:13px;cursor:pointer;background:none;border:0;padding:8px 0 0;font-family:inherit}
  .recipe{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;font-size:13.5px}
  .recipe h4{margin:6px 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .recipe ul,.recipe ol{margin:4px 0;padding-left:18px;line-height:1.6}
  .raddbtn{margin-top:10px;padding:10px 12px;border:0;border-radius:10px;background:var(--inp);color:var(--txt);font-weight:700;cursor:pointer;font-size:13px}
  .macros{margin-top:14px;text-align:left;display:flex;flex-direction:column;gap:9px}
  .macro .mtop{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:3px}
  .macro .mv{color:var(--muted);font-weight:600}
  .mbar{height:8px;background:var(--inp);border-radius:6px;overflow:hidden}
  .mbar>i{display:block;height:100%;width:0;transition:width .35s}
  #pBar{background:#C41101}#cBar{background:#3b82f6}#fBar{background:#C87000}
  /* termometer kalori */
  .thermowrap{display:flex;align-items:center;gap:20px;justify-content:center;margin:8px 0 4px;text-align:left}
  .thermo{position:relative;width:34px;height:150px;flex:0 0 auto}
  .thframe{position:absolute;top:0;left:8px;width:18px;height:128px;border:3px solid var(--line);border-bottom:0;border-radius:11px 11px 0 0;background:var(--inp)}
  .thmerc{position:absolute;left:11px;width:12px;bottom:30px;height:0;background:linear-gradient(180deg,#ff7a45,#C41101);border-radius:6px 6px 0 0;transition:height .55s cubic-bezier(.2,.8,.2,1)}
  .thbulb{position:absolute;bottom:0;left:2px;width:30px;height:30px;border-radius:50%;background:#C41101;border:3px solid var(--line)}
  .thnums{min-width:0}
  .thnums .num{font-size:46px}
  .togo{margin-top:8px;font-size:13px;color:var(--muted)}
  .togo b{font-size:24px;color:var(--red);font-family:'JetBrains Mono',monospace;margin-right:4px}
  .mtime{font-size:11px;color:var(--muted);font-weight:600;margin-left:6px}
  /* intermittent fasting */
  .ifopt{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .ifopt:last-child{border-bottom:0}
  .ifname{font-weight:800;font-size:14px}
  .ifdesc{font-size:12px;color:var(--muted);line-height:1.4}
  .ifpick{flex:0 0 auto;background:var(--red);color:#fff;border-radius:9px;padding:8px 12px;font-weight:800;font-size:12px}
  .ifhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .ifchange{background:none;border:0;color:var(--red);font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
  .ifstate{display:inline-block;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:20px}
  .ifstate.eat{background:rgba(42,122,79,.15);color:#2A7A4F}
  .ifstate.fast{background:rgba(200,112,0,.15);color:#C87000}
  .iftime{font-size:24px;font-weight:900;margin-top:8px;font-family:'JetBrains Mono',monospace}
  .iftl{position:relative;height:14px;background:var(--inp);border-radius:7px;margin:12px 0 4px}
  .iftl .seg{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,#2A7A4F,#34c759);border-radius:7px}
  .iftl .now{position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--red);border-radius:2px}
  .iftlx{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
  .ifremind{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;background:var(--inp);border-radius:10px;padding:10px 12px}
  .ifremind button{border:0;border-radius:9px;padding:9px 13px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
  .rbtn-on{background:var(--red);color:#fff}.rbtn-off{background:#dfe9e0;color:#2A7A4F}
  .ifplan{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
  .ifplanrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 0}
  .ifplanrow b{font-family:'JetBrains Mono',monospace}
  .ifexplore{width:100%;margin-top:12px;background:var(--inp);border:1px solid var(--line);border-radius:11px;padding:13px;font-weight:800;font-size:13px;color:var(--txt);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
  .ifexplore #ifChev{color:var(--red);font-size:11px}
  .ifgroups{margin-top:4px}
  .iflvl{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;font-size:12px;color:var(--red);margin:16px 0 0}
  .ifquick{border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--inp);margin-top:4px}
  .calgrid{display:grid;grid-template-columns:1fr;gap:14px}
  .calcol{display:flex;flex-direction:column;gap:0}
  @media(min-width:900px){ .wrap{max-width:920px} .calgrid{grid-template-columns:1fr 1fr;align-items:start} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logobar"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20fit" /></div>
    <h1 data-i18n="cal_title">Calorie Tracker</h1>

    <div class="calgrid">
     <div class="calcol">
    <div class="card ring">
      <div class="tlbl" data-i18n="cal_targetlbl">Your daily calorie target</div>
      <div class="thermowrap">
        <div class="thermo">
          <div class="thframe"></div>
          <div class="thmerc" id="thmerc"></div>
          <div class="thbulb"></div>
        </div>
        <div class="thnums">
          <div class="num" id="goal">2000</div>
          <div class="goal" data-i18n="cal_perday">kcal / day — from your BMI & profile</div>
          <div class="togo"><b id="togo">0</b> <span id="togoLbl" data-i18n="cal_togo">kcal to go</span></div>
          <div class="rem"><span data-i18n="cal_eaten">Eaten</span> <b id="consumed">0</b> · <span data-i18n="cal_left">Left</span> <b id="remain">0</b> kcal</div>
        </div>
      </div>
      <div class="bar" style="display:none"><i id="calbar"></i></div>

      <div class="macros">
        <div class="macro"><div class="mtop"><span data-i18n="cal_protein">Protein</span><span class="mv" id="pVal">0 / 0g</span></div><div class="mbar"><i id="pBar"></i></div></div>
        <div class="macro"><div class="mtop"><span data-i18n="cal_carbs">Carbs</span><span class="mv" id="cVal">0 / 0g</span></div><div class="mbar"><i id="cBar"></i></div></div>
        <div class="macro"><div class="mtop"><span data-i18n="cal_fat">Fat</span><span class="mv" id="fVal">0 / 0g</span></div><div class="mbar"><i id="fBar"></i></div></div>
      </div>

      <div id="scanbox" style="margin-top:14px;display:flex;gap:10px">
        <button class="scanbtn" style="flex:1" onclick="document.getElementById('foodcam').click()">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
          <span>📷 <span data-i18n="cal_takephoto">Take photo</span></span>
        </button>
        <button class="scanbtn" style="flex:1;background:var(--inp);color:var(--txt);border:1px solid var(--line)" onclick="document.getElementById('foodfile').click()">
          <span>🖼️ <span data-i18n="cal_album">Album</span></span>
        </button>
      </div>
      <!-- kamera langsung (Android & iOS bisa foto) -->
      <input id="foodcam" type="file" accept="image/*" capture="environment" style="display:none" onchange="scanFood(event)" />
      <!-- pilih dari galeri/album -->
      <input id="foodfile" type="file" accept="image/*" style="display:none" onchange="scanFood(event)" />
      <div id="scanresult" style="margin-top:12px"></div>

      <div class="ormanual" data-i18n="cal_ortype">or type food + grams (auto kcal)</div>
      <div class="add">
        <input id="fname" data-i18n-ph="cal_foodname" placeholder="Food name" />
        <input id="fgram" class="k" type="number" data-i18n-ph="cal_grams" placeholder="grams" />
        <button id="estBtn" onclick="estimateFood()" title="auto kcal">⚡</button>
      </div>
      <div id="estresult" class="muted" style="margin-top:8px"></div>
    </div>
    <div id="ifSection"></div>
     </div>
     <div class="calcol">
    <div class="sec" data-i18n="cal_today_sec" style="margin-top:0">Today's Food</div>
    <div class="card"><div id="log"></div></div>

    <div class="sec" id="mealideas" data-i18n="cal_recs">Meal Ideas & Recipes</div>
    <div class="card">
      <div class="mtabs">
        <button data-m="breakfast" class="on" onclick="pickMeal('breakfast')" data-i18n="meal_breakfast">Breakfast</button>
        <button data-m="lunch" onclick="pickMeal('lunch')" data-i18n="meal_lunch">Lunch</button>
        <button data-m="dinner" onclick="pickMeal('dinner')" data-i18n="meal_dinner">Dinner</button>
      </div>
      <div id="meals"></div>
    </div>
     </div>
    </div>
  </div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="fasting.js"></script>
  <script src="nav.js"></script>
  <script>
    function todayKey(){const d=new Date();return "my20fit_cal_"+d.toISOString().slice(0,10)}
    let goal=2000, baseGoal=2000, profileRef=null, items=[], curGoal="health", macroT={p:120,c:230,f:60};
    function recompute(){ goal=Fasting.adjustGoal(baseGoal); if(profileRef)macroT=calcMacros(profileRef); }
    function calcGoal(p){
      const w=+p.weight_kg,h=+p.height_cm,age=+p.age||25;
      if(!w||!h)return 2000;
      const bmr=10*w+6.25*h-5*age+(p.gender==="female"?-161:5);
      const af={sedentary:1.2,light:1.375,moderate:1.55,active:1.725}[p.activity_level]||1.375;
      let tdee=bmr*af;
      const g=p.main_goal;tdee+=(g==="lose"?-400:g==="muscle"?300:g==="fit"?100:0);
      return Math.max(1200,Math.round(tdee/10)*10);
    }
    // Target makro dari kalori + berat + tujuan (protein per kg badan)
    function calcMacros(p){
      const w=+p.weight_kg||0, g=p.main_goal;
      const proteinG = w ? Math.round(w*(g==="muscle"?1.8:g==="lose"?1.6:1.4)) : Math.round(goal*0.25/4);
      const fatG = Math.round(goal*0.25/9);
      let carbsG = Math.round((goal - proteinG*4 - fatG*9)/4);
      if(carbsG<0) carbsG = Math.round(goal*0.45/4);
      return {p:proteinG,c:carbsG,f:fatG};
    }
    function load(){try{items=JSON.parse(localStorage.getItem(todayKey())||"[]")}catch(e){items=[]}}
    let calSaveT=null;
    function save(){
      localStorage.setItem(todayKey(),JSON.stringify(items));               // cache cepat di device
      if(calSaveT)clearTimeout(calSaveT);
      calSaveT=setTimeout(function(){ try{ if(window.Auth&&Auth.saveDaily)Auth.saveDaily({cal_items:items}); }catch(e){} },500); // simpan ke AKUN (cross-device)
    }
    // Ambil catatan kalori hari ini dari akun (biar muncul di device manapun)
    async function loadCalFromCloud(){
      try{
        const d=await Auth.getDailyLog();
        if(d && Array.isArray(d.cal_items)){ items=d.cal_items; localStorage.setItem(todayKey(),JSON.stringify(items)); render();renderMeals(); }
        else if(items && items.length){ if(window.Auth&&Auth.saveDaily)Auth.saveDaily({cal_items:items}); } // ada di device, belum di akun -> dorong ke akun
      }catch(e){}
    }
    function kc(){return L({en:"kcal",id:"kkal"})}
    function setMacro(id,val,tot,bar){
      document.getElementById(id).textContent=Math.round(val)+" / "+tot+"g";
      document.getElementById(bar).style.width=Math.min(tot?val/tot*100:0,100)+"%";
    }
    function render(){
      const total=items.reduce((s,i)=>s+(+i.kcal||0),0);
      const tp=items.reduce((s,i)=>s+(+i.p||0),0), tc=items.reduce((s,i)=>s+(+i.c||0),0), tf=items.reduce((s,i)=>s+(+i.f||0),0);
      document.getElementById("consumed").textContent=total;
      document.getElementById("goal").textContent=goal;
      const left=goal-total;
      document.getElementById("remain").textContent=Math.max(0,left);
      // termometer + sisa kalori
      const frac=Math.min(total/goal,1);
      document.getElementById("thmerc").style.height=(frac*108)+"px";
      const togo=document.getElementById("togo"), togoLbl=document.getElementById("togoLbl");
      if(left>=0){ togo.textContent=left; togo.style.color="var(--red)"; togoLbl.textContent=I18N.t("cal_togo"); }
      else { togo.textContent=Math.abs(left); togo.style.color="#C87000"; togoLbl.textContent=I18N.t("cal_over"); }
      document.getElementById("calbar").style.width=Math.min(total/goal*100,100)+"%";
      setMacro("pVal",tp,macroT.p,"pBar");
      setMacro("cVal",tc,macroT.c,"cBar");
      setMacro("fVal",tf,macroT.f,"fBar");
      const log=document.getElementById("log");
      log.innerHTML=items.length?items.map((i,idx)=>`<div class="item"><span>${i.name}${i.t?`<span class="mtime">${i.t}</span>`:""}</span><span class="kc">${i.kcal} ${kc()} <a onclick="del(${idx})" style="color:var(--red);cursor:pointer;margin-left:8px">✕</a></span></div>`).join(""):'<div class="muted">'+I18N.t("cal_empty")+'</div>';
    }
    async function estimateFood(){
      const name=document.getElementById("fname").value.trim();
      const gram=parseInt(document.getElementById("fgram").value,10);
      const out=document.getElementById("estresult");
      if(!name||!gram){out.style.color="var(--red)";out.textContent=I18N.t("cal_needboth");return}
      const btn=document.getElementById("estBtn");btn.disabled=true;
      out.style.color="";out.textContent=I18N.t("cal_estimating");
      try{
        const r=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},body:JSON.stringify({action:"food",text:name+", "+gram+" gram",lang:I18N.lang})});
        const j=await r.json();
        if(!r.ok||!j.result)throw new Error(j.error||L({en:"Estimate failed",id:"Gagal menghitung"}));
        const it=(j.result.items&&j.result.items[0])||{};
        const kcal=Math.round(j.result.total_kcal||it.kcal||0);
        if(!kcal)throw new Error(j.result.note||L({en:"Couldn't estimate that.",id:"Tidak bisa menghitung itu."}));
        addToLog(name+" ("+gram+"g)",kcal,it.protein_g,it.carbs_g,it.fat_g);
        out.style.color="#2A7A4F";out.textContent="+"+kcal+" "+kc()+" · "+name+" ("+gram+"g)";
        document.getElementById("fname").value="";document.getElementById("fgram").value="";
      }catch(e){out.style.color="var(--red)";out.textContent=e.message;}
      btn.disabled=false;
    }
    function nowHM(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
    function addToLog(name,kcal,p,c,f){items.push({name:name,kcal:Math.round(kcal)||0,p:Math.round(+p||0),c:Math.round(+c||0),f:Math.round(+f||0),t:nowHM()});save();render();}
    function del(i){items.splice(i,1);save();render()}

    // ---- Scan makanan (AI vision via OpenRouter/Gemini) ----
    const AI_URL="https://cpvzwqptzcxnwzfzgrmt.supabase.co/functions/v1/my20fit-ai";
    const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnp3cXB0emN4bnd6Znpncm10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzE0MzksImV4cCI6MjA5MTIwNzQzOX0.DIP-tTFxa3GHMhT6b1Tq-Zz0a24P-vbU9ixEtITbqpI";
    let lastScan=[];
    // perkecil gambar dulu biar cepat
    function fileURL(f){
      return new Promise(async(resolve,reject)=>{
        const r=new FileReader();
        r.onload=()=>{
          const img=new Image();
          img.onload=()=>{
            const MAX=1100;let{width:w,height:h}=img;
            if(Math.max(w,h)>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
            const c=document.createElement("canvas");c.width=w;c.height=h;
            c.getContext("2d").drawImage(img,0,0,w,h);
            resolve(c.toDataURL("image/jpeg",0.8));
          };
          img.onerror=()=>resolve(r.result);
          img.src=r.result;
        };
        r.onerror=reject;r.readAsDataURL(f);
      });
    }
    async function scanFood(e){
      const f=e.target.files[0];if(!f)return;
      e.target.value="";
      try{ const url=await fileURL(f); scanImage(url); }
      catch(err){ document.getElementById("scanresult").innerHTML='<div style="color:var(--red)">'+(err.message||"Error")+'</div>'; }
    }
    // Analisa 1 foto makanan (dipakai tombol Foto/Album & tombol Scan global)
    async function scanImage(url){
      const box=document.getElementById("scanresult");
      box.innerHTML='<div class="muted">'+I18N.t("cal_analysing")+'</div>';
      try{
        const r=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON},body:JSON.stringify({action:"food",image:url,lang:I18N.lang})});
        const j=await r.json();
        if(!r.ok||!j.result)throw new Error(j.error||L({en:"Analysis failed",id:"Gagal menganalisa"}));
        const res=j.result;lastScan=res.items||[];
        if(!lastScan.length){box.innerHTML='<div class="muted">'+(res.note||L({en:"No food detected in the photo.",id:"Gak kedeteksi makanan di foto."}))+'</div>';return}
        box.innerHTML='<div style="font-weight:800;margin-bottom:6px">'+I18N.t("cal_detected")+' · ~'+(res.total_kcal||0)+' '+kc()+'</div>'+
          lastScan.map(i=>'<div class="item"><span>'+i.name+'</span><span class="kc">'+i.kcal+' '+kc()+'</span></div>').join('')+
          '<button class="scanbtn" style="margin-top:10px" onclick="addScanned()">'+I18N.t("cal_addlog")+'</button>'+
          (res.note?'<div class="muted" style="margin-top:8px">'+res.note+'</div>':'');
      }catch(err){box.innerHTML='<div style="color:var(--red)">'+err.message+'</div>'}
    }
    function addScanned(){lastScan.forEach(i=>addToLog(i.name,i.kcal,i.protein_g,i.carbs_g,i.fat_g));document.getElementById("scanresult").innerHTML='<div style="color:#2A7A4F">'+I18N.t("cal_added")+'</div>'}

    // ---- Ide menu + resep (sarapan / makan siang / makan malam) ----
    const RECIPES={
      breakfast:[
        {n:{en:"Oats, Banana & Honey",id:"Oat, Pisang & Madu"},k:350,
         ing:{en:["50g rolled oats","200ml low-fat milk","1 banana","1 tbsp honey","Pinch of cinnamon"],id:["50g oat","200ml susu rendah lemak","1 pisang","1 sdm madu","Sejumput kayu manis"]},
         st:{en:["Cook oats with milk over low heat 3–4 min.","Pour into a bowl, slice banana on top.","Drizzle honey & sprinkle cinnamon."],id:["Masak oat dengan susu, api kecil 3–4 menit.","Tuang ke mangkuk, iris pisang di atasnya.","Tambah madu & taburi kayu manis."]}},
        {n:{en:"Veggie Egg Omelette",id:"Telur Dadar Sayur"},k:280,
         ing:{en:["2 eggs","Handful spinach","1/4 onion","1 tomato","Pinch salt & pepper","1 tsp olive oil"],id:["2 telur","Segenggam bayam","1/4 bawang bombay","1 tomat","Sejumput garam & lada","1 sdt minyak zaitun"]},
         st:{en:["Whisk eggs with salt & pepper.","Sauté onion, tomato & spinach 2 min.","Pour eggs, cook until set, fold & serve."],id:["Kocok telur dengan garam & lada.","Tumis bawang, tomat & bayam 2 menit.","Tuang telur, masak hingga matang, lipat & sajikan."]}}
      ],
      lunch:[
        {n:{en:"Grilled Chicken & Rice Bowl",id:"Nasi Ayam Panggang"},k:520,
         ing:{en:["150g chicken breast","150g cooked rice","Mixed veggies","1 tbsp soy sauce","1 tsp olive oil","Garlic & pepper"],id:["150g dada ayam","150g nasi","Sayuran campur","1 sdm kecap asin","1 sdt minyak zaitun","Bawang putih & lada"]},
         st:{en:["Marinate chicken with soy, garlic & pepper.","Grill/pan-sear 4–5 min each side.","Steam veggies, serve over rice."],id:["Lumuri ayam dengan kecap, bawang putih & lada.","Panggang 4–5 menit tiap sisi.","Kukus sayur, sajikan di atas nasi."]}},
        {n:{en:"Tuna Avocado Salad",id:"Salad Tuna Alpukat"},k:380,
         ing:{en:["1 can tuna in water","1/2 avocado","Lettuce & tomato","1 tbsp lemon juice","Olive oil, salt"],id:["1 kaleng tuna (air)","1/2 alpukat","Selada & tomat","1 sdm air lemon","Minyak zaitun, garam"]},
         st:{en:["Drain tuna, slice avocado & tomato.","Toss with lettuce.","Dress with lemon, olive oil & salt."],id:["Tiriskan tuna, iris alpukat & tomat.","Campur dengan selada.","Beri air lemon, minyak zaitun & garam."]}}
      ],
      dinner:[
        {n:{en:"Baked Fish & Veggies",id:"Ikan Panggang & Sayur"},k:420,
         ing:{en:["150g white fish fillet","Broccoli & carrot","1 tsp olive oil","Lemon, garlic, salt & pepper"],id:["150g fillet ikan putih","Brokoli & wortel","1 sdt minyak zaitun","Lemon, bawang putih, garam & lada"]},
         st:{en:["Season fish with lemon, garlic, salt & pepper.","Place with veggies on a tray, drizzle oil.","Bake 200°C ~15–18 min."],id:["Bumbui ikan dengan lemon, bawang putih, garam & lada.","Letakkan bersama sayur di loyang, beri minyak.","Panggang 200°C ~15–18 menit."]}},
        {n:{en:"Tofu & Veggie Stir-fry",id:"Tumis Tahu Sayur"},k:340,
         ing:{en:["200g firm tofu","Mixed stir-fry veggies","1 tbsp soy sauce","Garlic, ginger","1 tsp sesame oil"],id:["200g tahu padat","Sayuran tumis campur","1 sdm kecap asin","Bawang putih, jahe","1 sdt minyak wijen"]},
         st:{en:["Pan-fry cubed tofu until golden.","Add garlic, ginger & veggies, stir 3 min.","Season with soy & sesame oil, serve."],id:["Goreng tahu kotak hingga keemasan.","Tambah bawang putih, jahe & sayur, tumis 3 menit.","Bumbui kecap & minyak wijen, sajikan."]}}
      ]
    };
    let curMeal="breakfast", openDish=-1;
    const dishIcon='<svg viewBox="0 0 24 24"><path d="M3 2v7c0 1.1.9 2 2 2a2 2 0 0 0 2-2V2"/><path d="M5 2v20"/><path d="M21 15V2a5 5 0 0 0-3 9v11"/></svg>';
    function pickMeal(m){curMeal=m;openDish=-1;document.querySelectorAll('.mtabs button').forEach(b=>b.classList.toggle("on",b.dataset.m===m));renderMeals();}
    function toggleRecipe(i){openDish=(openDish===i)?-1:i;renderMeals();}
    function renderMeals(){
      const list=RECIPES[curMeal]||[];
      document.getElementById("meals").innerHTML=list.map((d,i)=>{
        const open=openDish===i;
        let html='<div class="dish"><div class="dhead"><div class="di">'+dishIcon+'</div>'+
          '<div style="flex:1"><div class="dn">'+L(d.n)+'</div><div class="dk">~'+d.k+' '+kc()+'</div></div></div>'+
          '<button class="rlink" onclick="toggleRecipe('+i+')">'+(open?I18N.t("recipe_hide"):I18N.t("recipe_view"))+'</button>';
        if(open){
          html+='<div class="recipe"><h4>'+I18N.t("recipe_ing")+'</h4><ul>'+L(d.ing).map(x=>'<li>'+x+'</li>').join("")+'</ul>'+
            '<h4>'+I18N.t("recipe_steps")+'</h4><ol>'+L(d.st).map(x=>'<li>'+x+'</li>').join("")+'</ol>'+
            '<button class="raddbtn" onclick="addToLog(\''+L(d.n).replace(/'/g,"")+'\','+d.k+')">'+I18N.t("recipe_add")+' ('+d.k+' '+kc()+')</button></div>';
        }
        return html+'</div>';
      }).join("");
    }

    // ---- Intermittent Fasting ----
    // Tipe puasa dikelompokkan per level biar gampang dipilih
    const IF_LEVELS=[
      {t:{en:"Beginner",id:"Pemula"},      ids:["14:10"]},
      {t:{en:"Intermediate",id:"Menengah"},ids:["16:8","18:6"]},
      {t:{en:"Advanced",id:"Lanjut"},      ids:["20:4","omad"]},
      {t:{en:"Special",id:"Khusus"},       ids:["5:2"]}
    ];
    let ifExploreOpen=false;
    function toggleIFExplore(){ ifExploreOpen=!ifExploreOpen; renderIF(); }
    function ifOptHTML(s){return '<div class="ifopt" onclick="chooseIF(\''+s.id+'\')"><div style="flex:1"><div class="ifname">'+L(s.name)+'</div><div class="ifdesc">'+L(s.desc)+'</div></div><span class="ifpick">'+L({en:"Choose",id:"Pilih"})+'</span></div>';}
    function ifGroupsHTML(){
      return '<div class="ifgroups">'+IF_LEVELS.map(g=>{
        const items=g.ids.map(id=>Fasting.styleById(id)).filter(Boolean);
        if(!items.length)return"";
        return '<div class="iflvl">'+L(g.t)+'</div>'+items.map(ifOptHTML).join("");
      }).join("")+'</div>';
    }
    function renderIF(){
      const el=document.getElementById("ifSection"); if(!el)return;
      const c=Fasting.get();
      if(!c){
        const pop=Fasting.styleById("16:8");
        el.innerHTML='<div class="sec">'+L({en:"Intermittent Fasting",id:"Intermittent Fasting"})+'</div>'+
          '<div class="card">'+
            '<div class="ifname" style="font-size:16px">'+L({en:"Adopt a fasting style",id:"Adopsi gaya puasa"})+'</div>'+
            '<div class="muted" style="font-size:13px;margin:4px 0 12px">'+L({en:"Fasting can sharpen your calorie deficit. Start with the most popular, or explore by level.",id:"Puasa bisa mempertajam defisit kalorimu. Mulai dari yang paling populer, atau jelajahi per level."})+'</div>'+
            '<div class="ifquick"><div class="ifopt" style="border:0;padding:0" onclick="chooseIF(\'16:8\')"><div style="flex:1"><div class="ifname">⭐ 16:8 · '+L({en:"Most popular",id:"Paling populer"})+'</div><div class="ifdesc">'+(pop?L(pop.desc):"")+'</div></div><span class="ifpick">'+L({en:"Choose",id:"Pilih"})+'</span></div></div>'+
            '<button class="ifexplore" onclick="toggleIFExplore()">'+(ifExploreOpen?L({en:"Hide styles",id:"Sembunyikan gaya"}):L({en:"Explore all styles",id:"Jelajahi semua gaya"}))+' <span id="ifChev">'+(ifExploreOpen?'▲':'▼')+'</span></button>'+
            (ifExploreOpen?ifGroupsHTML():'')+
          '</div>';
        return;
      }
      const st=Fasting.state(), s=st.style;
      let body;
      // Rencana kalori sesuai style (total tetap, dibagi per makan dalam jendela)
      function planBlock(){
        if(s.weekly){
          return '<div class="ifplan"><div class="ifplanrow"><span>'+L({en:"Normal days (5/wk)",id:"Hari normal (5/mgg)"})+'</span><b>'+goal+' '+kc()+'</b></div>'+
            '<div class="ifplanrow"><span>'+L({en:"Fast days (2/wk)",id:"Hari puasa (2/mgg)"})+'</span><b style="color:var(--red)">~500–600 '+kc()+'</b></div></div>';
        }
        const meals=Fasting.mealsFor(s.id), perMeal=Math.max(1,Math.round(goal/meals/10)*10), adj=goal!==baseGoal;
        return '<div class="ifplan"><div class="ifplanrow"><span>'+L({en:"Daily target",id:"Target harian"})+'</span><b>'+(adj?'<span style="color:var(--muted);text-decoration:line-through;font-weight:400">'+baseGoal+'</span> ':'')+goal+' '+kc()+'</b></div>'+
          (adj?'<div class="muted" style="font-size:11px;margin:-2px 0 4px">'+L({en:"Adjusted for "+s.id+" fasting",id:"Disesuaikan untuk puasa "+s.id})+'</div>':'')+
          '<div class="ifplanrow"><span>'+L({en:"Meals in your window",id:"Makan dalam jendelamu"})+'</span><b>'+meals+'×</b></div>'+
          '<div class="ifplanrow"><span>'+L({en:"≈ per meal",id:"≈ per makan"})+'</span><b style="color:var(--red)">'+perMeal+' '+kc()+'</b></div></div>';
      }
      if(st.weekly){ body='<div class="muted">'+L(s.desc)+'</div>'+planBlock(); }
      else {
        const hrs=Math.floor(st.untilMin/60), mn=st.untilMin%60;
        const sp=String(st.chosen.start).split(":").map(Number), startM=sp[0]*60+sp[1], span=s.eat*60;
        const nd=new Date(), curM=nd.getHours()*60+nd.getMinutes(), a=((startM%1440)+1440)%1440, bb=a+span;
        let segs=(bb<=1440)?'<div class="seg" style="left:'+(a/14.4)+'%;width:'+(span/14.4)+'%"></div>'
          :'<div class="seg" style="left:'+(a/14.4)+'%;width:'+((1440-a)/14.4)+'%"></div><div class="seg" style="left:0;width:'+((bb-1440)/14.4)+'%"></div>';
        const tl='<div class="iftl">'+segs+'<div class="now" style="left:'+(curM/14.4)+'%"></div></div><div class="iftlx"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>';
        const on=Fasting.notifEnabled();
        const remind='<div class="ifremind"><div><div style="font-weight:800;font-size:13px">🔔 '+L({en:"Meal reminders",id:"Pengingat makan"})+'</div><div class="muted" style="font-size:11px">'+L({en:"Notify me when the window opens / closes",id:"Ingatkan saat jendela buka / tutup"})+'</div></div>'+(on?'<button class="rbtn-off" onclick="toggleReminders()">'+L({en:"On ✓",id:"Aktif ✓"})+'</button>':'<button class="rbtn-on" onclick="toggleReminders()">'+L({en:"Enable",id:"Aktifkan"})+'</button>')+'</div>';
        body='<span class="ifstate '+(st.eating?"eat":"fast")+'">'+(st.eating?L({en:"Eating window",id:"Jendela makan"}):L({en:"Fasting",id:"Sedang puasa"}))+'</span>'+
          '<div class="iftime">'+hrs+'h '+mn+'m</div>'+
          '<div class="muted" style="font-size:13px">'+(st.eating?L({en:"left in your eating window",id:"sisa di jendela makanmu"}):L({en:"until your eating window",id:"sampai jendela makanmu"}))+'</div>'+
          tl+
          '<div class="muted" style="margin-top:4px">'+L({en:"Eating window",id:"Jendela makan"})+': <b>'+st.window.start+' – '+st.window.end+'</b></div>'+
          '<div style="margin-top:10px"><span class="muted" style="font-size:12px">'+L({en:"Start eating at",id:"Mulai makan jam"})+'</span> <input type="time" value="'+st.chosen.start+'" onchange="setIFStart(this.value)" style="padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--inp);color:var(--txt);font-family:inherit"></div>'+planBlock()+remind;
      }
      el.innerHTML='<div class="sec">'+L({en:"Intermittent Fasting",id:"Intermittent Fasting"})+'</div>'+
        '<div class="card"><div class="ifhead"><div class="ifname" style="font-size:16px">'+L(s.name)+'</div><button class="ifchange" onclick="changeIF()">'+L({en:"Change style",id:"Ganti gaya"})+'</button></div>'+body+'</div>';
    }
    // simpan preferensi puasa ke akun (buat notifikasi email server-side)
    async function saveFastingPrefs(notify){
      if(!profileRef||!profileRef.auth_user_id)return;
      const c=Fasting.get();
      const row={auth_user_id:profileRef.auth_user_id,email:profileRef.email||null,updated_at:new Date().toISOString(),notify_email:!!notify};
      if(c){const s=Fasting.styleById(c.id);row.style=c.id;row.start_time=c.start||"12:00";row.eat_hours=s?s.eat:8;}
      else{row.style=null;row.start_time=null;} // gaya puasa dihapus -> kosongin juga di akun
      try{await Auth.supabase.from("my20fit_fasting").upsert(row,{onConflict:"auth_user_id"});}catch(e){}
    }
    async function toggleReminders(){
      if(Fasting.notifEnabled()){ Fasting.disableReminders(); await saveFastingPrefs(false); renderIF(); return; }
      const r=await Fasting.enableReminders(); await saveFastingPrefs(true); renderIF();
      if(!r.web){ alert(L({en:"Email reminders are ON. (Browser notifications are blocked — allow them in settings for on-device alerts too.)",id:"Pengingat EMAIL aktif. (Notifikasi browser diblokir — izinkan di pengaturan kalau mau notif di HP juga.)"})); }
    }
    function chooseIF(id){Fasting.set({id:id,start:"12:00"});recompute();render();renderIF();saveFastingPrefs(Fasting.notifEnabled());}
    function changeIF(){Fasting.clear();recompute();render();renderIF();saveFastingPrefs(false);}
    function setIFStart(v){const c=Fasting.get()||{};c.start=v;Fasting.set(c);renderIF();saveFastingPrefs(Fasting.notifEnabled());}
    // Ambil pilihan puasa dari akun kalau device ini belum punya (cross-device)
    async function loadIFFromCloud(){
      try{ if(Fasting.get())return; const {data}=await Auth.supabase.from("my20fit_fasting").select("style,start_time").eq("auth_user_id",profileRef.auth_user_id).limit(1); const r=data&&data[0]; if(r&&r.style){ Fasting.set({id:r.style,start:String(r.start_time||"12:00").slice(0,5)}); recompute(); renderIF(); } }catch(e){}
    }

    (async function(){
      const p=await Auth.getProfile();
      profileRef=p; baseGoal=calcGoal(p); curGoal=p.main_goal||"health";
      recompute();
      load();render();renderMeals();renderIF();
      loadCalFromCloud();   // sinkron kalori dari akun
      loadIFFromCloud();    // sinkron gaya puasa dari akun
      if(location.hash==="#scan"){document.getElementById("scanbox").scrollIntoView({behavior:"smooth"});}
      // Foto dari tombol "Scan" global (halaman lain) -> langsung analisa di sini
      try{ const pend=sessionStorage.getItem("my20fit_pending_scan"); if(pend){ sessionStorage.removeItem("my20fit_pending_scan"); document.getElementById("scanbox").scrollIntoView({behavior:"smooth"}); scanImage(pend); } }catch(e){}
      if(location.hash==="#fasting"){document.getElementById("ifSection").scrollIntoView({behavior:"smooth"});}
    })();
    setInterval(renderIF,60000); // update countdown tiap menit
    I18N.onChange(()=>{render();renderMeals();renderIF();});
  </script>
</body>
</html>
