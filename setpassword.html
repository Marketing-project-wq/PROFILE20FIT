<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buat Password · 20FIT</title>
<style>
  :root{--red:#C41101;--bg:#F3F2F0;--card:#FFFFFF;--ink:#1A1714;--muted:#8C8578;--line:#ECE8E1;--inp:#F3F2F0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px 16px}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:28px 24px;box-shadow:0 1px 2px rgba(20,16,12,.05),0 12px 30px rgba(20,16,12,.06)}
  .logo{display:block;height:44px;margin:0 auto 18px}
  h2{margin:0 0 4px;font-size:22px;text-align:center;font-weight:800}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px;text-align:center;line-height:1.5}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:16px 0 6px}
  input{width:100%;padding:14px;background:var(--inp);border:1px solid var(--line);border-radius:12px;color:var(--ink);font-size:15px;font-family:inherit}
  input:focus{outline:none;border-color:var(--red)}
  .btn{width:100%;margin-top:22px;padding:15px;border:0;border-radius:13px;background:var(--red);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .btn:disabled{opacity:.6}
  .msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px;color:var(--red)}
</style>
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<link rel="stylesheet" href="css/20fit-design-system.css">
<link rel="stylesheet" href="css/glass-app.css">
</head>
<body>
  <div class="card">
    <img class="logo" src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20FIT" style="filter:brightness(0)" />
    <h2 id="ttl">Buat Password</h2>
    <div class="sub" id="sub"></div>
    <label id="l1">Password Baru</label>
    <input id="pw" type="password" autocomplete="new-password" placeholder="min. 8 karakter" />
    <label id="l2">Ulangi Password</label>
    <input id="pw2" type="password" autocomplete="new-password" placeholder="ketik ulang" />
    <button class="btn" id="save" onclick="save()">Simpan & Lanjut</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="js/vendor-supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    function tx(){
      const id = (window.I18N && I18N.lang==="id");
      document.getElementById("ttl").textContent = id?"Buat Password":"Create a Password";
      document.getElementById("sub").textContent = id
        ? "Akunmu berhasil terhubung. Buat password dulu untuk masuk & login berikutnya."
        : "Your account is connected. Create a password to enter and for your next logins.";
      document.getElementById("l1").textContent = id?"Password Baru":"New Password";
      document.getElementById("l2").textContent = id?"Ulangi Password":"Repeat Password";
      document.getElementById("save").textContent = id?"Simpan & Lanjut":"Save & Continue";
    }
    (async function(){
      const user = await Auth.requireAuth();      // wajib sudah login
      if (Auth.hasWebPassword(user)) { Auth.routeAfterAuth(); return; } // sudah punya -> lanjut
      tx(); if(window.I18N&&I18N.onChange) I18N.onChange(tx);
    })();
    async function save(){
      const id = (window.I18N && I18N.lang==="id");
      const pw=document.getElementById("pw").value, pw2=document.getElementById("pw2").value;
      const msg=document.getElementById("msg");
      if(!pw||pw.length<8) return msg.textContent = id?"Password minimal 8 karakter.":"Password must be at least 8 characters.";
      if(pw!==pw2) return msg.textContent = id?"Password tidak sama, ulangi.":"Passwords don't match.";
      const btn=document.getElementById("save"); btn.disabled=true;
      try{
        await Auth.setWebPassword(pw);
        await Auth.routeAfterAuth();   // -> onboarding (kalau baru) / dashboard
      }catch(e){ msg.textContent = e.message || (id?"Gagal simpan.":"Failed to save."); btn.disabled=false; }
    }
  </script>
</body>
</html>
