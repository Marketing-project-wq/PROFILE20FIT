\u002Fdiv>\n              <div><p style=\"font-size:17px;font-weight:600;color:#0A0908;margin-bottom:6px;\">Scanning document...<\u002Fp><p style=\"font-size:13px;color:#9E8E7A;\">Securely uploading and identifying contents<\u002Fp><\u002Fdiv>\n              <div class=\"card\" style=\"width:100%;max-width:400px;\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px;\"><div style=\"width:7px;height:7px;border-radius:50%;background:#C41101;flex-shrink:0;animation:spin 1.5s linear infinite;\"><\u002Fdiv><span style=\"font-size:12px;color:#9E8E7A;\">Encrypting and uploading file...<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;\"><div style=\"width:7px;height:7px;border-radius:50%;background:#DDD5C8;flex-shrink:0;\"><\u002Fdiv><span style=\"font-size:12px;color:#B8AFA5;\">Identifying document contents...<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Upload state: result + plan (combined) -->\n          <sc-if value=\"{{ uploadDone }}\">\n            <!-- Document result -->\n            <div class=\"scan-result\" style=\"margin-bottom:24px;\">\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\">\n                <div class=\"grade-badge\">A<\u002Fdiv>\n                <div>\n                  <p style=\"font-family:'Anton',sans-serif;font-size:20px;color:#0A0908;margin-bottom:3px;\">Annual Health Screening<\u002Fp>\n                  <p style=\"font-size:12px;color:#9E8E7A;\">15 Mar 2025 · RS Pondok Indah · Reviewed by dr. Amelia, Sp.KO<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#F7F5F2;border-radius:10px;padding:14px;margin-bottom:14px;\">\n                <p style=\"font-size:13px;color:#555;line-height:1.65;\">This document contains results from an annual health screening with 22 parameters including blood panel, liver function, kidney function, lipid profile, and glucose metabolism.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:rgba(196,17,1,0.04);border:1px solid rgba(196,17,1,0.12);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start;\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"flex-shrink:0;margin-top:1px;\"><circle cx=\"7\" cy=\"7\" r=\"5.5\" stroke=\"#C41101\" stroke-width=\"1.1\" fill=\"none\"><\u002Fcircle><path d=\"M7 4.5v3\" stroke=\"#C41101\" stroke-width=\"1.2\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"7\" cy=\"9.5\" r=\".6\" fill=\"#C41101\"><\u002Fcircle><\u002Fsvg>\n                <p style=\"font-size:11px;color:#C41101;line-height:1.5;\">Automatic document summary — not a medical diagnosis. Your 20FIT doctor reviews all records.<\u002Fp>\n              <\u002Fdiv>\n              <span class=\"sec-label\">Parameters Found in Document<\u002Fspan>\n              <p style=\"font-size:11px;color:#9E8E7A;margin-bottom:14px;line-height:1.6;\">Values extracted from your document. These are not interpreted by us — consult your 20FIT doctor for proper medical advice.<\u002Fp>\n\n              <!-- Abnormal parameters — highlighted -->\n              <div style=\"background:rgba(196,17,1,0.04);border:1.5px solid rgba(196,17,1,0.18);border-radius:14px;padding:14px 16px;margin-bottom:12px;\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;\">\n                  <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"7\" r=\"5.5\" stroke=\"#C41101\" stroke-width=\"1.2\" fill=\"none\"><\u002Fcircle><path d=\"M7 4.5v3\" stroke=\"#C41101\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"7\" cy=\"9.5\" r=\".7\" fill=\"#C41101\"><\u002Fcircle><\u002Fsvg>\n                  <span style=\"font-size:10px;font-weight:700;color:#C41101;text-transform:uppercase;letter-spacing:1.5px;\">Needs Attention<\u002Fspan>\n                <\u002Fdiv>\n                <!-- LDL row -->\n                <div style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(196,17,1,0.1);\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\">\n                    <p style=\"font-size:13px;font-weight:600;color:#0A0908;flex:1;\">LDL Cholesterol<\u002Fp>\n                    <span style=\"font-size:12px;font-weight:700;color:#C41101;font-family:'JetBrains Mono',monospace;\">118 mg/dL<\u002Fspan>\n                    <span style=\"font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(196,17,1,0.1);color:#C41101;\">Borderline High<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"font-size:11px;color:#555;line-height:1.6;margin-bottom:4px;\"><strong>Normal range:<\u002Fstrong> below 100 mg/dL (optimal) or below 130 mg/dL (near-optimal)<\u002Fp>\n                  <p style=\"font-size:11px;color:#555;line-height:1.6;margin-bottom:4px;\"><strong>What this value means:<\u002Fstrong> LDL is a type of cholesterol carried in the blood. A value of 118 mg/dL falls in the borderline-high range (100–129 mg/dL).<\u002Fp>\n                  <p style=\"font-size:11px;color:#9E8E7A;line-height:1.6;\">This does not mean you have a disease. It is a value to monitor — your doctor can advise if lifestyle changes or follow-up tests are needed.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- Normal parameters -->\n              <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:14px;padding:14px 16px;margin-bottom:14px;\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;\">\n                  <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><circle cx=\"6\" cy=\"6\" r=\"5\" stroke=\"#2A7A4F\" stroke-width=\"1.2\" fill=\"none\"><\u002Fcircle><path d=\"M3.5 6l2 2 3-3\" stroke=\"#2A7A4F\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <span style=\"font-size:10px;font-weight:700;color:#2A7A4F;text-transform:uppercase;letter-spacing:1.5px;\">Within Normal Range<\u002Fspan>\n                <\u002Fdiv>\n                <!-- Hemoglobin -->\n                <div style=\"display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F7F5F2;\">\n                  <div style=\"flex:1;\">\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px;\">\n                      <p style=\"font-size:13px;font-weight:600;color:#0A0908;\">Hemoglobin<\u002Fp>\n                      <span style=\"font-size:11px;font-weight:600;color:#2A7A4F;font-family:'JetBrains Mono',monospace;\">13.8 g/dL<\u002Fspan>\n                      <span style=\"margin-left:auto;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(42,122,79,0.08);color:#2A7A4F;\">Normal ✓<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"font-size:11px;color:#9E8E7A;line-height:1.5;\"><strong>Normal range (female):<\u002Fstrong> 12.0–16.0 g/dL · <strong>What it measures:<\u002Fstrong> The protein in red blood cells that carries oxygen throughout your body.<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- Blood Glucose -->\n                <div style=\"display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F7F5F2;\">\n                  <div style=\"flex:1;\">\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px;\">\n                      <p style=\"font-size:13px;font-weight:600;color:#0A0908;\">Fasting Blood Glucose<\u002Fp>\n                      <span style=\"font-size:11px;font-weight:600;color:#2A7A4F;font-family:'JetBrains Mono',monospace;\">92 mg/dL<\u002Fspan>\n                      <span style=\"margin-left:auto;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(42,122,79,0.08);color:#2A7A4F;\">Normal ✓<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"font-size:11px;color:#9E8E7A;line-height:1.5;\"><strong>Normal range:<\u002Fstrong> below 100 mg/dL · <strong>What it measures:<\u002Fstrong> The amount of glucose (sugar) in your blood after not eating for at least 8 hours.<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- Creatinine -->\n                <div style=\"display:flex;align-items:flex-start;gap:10px;padding:10px 0;\">\n                  <div style=\"flex:1;\">\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px;\">\n                      <p style=\"font-size:13px;font-weight:600;color:#0A0908;\">Creatinine<\u002Fp>\n                      <span style=\"font-size:11px;font-weight:600;color:#2A7A4F;font-family:'JetBrains Mono',monospace;\">0.8 mg/dL<\u002Fspan>\n                      <span style=\"margin-left:auto;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(42,122,79,0.08);color:#2A7A4F;\">Normal ✓<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"font-size:11px;color:#9E8E7A;line-height:1.5;\"><strong>Normal range (female):<\u002Fstrong> 0.5–1.1 mg/dL · <strong>What it measures:<\u002Fstrong> A waste product filtered by your kidneys — used to assess kidney function.<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- Overall grade -->\n              <div style=\"background:#F7F5F2;border:1px solid #EDE8DF;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;\">\n                <div style=\"width:48px;height:48px;border-radius:12px;background:#0A0908;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                  <span style=\"font-family:'Anton',sans-serif;font-size:28px;color:#F0EDE6;line-height:1;\">A<\u002Fspan>\n                <\u002Fdiv>\n                <div>\n                  <p style=\"font-size:13px;font-weight:600;color:#0A0908;margin-bottom:2px;\">Overall Document Grade: A<\u002Fp>\n                  <p style=\"font-size:11px;color:#9E8E7A;line-height:1.5;\">22 parameters checked · 1 value to monitor (LDL). This grade reflects the contents of the document — not a medical assessment.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"margin-top:4px;\">\n                <button class=\"btn-secondary\" style=\"width:auto;padding:9px 20px;font-size:12px;\" onclick=\"{{ resetUpload }}\">← Back to Records<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ── EXERCISE RECOMMENDATIONS FROM MCU ── -->\n            <div style=\"margin-bottom:24px;\">\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\">\n                <div style=\"flex:1;height:1px;background:#EDE8DF;\"><\u002Fdiv>\n                <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;letter-spacing:3px;color:#9E8E7A;text-transform:uppercase;\">Exercise for Your Results<\u002Fspan>\n                <div style=\"flex:1;height:1px;background:#EDE8DF;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font-size:11px;color:#9E8E7A;margin-bottom:14px;line-height:1.6;\">Based on what was found in your document. Confirm with your 20FIT doctor before starting any new program.<\u002Fp>\n              <!-- EMS -->\n              <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;\">\n                <div style=\"width:44px;height:44px;border-radius:10px;background:#0A0908;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:700;color:#F0EDE6;letter-spacing:.5px;\">EMS<\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <p style=\"font-size:13px;font-weight:600;color:#0A0908;margin-bottom:3px;\">EMS Training<\u002Fp>\n                  <p style=\"font-size:11px;color:#555;line-height:1.6;margin-bottom:6px;\">Why for your results: Your LDL (118 mg/dL) is borderline high. EMS activates up to 90% of muscle fibres simultaneously, which is proven to improve lipid metabolism and cardiovascular markers efficiently — making it highly suitable for your profile.<\u002Fp>\n                  <div style=\"display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"background:#F0EDE5;border-radius:5px;padding:2px 9px;font-size:10px;color:#555;\">2–3×/week<\u002Fspan><span style=\"background:#F0EDE5;border-radius:5px;padding:2px 9px;font-size:10px;color:#555;\">20 min<\u002Fspan><span style=\"background:#F0EDE5;border-radius:5px;padding:2px 9px;font-size:10px;color:#555;\">Supervised<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <button style=\"background:#C41101;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;\">Book →<\u002Fbutton>\n              <\u002Fdiv>\n              <!-- Personal Training -->\n              <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;\">\n                <div style=\"width:44px;height:44px;border-radius:10px;background:#F0EDE5;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:700;color:#0A0908;letter-spacing:.5px;\">PT<\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <p style=\"font-size:13px;font-weight:600;color:#0A0908;margin-bottom:3px;\">Personal Training<\u002Fp>\n                  <p style=\"font-size:11px;color:#555;line-height:1.6;margin-bottom:6px;\">Why for your results: Structured cardio + resistance training under a trainer is the most effective long-term approach for managing LDL through exercise — especially combined with your glucose levels, which are currently healthy.<\u002Fp>\n                  <div style=\"display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"background:#F0EDE5;border-radius:5px;padding:2px 9px;font-size:10px;color:#555;\">3–4×/week<\u002Fspan><span style=\"background:#F0EDE5;border-radius:5px;padding:2px 9px;font-size:10px;color:#555;\">60 min<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <button style=\"background:#0A0908;color:#F0EDE6;border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;\">Book →<\u002Fbutton>\n              <\u002Fdiv>\n              <!-- Physiotherapy -->\n              <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;\">\n                <div style=\"width:44px;height:44px;border-radius:10px;background:#F7F5F2;border:1px solid #E8E2DB;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:700;color:#9E8E7A;letter-spacing:.5px;\">PHY<\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <p style=\"font-size:13px;font-weight:600;color:#0A0908;margin-bottom:3px;\">Physiotherapy Assessment<\u002Fp>\n                  <p style=\"font-size:11px;color:#555;line-height:1.6;margin-bottom:6px;\">Before increasing exercise intensity, a physio check ensures your joints and muscles are ready — reducing injury risk as you ramp up your cardiovascular program.<\u002Fp>\n                  <div style=\"display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"background:#F0EDE5;border-radius:5px;padding:2px 9px;font-size:10px;color:#555;\">1× initial<\u002Fspan><span style=\"background:#F0EDE5;border-radius:5px;padding:2px 9px;font-size:10px;color:#9E8E7A;\">Optional<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <button style=\"background:#F0EDE5;color:#555;border:1px solid #E8E2DB;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;\">Book →<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ── FOOD RECOMMENDATIONS FROM MCU ── -->\n            <div style=\"margin-bottom:24px;\">\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\">\n                <div style=\"flex:1;height:1px;background:#EDE8DF;\"><\u002Fdiv>\n                <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;letter-spacing:3px;color:#9E8E7A;text-transform:uppercase;\">Nutrition for Your Results<\u002Fspan>\n                <div style=\"flex:1;height:1px;background:#EDE8DF;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font-size:11px;color:#9E8E7A;margin-bottom:14px;line-height:1.6;\">Food guidance based on what was found in your document. These are general nutritional considerations — not a prescribed diet.<\u002Fp>\n\n              <!-- Because of high LDL -->\n              <div style=\"background:#fff;border:1.5px solid rgba(196,17,1,0.15);border-radius:14px;padding:16px;margin-bottom:10px;\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px;\">\n                  <span style=\"font-size:9px;font-weight:700;padding:2px 10px;border-radius:20px;background:rgba(196,17,1,0.07);color:#C41101;\">Because of borderline LDL<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                  <div style=\"display:flex;gap:10px;align-items:flex-start;\"><div style=\"width:5px;height:5px;border-radius:50%;background:#C41101;flex-shrink:0;margin-top:5px;\"><\u002Fdiv><p style=\"font-size:12px;color:#0A0908;line-height:1.6;\"><strong>Eat more omega-3 rich foods<\u002Fstrong> — salmon, mackerel, sardines, walnuts, flaxseed. Omega-3 fatty acids are known to help maintain healthy LDL and HDL balance.<\u002Fp><\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;align-items:flex-start;\"><div style=\"width:5px;height:5px;border-radius:50%;background:#C41101;flex-shrink:0;margin-top:5px;\"><\u002Fdiv><p style=\"font-size:12px;color:#0A0908;line-height:1.6;\"><strong>Increase soluble fibre<\u002Fstrong> — oats, barley, legumes (lentils, chickpeas), apples, and psyllium. Soluble fibre binds cholesterol in the digestive system and helps remove it from the body.<\u002Fp><\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;align-items:flex-start;\"><div style=\"width:5px;height:5px;border-radius:50%;background:#C41101;flex-shrink:0;margin-top:5px;\"><\u002Fdiv><p style=\"font-size:12px;color:#0A0908;line-height:1.6;\"><strong>Reduce saturated fats<\u002Fstrong> — limit red meat, full-fat dairy, fried foods, and processed snacks. Saturated fat is associated with raising LDL levels.<\u002Fp><\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;align-items:flex-start;\"><div style=\"width:5px;height:5px;border-radius:50%;background:#555;flex-shrink:0;margin-top:5px;\"><\u002Fdiv><p style=\"font-size:12px;color:#0A0908;line-height:1.6;\"><strong>Add plant sterols<\u002Fstrong> — found in fortified foods (some margarine, yoghurt). Plant sterols can help block cholesterol absorption.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- Because glucose is normal -->\n              <div style=\"background:#F7F5F2;border:1px solid #EDE8DF;border-radius:14px;padding:16px;margin-bottom:10px;\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px;\">\n                  <span style=\"font-size:9px;font-weight:700;padding:2px 10px;border-radius:20px;background:rgba(42,122,79,0.08);color:#2A7A4F;\">Blood glucose is normal — maintain it<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                  <div style=\"display:flex;gap:10px;align-items:flex-start;\"><div style=\"width:5px;height:5px;border-radius:50%;background:#2A7A4F;flex-shrink:0;margin-top:5px;\"><\u002Fdiv><p style=\"font-size:12px;color:#0A0908;line-height:1.6;\"><strong>Eat complex carbohydrates<\u002Fstrong> — brown rice, sweet potato, whole grain bread. These digest slower and keep blood sugar stable throughout the day.<\u002Fp><\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;align-items:flex-start;\"><div style=\"width:5px;height:5px;border-radius:50%;background:#2A7A4F;flex-shrink:0;margin-top:5px;\"><\u002Fdiv><p style=\"font-size:12px;color:#0A0908;line-height:1.6;\"><strong>Space meals evenly<\u002Fstrong> — eating every 3–4 hours prevents blood sugar spikes and crashes, which helps maintain your current healthy glucose level.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- Consult nutritionist CTA -->\n              <div style=\"background:#0A0908;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;\">\n                <div style=\"width:38px;height:38px;border-radius:10px;background:rgba(196,17,1,0.15);border:1px solid rgba(196,17,1,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><circle cx=\"8\" cy=\"6\" r=\"2.5\" stroke=\"#C41101\" stroke-width=\"1.1\" fill=\"none\"><\u002Fcircle><path d=\"M2.5 13c0-2.5 2.5-4.5 5.5-4.5s5.5 2 5.5 4.5\" stroke=\"#C41101\" stroke-width=\"1.1\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"flex:1;\"><p style=\"font-size:12px;font-weight:600;color:#F0EDE6;margin-bottom:1px;\">Want a full meal plan?<\u002Fp><p sty ;\">\n                <div class=\"plan-code\" style=\"background:#0A0908;color:#F0EDE6;border-color:#0A0908;\">EMS<\u002Fdiv>\n                <div style=\"flex:1;\"><p class=\"plan-name\">EMS Training<\u002Fp><p class=\"plan-tag\">20 min = 90 min conventional workout<\u002Fp><\u002Fdiv>\n                <span class=\"priority-tag priority-tag-high\">Priority<\u002Fspan>\n              <\u002Fdiv>\n              <p class=\"plan-reason\">Activates up to 90% of muscle fibres simultaneously — highly efficient for fat reduction and cardiovascular conditioning, directly addressing the LDL finding.<\u002Fp>\n              <div style=\"display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;\">\n                <span style=\"background:#F0EDE5;border-radius:6px;padding:3px 10px;font-size:10px;color:#555;\">2×/week<\u002Fspan>\n                <span style=\"background:#F0EDE5;border-radius:6px;padding:3px 10px;font-size:10px;color:#555;\">20 min<\u002Fspan>\n              <\u002Fdiv>\n              <button class=\"btn-primary\" style=\"margin-top:12px;\">Learn &amp; Register →<\u002Fbutton>\n            <\u002Fdiv>\n\n            <div class=\"plan-product-card priority-med\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;\">\n                <div class=\"plan-code\">PHY<\u002Fdiv>\n                <div style=\"flex:1;\"><p class=\"plan-name\">Physiotherapy<\u002Fp><p class=\"plan-tag\">Restore movement · prevent injury<\u002Fp><\u002Fdiv>\n                <span class=\"priority-tag priority-tag-med\">Suggested<\u002Fspan>\n              <\u002Fdiv>\n              <p class=\"plan-reason\">Before increasing intensity, a physio assessment ensures your musculoskeletal system is ready and reduces injury risk.<\u002Fp>\n              <button class=\"btn-primary\" style=\"margin-top:12px;\">Learn &amp; Register →<\u002Fbutton>\n            <\u002Fdiv>\n\n            <div class=\"plan-product-card priority-med\">\n              <div style= u002Fdiv>\n            <sc-for list=\"{{ goals }}\" as=\"goal\" hint-placeholder-count=\"3\">\n              <div class=\"goal-card\">\n                <div class=\"goal-icon\" style=\"background:{{ goal.iconBg }};border:1px solid {{ goal.iconBorderC }};\">\n                  <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"7\" r=\"5.5\" stroke=\"{{ goal.iconColor }}\" stroke-width=\"1.1\" fill=\"none\"><\u002Fcircle><circle cx=\"7\" cy=\"7\" r=\"3\" stroke=\"{{ goal.iconColor }}\" stroke-width=\"1.1\" fill=\"none\"><\u002Fcircle><circle cx=\"7\" cy=\"7\" r=\"1\" fill=\"{{ goal.iconColor }}\"><\u002Fcircle><\u002Fsvg>\n                <\u002Fdiv>\n                <sc-if value=\"{{ goal.isEditing }}\">\n                  <input class=\"goal-input\" value=\"{{ editText }}\" onchange=\"{{ onEditText }}\" data-goal-input=\"true\">\n                  <div style=\"display:flex;gap:6px;\">\n                    <button class=\"btn-primary\" style=\"width:auto;padding:7px 14px;font-size:12px;\" onclick=\"{{ goal.save }}\">Save<\u002Fbutton>\n                    <button class=\"btn-secondary\" style=\"width:auto;padding:7px 12px;font-size:12px;\" onclick=\"{{ goal.cancel }}\">Cancel<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ goal.isView }}\">\n                  <p class=\"goal-text\">{{ goal.text }}<\u002Fp>\n                  <div class=\"goal-actions\">\n                    <div class=\"icon-btn\" onclick=\"{{ goal.onEdit }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M8 1.5L10.5 4L4 10.5H1.5V8L8 1.5Z\" stroke=\"#9E8E7A\" stroke-width=\"1.1\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                    <div class=\"icon-btn\" onclick=\"{{ goal.onDelete }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M1.5 3h9M4 3V2h4v1M4.5 9.5V5M7.5 9.5V5\" stroke=\"#9E8E7A\" stroke-width=\"1.1 v>\n                <div style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;background:#F7F5F2;border-radius:10px;border:1px solid #EDE8DF;\">\n                  <div style=\"width:28px;height:28px;border-radius:7px;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><div style=\"width:8px;height:8px;border-radius:50%;background:#555;\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1;\"><p style=\"font-size:12px;font-weight:600;color:#0A0908;margin-bottom:1px;\">Luteal · Days 17–28<\u002Fp><p style=\"font-size:11px;color:#9E8E7A;\">Moderate pace. Group class, physio, walking.<\u002Fp><\u002Fdiv>\n                  <div style=\"display:flex;gap:2px;\"><div style=\"width:6px;height:16px;background:#555;border-radius:2px;opacity:0.5;\"><\u002Fdiv><div style=\"width:6px;height:22px;background:#555;border-radius:2px;opacity:0.7;\"><\u002Fdiv><div style=\"width:6px;height:18px;background:#555;border-radius:2px;opacity:0.6;\"><\u002Fdiv><div style=\"width:6px;height:14px;background:#555;border-radius:2px;opacity:0.5;\"><\u002Fdiv><div style=\"width:6px;height:10px;background:#DDD5C8;border-radius:2px;\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Calendar & Workouts (merged into Progress) -->\n          <div style=\"margin-top:28px;\">\n            <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px;\">\n              <div style=\"flex:1;height:1px;background:#EDE8DF;\"><\u002Fdiv>\n              <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;color:#9E8E7A;text-transform:uppercase;white-space:nowrap;\">Calendar &amp; Workouts<\u002Fspan>\n              <div style=\"flex:1;height:1px;background:#EDE8DF;\"><\u002Fdiv>\n            <\u002Fdiv>\n\n\n          <!-- Month calendar -->\n          <div class=\"cal-grid-wrap\">\n            <div class=\"cal-month-nav\">\n              <button class=\"cal-nav-btn\" onclick=\"{{ calPrevMonth }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M7.5 9L4.5 6l3-3\" stroke=\"#9E8E7A\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n              <p class=\"cal-month-title\">{{ calMonthLabel }}<\u002Fp>\n              <button class=\"cal-nav-btn\" onclick=\"{{ calNextMonth }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M4.5 9l3-3-3-3\" stroke=\"#9E8E7A\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"cal-day-headers\">\n              <div class=\"cal-day-hdr\">Mon<\u002Fdiv><div class=\"cal-day-hdr\">Tue<\u002Fdiv><div class=\"cal-day-hdr\">Wed<\u002Fdiv><div class=\"cal-day-hdr\">Thu<\u002Fdiv><div class=\"cal-day-hdr\">Fri<\u002Fdiv><div class=\"cal-day-hdr\">Sat<\u002Fdiv><div class=\"cal-day-hdr\">Sun<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"cal-cells\">\n              <sc-for list=\"{{ calCells }}\" as=\"cell\" hint-placeholder-count=\"35\">\n                <div class=\"cal-cell {{ cell.cls }}\" onclick=\"{{ cell.onClick }}\">\n                  <div class=\"cal-day-num\">{{ cell.day }}<\u002Fdiv>\n                  <!-- Session label -->\n                  <sc-if value=\"{{ cell.sessionLabel }}\">\n                    <div style=\"font-size:7px;font-weight:700;color:#C41101;text-align:center;line-height:1.2;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ cell.sessionLabel }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ cell.userWorkout }}\">\n                    <div style=\"font-size:7px;color:#555;text-align:center;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ cell.userWorkout }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div class=\"cal-dot-row\">\n                    <sc-if value=\"{{ cell.hasWorkout }}\"><div class=\"cal-dot\" style=\"background:#0A0908;\"><\u002Fdiv><\u002Fsc-if>\n                    <sc-if value=\"{{ cell.hasClass }}\"><div class=\"cal-dot\" style=\"background:#C41101;\"><\u002Fdiv><\u002Fsc-if>\n                    <sc-if value=\"{{ cell.isCycleDay }}\"><div class=\"cal-dot\" style=\"background:{{ cell.cycleColor }};\" title=\"Cycle\"><\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Legend -->\n          <div style=\"display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;\">\n            <div style=\"display:flex;align-items:center;gap:6px;\"><div class=\"cal-dot\" style=\"background:#0A0908;width:8px;height:8px;\"><\u002Fdiv><span style=\"font-size:11px;color:#9E8E7A;\">Workout<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px;\"><div class=\"cal-dot\" style=\"background:#C41101;width:8px;height:8px;\"><\u002Fdiv><span style=\"font-size:11px;color:#9E8E7A;\">Class Booked<\u002Fspan><\u002Fdiv>\n            <sc-if value=\"{{ isFemale }}\"><div style=\"display:flex;align-items:center;gap:6px;\"><div class=\"cal-dot\" style=\"background:rgba(196,17,1,0.4);width:8px;height:8px;\"><\u002Fdiv><span style=\"font-size:11px;color:#9E8E7A;\">Menstrual Cycle<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- Phase workout tip (female) -->\n          <sc-if value=\"{{ isFemale }}\">\n            <div style=\"background:{{ phaseBg }};border:1px solid {{ phaseBorder }};border-radius:16px;padding:18px;margin-bottom:20px;\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;\">\n                <div style=\"width:40px;height:40px;border-radius:10px;background:#fff;border:1px solid {{ phaseBorder }};display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                  <div style=\"width:12px;height:12px;border-radius:50%;background:{{ phaseColor }};\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;\">\n                    <p style=\"font-size:14px;font-weight:600;color:#0A0908;\">{{ phaseName }} Phase<\u002Fp>\n                    <span style=\"font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:{{ phaseColor }};color:#fff;\">{{ cycleCurrentDayLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"font-size:12px;color:#555;line-height:1.55;\">{{ phaseDesc }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <!-- Recommended services with Book buttons -->\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <sc-for list=\"{{ cycleRecs }}\" as=\"rec\" hint-placeholder-count=\"2\">\n                  <div style=\"background:#fff;border:1px solid {{ phaseBorder }};border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;\">\n                    <div style=\"width:32px;height:32px;border-radius:8px;background:{{ phaseBg }};border:1px solid {{ phaseBorder }};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;font-weight:700;color:{{ phaseColor }};\">{{ rec.code }}<\u002Fdiv>\n                    <div style=\"flex:1;min-width:0;\">\n                      <p style=\"font-size:13px;font-weight:600;color:#0A0908;margin-bottom:2px;\">{{ rec.name }}<\u002Fp>\n                      <p style=\"font-size:10px;color:#9E8E7A;line-height:1.4;\">{{ rec.why }}<\u002Fp>\n                    <\u002Fdiv>\n                    <button style=\"background:#0A0908;color:#F0EDE6;border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;\">Book →<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Planned workouts -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n            <span class=\"sec-label\" style=\"margin-bottom:0;\">Upcoming Workouts<\u002Fspan>\n            <button style=\"background:#C41101;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;\">\n              <svg width=\"11\" height=\"11\" viewBox=\"0 0 11 11\" fill=\"none\"><path d=\"M5.5 1v9M1 5.5h9\" stroke=\"#fff\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              Plan Workout\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <sc-for list=\"{{ upcomingWorkouts }}\" as=\"w\" hint-placeholder-count=\"3\">\n            <div class=\"workout-card\">\n              <div class=\"workout-icon\" style=\"background:{{ w.iconBg }};\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><path d=\"{{ w.iconPath }}\" stroke=\"{{ w.iconColor }}\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"flex:1;\">\n                <p class=\"workout-name\">{{ w.name }}<\u002Fp>\n                <p class=\"workout-meta\">{{ w.date }} · {{ w.duration }} · {{ w.location }}<\u002Fp>\n              <\u002Fdiv>\n              <span style=\"font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;background:{{ w.statusBg }};color:{{ w.statusColor }};\">{{ w.status }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- Book a class -->\n          <span class=\"sec-label\" style=\"margin-top:8px;\">Book a Class<\u002Fspan>\n          <p style=\"font-size:12px;color:#9E8E7A;margin-bottom:14px;line-height:1.6;\">Classes recommended based on your health plan and current cycle phase.<\u002Fp>\n          <sc-for list=\"{{ bookableClasses }}\" as=\"cls\" hint-placeholder-count=\"3\">\n            <div class=\"book-card\">\n              <div class=\"book-icon\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><circle cx=\"9\" cy=\"9\" r=\"7\" stroke=\"#C41101\" stroke-width=\"1.3\" fill=\"none\"><\u002Fcircle><path d=\"M9 5v4l3 2\" stroke=\"#C41101\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"flex:1;\">\n                <p class=\"book-name\">{{ cls.name }}<\u002Fp>\n                <p class=\"book-meta\">{{ cls.time }} · {{ cls.trainer }} · {{ cls.spots }} spots left<\u002Fp>\n              <\u002Fdiv>\n              <button style=\"background:#C41101;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;\">Book →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════ CALORIE TRACKER ════ -->\n      <sc-if value=\"{{ isCal }}\">\n        <div style=\"animation:fadeUp .28s ease both;\">\n          <span class=\"sec-label\">Calorie Tracker<\u002Fspan>\n          <h1 class=\"page-title\">Nutrition<\u002Fh1>\n          <p class=\"page-sub\" style=\"margin-bottom:20px;\">Daily intake, monthly progress &amp; food recommendations.<\u002Fp>\n\n          <!-- Calorie page tabs -->\n          <div class=\"page-tabs\">\n            <button class=\"page-tab {{ calTabTodayActive }}\" onclick=\"{{ switchCalToday }}\">Today<\u002Fbutton>\n            <button class=\"page-tab {{ calTabMonthActive }}\" onclick=\"{{ switchCalMonth }}\">Monthly<\u002Fbutton>\n            <button class=\"page-tab {{ calTabRecsActive }}\" onclick=\"{{ switchCalRecs }}\">Food Recs<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- ── TODAY TAB ── -->\n          <sc-if value=\"{{ calTabToday }}\">\n\n          <!-- Ring + macros -->\n          <div class=\"card\" style=\"margin-bottom:20px;\">\n            <div class=\"cal-ring-wrap\">\n              <div class=\"cal-ring\">\n                <svg width=\"140\" height=\"140\" viewBox=\"0 0 140 140\">\n                  <circle cx=\"70\" cy=\"70\" r=\"58\" fill=\"none\" stroke=\"#F0EDE5\" stroke-width=\"12\"><\u002Fcircle>\n                  <circle cx=\"70\" cy=\"70\" r=\"58\" fill=\"none\" stroke=\"#C41101\" stroke-width=\"12\" stroke-dasharray=\"{{ calDash }} 364\" stroke-linecap=\"round\"><\u002Fcircle>\n                <\u002Fsvg>\n                <div class=\"cal-ring-inner\">\n                  <span class=\"cal-ring-val\">{{ calConsumed }}<\u002Fspan>\n                  <span class=\"cal-ring-lbl\">of {{ calGoal }} kcal<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"macro-row\" style=\"flex:1;min-width:160px;\">\n                <div class=\"macro-item\">\n                  <span class=\"macro-name\">Protein<\u002Fspan>\n                  <div class=\"macro-bar-wrap\"><div class=\"macro-bar\" style=\"width:{{ protPct }}%;background:#C41101;\"><\u002Fdiv><\u002Fdiv>\n                  <span class=\"macro-val\">{{ protG }}g / 120g<\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"macro-item\">\n                  <span class=\"macro-name\">Carbs<\u002Fspan>\n                  <div class=\"macro-bar-wrap\"><div class=\"macro-bar\" style=\"width:{{ carbPct }}%;background:#0A0908;\"><\u002Fdiv><\u002Fdiv>\n                  <span class=\"macro-val\">{{ carbG }}g / 200g<\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"macro-item\">\n                  <span class=\"macro-name\">Fat<\u002Fspan>\n                  <div class=\"macro-bar-wrap\"><div class=\"macro-bar\" style= roke-width=\"1.1\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"flex:1;\"><p style=\"font-size:13px;font-weight:600;color:#C41101;\">Sign Out<\u002Fp><p style=\"font-size:11px;color:#9E8E7A;margin-top:1px;\">Log out of your account<\u002Fp><\u002Fdiv>\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M5 11l4-4-4-4\" stroke=\"#C41101\" stroke-width=\"1.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:11px;color:#B8AFA5;text-align:center;padding-bottom:20px;\">20FIT Health Profile · v1.0<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <!-- Logout confirm modal -->\n    <sc-if value=\"{{ logoutConfirm }}\">\n      <div class=\"logout-confirm\">\n        <div class=\"logout-card\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:rgba(196,17,1,0.08);border:1px solid rgba(196,17,1,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M8 11h10M14 7l4 4-4 4\" stroke=\"#C41101\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M12 4H5a2 2 0 00-2 2v10a2 2 0 002 2h7\" stroke=\"#C41101\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3>Sign Out?<\u002Fh3>\n          <p>You will be returned to the login screen. Your data is saved securely.<\u002Fp>\n          <button class=\"btn-primary\" style=\"margin-bottom:10px;\" onclick=\"{{ confirmLogout }}\">Yes, Sign Out<\u002Fbutton>\n          <button class=\"btn-secondary\" onclick=\"{{ cancelLogout }}\">Cancel<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── ADD WORKOUT MODAL ── -->\n    <sc-if value=\"{{ showAddWorko gap:8px;flex-wrap:wrap;\">\n              <sc-for list=\"{{ workoutTypeOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                <button style=\"padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid {{ opt.border }};background:{{ opt.bg }};color:{{ opt.color }};transition:all .15s;\" onclick=\"{{ opt.onSelect }}\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <input type=\"text\" value=\"{{ addWorkoutNote }}\" onchange=\"{{ onAddWorkoutNote }}\" placeholder=\"Add note (e.g. Morning run 5km)...\" style=\"width:100%;padding:11px 14px;border:1.5px solid #DDD5C8;border-radius:10px;font-size:13px;color:#0A0908;outline:none;font-family:'Inter',sans-serif;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;\">\n            <button style=\"flex:2;background:#C41101;color:#fff;border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(196,17,1,0.25);\" onclick=\"{{ saveWorkoutEntry }}\">Save →<\u002Fbutton>\n            <button style=\"flex:1;background:#F0EDE5;color:#555;border:none;border-radius:12px;padding:13px;font-size:12px;font-weight:500;cursor:pointer;\" onclick=\"{{ closeAddWorkout }}\">Cancel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── CONGRATS POPUP ── -->\n    <sc-if value=\"{{ showCongrats }}\">\n      <div class=\"congrats-overlay\" onclick=\"{{ dismissCongrats }}\">\n        <div class=\"congrats-card\" onclick=\"{{ stopProp }}\">\n          <span class=\"congrats-emoji\">🎉<\u002Fspan>\n          <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#C41101;margin-bottom:8px;\">Achievement Unlocked<\u002Fp>\n          <h2 style=\"font-family:'Anton',sans-serif;font-size:26px;color:#0A0908;margin-bottom:10px;line-height:1.1;\">{{ >\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M3 10L11 3L19 10V19H14V14H8V19H3V10Z\" stroke=\"#DDD5C8\" stroke-width=\"1.4\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n          <span class=\"bn-label\">Home<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"bn-item {{ medOn }}\" onclick=\"{{ goMed }}\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><rect x=\"3\" y=\"2\" width=\"13\" height=\"16\" rx=\"2\" stroke=\"#DDD5C8\" stroke-width=\"1.4\" fill=\"none\"><\u002Frect><path d=\"M7 7.5h7M7 11h5\" stroke=\"#DDD5C8\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"17.5\" cy=\"17.5\" r=\"4\" fill=\"#0A0908\" stroke=\"#DDD5C8\" stroke-width=\"1.2\"><\u002Fcircle><path d=\"M16 17.5h3M17.5 16v3\" stroke=\"#DDD5C8\" stroke-width=\"1.1\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <span class=\"bn-label\">Records<\u002Fspan>\n        <\u002Fbutton>\n\n        <button class=\"bn-item {{ progOn }}\" onclick=\"{{ goProg }}\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><polyline points=\"2,17 7,10 11,13 15,7 20,9\" stroke=\"#DDD5C8\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpolyline><\u002Fsvg>\n          <span class=\"bn-label\">Progress<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"bn-item {{ calOn }}\" onclick=\"{{ goCal }}\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><circle cx=\"11\" cy=\"11\" r=\"9\" stroke=\"#DDD5C8\" stroke-width=\"1.4\" fill=\"none\"><\u002Fcircle><path d=\"M11 6v5l4 2\" stroke=\"#DDD5C8\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <span class=\"bn-label\">Calories<\u002Fspan>\n        <\u002Fbutton>\n\n        <button class=\"bn-item {{ profileOn }}\" onclick=\"{{ goProfile }}\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><circle cx=\"11\" cy=\"7.5\" r=\"3.5\" stroke=\"#DDD5C8\" stroke-width=\"1.4\" fill=\"none\"><\u002Fcircle><path d=\"M4 19c0-3.5 3.1-6 7-6s7 2.5 7 6\" stroke=\"#DDD5C8\" stroke-width=\"1.4\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n          <span class=\"bn-label\">Profile<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ══ SCAN OVERLAY ══ -->\n  <sc-if value=\"{{ scanOpen }}\">\n    <div class=\"scan-overlay\">\n      <div class=\"scan-close\" onclick=\"{{ closeScan }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 2l10 10M12 2L2 12\" stroke=\"#F0EDE6\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n      <!-- Scan: food calorie only — straight to method -->\n      <sc-if value=\"{{ scanStep0 }}\">\n        <p class=\"scan-title\">Scan Your Calories<\u002Fp>\n        <p class=\"scan-sub\">Take a photo or upload from your album — we'll identify the food and log the calories automatically.<\u002Fp>\n        <div class=\"scan-type-grid\" style=\"max-width:380px;\">\n          <div class=\"scan-type-card\" onclick=\"{{ takePhoto }}\">\n            <div class=\"scan-type-icon\" style=\"background:rgba(196,17,1,0.1);border:1px solid rgba(196,17,1,0.2);\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><path d=\"M9 5H5a2 2 0 00-2 2v14a2 2 0 002 2h18a2 2 0 002-2V7a2 2 0 00-2-2h-4L17 3h-6L9 5z\" stroke=\"#C41101\" stroke-width=\"1.5\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath><circle cx=\"14\" cy=\"14\" r=\"4\" stroke=\"#C41101\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><circle cx=\"14\" cy=\"14\" r=\"1.5\" fill=\"#C41101\"><\u002Fcircle><\u002Fsvg>\n            <\u002Fdiv>\n            <p class=\"scan-type-name\">Take a Photo<\u002Fp>\n            <p class=\"scan-type-desc\">Open camera and snap your meal<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"scan-type-card\" onclick=\"{{ uploadFile }}\">\n            <div class=\"scan-type-icon\" style=\"background:rgba(80,80,80,0.08);border:1px solid rgba(80,80,80,0.16);\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><rect x=\"4\" y=\"3\" width=\"16\" height=\"20\" rx=\"2.5\" stroke=\"#555\" stroke-width=\"1.5\" fill=\"none\"><\u002Frect><path d=\"M9 10h10M9 14h7M9 18h5\" stroke=\"#555\" stroke-width=\"1.2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M17 1v6h6\" stroke=\"#555\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <p class=\"scan-type-name\">Upload from Album<\u002Fp>\n            <p class=\"scan-type-desc\">Pick a photo from your gallery<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <input id=\"scan-camera-input\" type=\"file\" accept=\"image/*\" capture=\"environment\" style=\"display:none;\" onchange=\"{{ onFileSelected }}\">\n        <input id=\"scan-file-input\" type=\"file\" accept=\"image/*\" style=\"display:none;\" onchange=\"{{ onFileSelected }}\">\n      <\u002Fsc-if>\n\n      <!-- Step: choose method -->\n      <sc-if value=\"{{ scanStepMethod }}\">\n        <p class=\"scan-title\">How do you want to {{ scanMethodTitle }}?<\u002Fp>\n        <p class=\"scan-sub\">{{ scanMethodSub }}<\u002Fp>\n        <div class=\"scan-type-grid\" style=\"max-width:380px;\">\n          <!-- Take Photo -->\n          <div class=\"scan-type-card\" onclick=\"{{ takePhoto }}\">\n            <div class=\"scan-type-icon\" style=\"background:rgba(196,17,1,0.1);border:1px solid rgba(196,17,1,0.2);\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><path d=\"M9 5H5a2 2 0 00-2 2v14a2 2 0 002 2h18a2 2 0 002-2V7a2 2 0 00-2-2h-4L17 3h-6L9 5z\" stroke=\"#C41101\" stroke-width=\"1.5\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath><circle cx=\"14\" cy=\"14\" r=\"4.5\" stroke=\"#C41101\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><circle cx=\"21.5\" cy=\"9\" r=\"1\" fill=\"#C41101\"><\u002Fcircle><\u002Fsvg>\n            <\u002Fdiv>\n            <p class=\"scan-type-name\">Take a Photo<\u002Fp>\n            <p class=\"scan-type-desc\">Open camera and take a picture directly<\u002Fp>\n          <\u002Fdiv>\n          <!-- Upload from Files -->\n          <div class=\"scan-type-card\" onclick=\"{{ uploadFile }}\">\n            <div class=\"scan-type-icon\" style=\"background:rgba(80,80,80,0.08);border:1px solid rgba(80,80,80,0.16);\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><rect x=\"4\" y=\"3\" width=\"14\" height=\"18\" rx=\"2.5\" stroke=\"#555\" stroke-width=\"1.5\" fill=\"none\"><\u002Frect><path d=\"M8 9h10M8 13h7\" stroke=\"#555\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M16 19l3 3 6-6\" stroke=\"#555\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <p class=\"scan-type-name\">Upload from Album<\u002Fp>\n            <p class=\"scan-type-desc\">Choose a photo or PDF from your files<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Hidden inputs -->\n        <input id=\"scan-camera-input\" type=\"file\" accept=\"image/*\" capture=\"environment\" style=\"display:none;\" onchange=\"{{ onFileSelected }}\">\n        <input id=\"scan-file-input\" type=\"file\" accept=\"image/*,application/pdf\" style=\"display:none;\" onchange=\"{{ onFileSelected }}\">\n        <button style=\"margin-top:8px;background:transparent;border:none;color:#333;font-size:12px;cursor:pointer;padding:8px 16px;\" onclick=\"{{ backToType }}\">← Back<\u002Fbutton>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ scanStepProcess }}\">\n        <div class=\"scan-processing\">\n          <div class=\"scan-ring\"><\u002Fdiv>\n          <div><p style=\"font-size:18px;font-weight:600;color:#F0EDE6;margin-bottom:6px;\">{{ scanProcessLabel }}<\u002Fp><p style=\"font-size:13px;color:#555;\">Securely processing your document...<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ scanStepDone }}\">\n        <div class=\"scan-processing\">\n          <div class=\"scan-success-icon\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 36 36\" fill=\"none\"><path d=\"M8 18L15 25L28 10\" stroke=\"#C41101\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><p style=\"font-size:20px;font-weight:600;color:#F0EDE6;margin-bottom:6px;\">{{ scanDoneTitle }}<\u002Fp><p style=\"font-size:13px;color:#555;max-width:260px;line-height:1.6;\">{{ scanDoneBody }}<\u002Fp><\u002Fdiv>\n          <button style=\"padding:14px 32px;background:#C41101;border-radius:10px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;\" onclick=\"{{ goScanResult }}\">{{ scanDoneBtn }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══ CALORIE ONBOARDING OVERLAY ══ -->\n  <sc-if value=\"{{ calOnboardOpen }}\">\n    <div style=\"position:fixed;inset:0;background:#EDE8DF;z-index:90;overflow-y:auto;display:flex;flex-direction:column;\">\n      <div style=\"flex:1;padding:48px 24px 32px;max-width:500px;margin:0 auto;width:100%;\">\n        <div class=\"step-indicator\">\n          <div class=\"step-dot {{ ob1Done }}\"><\u002Fdiv>\n          <div class=\"step-dot {{ ob2Done }}\"><\u002Fdiv>\n          <div class=\"step-dot {{ ob3Done }}\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Step 1: Body measurements -->\n        <sc-if value=\"{{ obStep1 }}\">\n          <div class=\"onboard-step\">\n            <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;margin-bottom:8px;\">Step 1 of 3<\u002Fp>\n            <h2 class=\"onboard-h\">YOUR BODY STATS<\u002Fh2>\n            <p class=\"onboard-sub\">We need your measurements to calculate your personal daily calorie target.<\u002Fp>\n            <label style=\"font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:#9E8E7A;display:block;margin-bottom:8px;\">Weight<\u002Flabel>\n            <div class=\"onboard-row\"><input class=\"onboard-inp\" type=\"number\" value=\"{{ obWeight }}\" onchange=\"{{ onObWeight }}\" placeholder=\"65\"><div class=\"unit-badge\">kg<\u002Fdiv><\u002Fdiv>\n            <label style=\"font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:#9E8E7A;display:block;margin-bottom:8px;\">Height<\u002Flabel>\n            <div class=\"onboard-row\"><input class=\"onboard-inp\" type=\"number\" value=\"{{ obHeight }}\" onchange=\"{{ onObHeight }}\" placeholder=\"165\"><div class=\"unit-badge\">cm<\u002Fdiv><\u002Fdiv>\n            <label style=\"font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:#9E8E7A;display:block;margin-bottom:8px;\">Age<\u002Flabel>\n            <div class=\"onboard-row\"><input class=\"onboard-inp\" type=\"number\" value=\"{{ obAge }}\" onchange=\"{{ onObAge }}\" placeholder=\"28\"><div class=\"unit-badge\">years<\u002Fdiv><\u002Fdiv>\n            <button class=\"btn-primary\" onclick=\"{{ obNext1 }}\">Continue →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Step 2: Goal -->\n        <sc-if value=\"{{ obStep2 }}\">\n          <div class=\"onboard-step\">\n            <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;margin-bottom:8px;\">Step 2 of 3<\u002Fp>\n            <h2 class=\"onboard-h\">YOUR GOAL<\u002Fh2>\n            <p class=\"onboard-sub\">What are you trying to achieve? We'll set your daily calorie target accordingly.<\u002Fp>\n            <sc-for list=\"{{ goalOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n              <div class=\"goal-option {{ opt.selectedClass }}\" onclick=\"{{ opt.select }}\">\n                <div class=\"goal-option-icon\" style=\"background:{{ opt.bg }};\">{{ opt.emoji }}<\u002Fdiv>\n                <div><p class=\"goal-option-name\">{{ opt.name }}<\u002Fp><p class=\"goal-option-desc\">{{ opt.desc }}<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"display:flex;gap:10px;margin-top:16px;\">\n              <button class=\"btn-secondary\" style=\"flex:1;\" onclick=\"{{ obBack1 }}\">← Back<\u002Fbutton>\n              <button class=\"btn-primary\" style=\"flex:2;\" onclick=\"{{ obNext2 }}\">Continue →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Step 3: Activity level + result -->\n        <sc-if value=\"{{ obStep3 }}\">\n          <div class=\"onboard-step\">\n            <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;margin-bottom:8px;\">Step 3 of 3<\u002Fp>\n            <h2 class=\"onboard-h\">ACTIVITY LEVEL<\u002Fh2>\n            <p class=\"onboard-sub\">How active are you on a typical week?<\u002Fp>\n            <sc-for list=\"{{ activityOptions }}\" as=\"act\" hint-placeholder-count=\"4\">\n              <div class=\"goal-option {{ act.selectedClass }}\" onclick=\"{{ act.select }}\">\n                <div class=\"goal-option-icon\" style=\"background:#F0EDE5;\">{{ act.emoji }}<\u002Fdiv>\n                <div><p class=\"goal-option-name\">{{ act.name }}<\u002Fp><p class=\"goal-option-desc\">{{ act.desc }}<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ obCalReady }}\">\n              <div class=\"bmr-preview\" style=\"margin-top:16px;\">\n                <div class=\"bmr-val\">{{ obCalTarget }}<\u002Fdiv>\n                <p class=\"bmr-lbl\">Daily Calorie Target (kcal)<\u002Fp>\n                <p style=\"font-size:11px;color:#9E8E7A;margin-top:6px;\">Protein {{ obProtTarget }}g · Carbs {{ obCarbTarget }}g · Fat {{ obFatTarget }}g<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;gap:10px;margin-top:8px;\">\n              <button class=\"btn-secondary\" style=\"flex:1;\" onclick=\"{{ obBack2 }}\">← Back<\u002Fbutton>\n              <button class=\"btn-primary\" style=\"flex:2;\" onclick=\"{{ obFinish }}\">Start Tracking →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    uploadStage: 'idle',\n    gender: 'female',\n    cycleDaysInput: 14,\n    cycleInputMode: true,\n    cycleResultMode: false,\n    scanOpen: false,\n    scanType: null,\n    scanPhase: 'select',\n    scanFileName: '',\n    calOnboardOpen: false,\n    calOnboardDone: false,\n    calGoalCustom: 1800,\n    obStep: 1,\n    obWeight: '',\n    obHeight: '',\n    obAge: '',\n    obGoal: '',\n    obActivity: '',\n    // Profile state\n    profileName: 'Ria Putri Andini',\n    profileEmail: 'ria@email.com',\n    profilePhone: '+62 812 3456 7890',\n    profileWeight: 65,\n    profileHeight: 165,\n    heightCm: 165,\n    weightKg: 65,\n    bmiFromReg: null,\n    birthdate: null,\n    avatarSrc: null,\n    editingField: null,\n    editNameVal: '',\n    editEmailVal: '',\n    editPhoneVal: '',\n    editWeightVal: '',\n    editHeightVal: '',\n    logoutConfirm: false,\n    mcuSource: '20FIT',\n    medTab: 'records',\n    calTab: 'today',\n    calMonthOffset: 0,\n    selectedCalDay: null,\n    showAddWorkout: false,\n    addWorkoutDay: null,\n    addWorkoutType: null,\n    addWorkoutNote: '',\n    user
