document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

aliased;background:#E8E3DA;color:#0A0908}\nbutton,input,textarea{font-family:'Inter',sans-serif;border:none;background:none;cursor:pointer}\ninput,textarea{outline:none;-webkit-appearance:none}\ninput::placeholder,textarea::placeholder{color:#B8AFA5}\n::-webkit-scrollbar{width:4px;height:4px}\n::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:#DDD5C8;border-radius:4px}\n\n/* ── ROOT LAYOUT ── */\n.root{display:flex;height:100vh;overflow:hidden;background:#EDE8DF}\n\n/* ── SIDEBAR (desktop) ── */\n.sidebar{width:220px;flex-shrink:0;background:#0A0908;height:100vh;display:flex;flex-direction:column;padding:0;border-right:1px solid #141414}\n.sb-logo{padding:28px 24px 20px;border-bottom:1px solid #1A1A1A;flex-shrink:0}\n.sb-logo img{height:22px;display:block;filter:invert(1) brightness(10);opacity:.9}\n.sb-logo-fallback{display:flex;align-items:center;gap:8px}\n.sb-logo-svg{height:22px}\n.sb-sub{font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#333;margin-top:4px}\n.sb-user{padding:16px 20px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:10px;flex-shrink:0}\n.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#C41101,#7A0A00);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}\n.sb-name{font-size:12px;font-weight:600;color:#F0EDE6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.sb-badge{font-size:9px;color:#0A0908;font-weight:500;margin-top:1px}\n.sb-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}\n.sb-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:8px;color:#999;font-size:13px;font-weight:500;transition:all .15s;cursor:pointer;border:none;border-left:2px solid transparent;width:100%;text-align:left;background:transparent}\n.sb-item:hover{background:#1A1A1A;color:#CCC}\n.sb-item.on{background:rgba(196,17,1,0.14);color:#C41101;font-weight:600;border-left:2px solid #C41101;padding-left:12px}\n.sb-item svg{flex-shrink:0}\n.sb-bottom{padding:16px;border-top:1px solid #141414;flex-shrink:0}\n.sb-back{display:flex;align-items:center;gap:8px;font-size:12px;color:#333;cursor:pointer;padding:8px 10px;border-radius:6px;transition:color .15s}\n.sb-back:hover{color:#666}\n\n/* ── MAIN AREA ── */\n.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#FAFAF8}\n.topbar{display:none;flex-shrink:0;background:#fff;border-bottom:1px solid #DDD5C8;padding:env(safe-area-inset-top,0) 20px 0;min-height:56px;align-items:flex-end;gap:12px;position:sticky;top:0;z-index:10;padding-bottom:12px}\n.tb-logo{height:18px;filter:none}\n.tb-title{font-family:'Anton',sans-serif;font-size:17px;color:#0A0908;letter-spacing:.3px;flex:1}\n.tb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#C41101,#7A0A00);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer}\n.content{flex:1;overflow-y:auto;padding:36px 44px;max-width:900px;width:100%}\n.bottom-nav{display:none;flex-shrink:0;background:#0A0908;border-top:1px solid rgba(255,255,255,0.06);padding:8px 0 env(safe-area-inset-bottom,12px);z-index:10}\n.bn-row{display:flex;justify-content:space-around}\n.bn-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 16px;cursor:pointer;border:none;background:transparent}\n.bn-label{font-size:9px;font-weight:600;letter-spacing:.3px;color:#333;transition:color .15s}\n.bn-item.on .bn-label{color:#C41101;font-weight:700}\n.bn-item.on svg{opacity:1}\n.bn-item svg{opacity:.35;transition:opacity .15s}\n\n/* ── SECTION LABEL ── */\n.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;margin-bottom:10px;display:flex;align-items:center;gap:7px}\n.sec-label::before{content:'';width:5px;height:5px;border-radius:50%;background:#C41101;display:inline-block;flex-shrink:0}\n.page-title{font-family:'Anton',sans-serif;font-size:32px;color:#0A0908;letter-spacing:.3px;margin-bottom:4px;line-height:1}\n.page-sub{font-size:13px;color:#9E8E7A;margin-bottom:24px;font-weight:400}\n\n/* ── CARDS ── */\n.card{background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(10,9,8,0.06)}\n.card-sm{background:#fff;border:1px solid #E8E2DB;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(10,9,8,0.05)}\n.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}\n.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}\n\n/* ── STAT CARDS ── */\n.stat-card{background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(10,9,8,0.06);transition:transform .18s,box-shadow .18s}\n.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(10,9,8,0.1)}\n.stat-card .lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:#9E8E7A;margin-bottom:10px;display:block}\n.stat-card .val{font-family:'Anton',sans-serif;font-size:36px;color:#0A0908;line-height:1;margin-bottom:6px}\n.stat-card .unit{font-size:13px;color:#9E8E7A;display:inline;font-family:'Inter',sans-serif;font-weight:400}\n.stat-card .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}\n.badge-done{background:rgba(196,17,1,0.07);color:#A00E01}\n.badge-red{background:rgba(196,17,1,0.08);color:#C41101}\n.badge-gray{background:#F0EDE5;color:#9E8E7A}\n\n/* ── ACTIVITY LIST ── */\n.act-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #F0EDE5}\n.act-row:last-child{border-bottom:none}\n.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}\n.act-info{flex:1;min-width:0}\n.act-name{font-size:13px;font-weight:500;color:#0A0908}\n.act-time{font-size:11px;color:#9E8E7A;margin-top:1px}\n\n/* ── QUICK ACCESS ── */\n.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}\n.qa-card{background:#fff;border:1px solid #DDD5C8;border-radius:14px;padding:18px;cursor:pointer;transition:all .18s}\n.qa-card:hover{border-color:#C8BFB5;background:#FAF8F5;transform:translateY(-1px)}\n.qa-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}\n.qa-name{font-size:14px;font-weight:600;color:#0A0908;margin-bottom:3px}\n.qa-desc{font-size:11px;color:#9E8E7A}\n\n/* ── UPLOAD AREA ── */\n.upload-zone{border:1.5px dashed #DDD5C8;border-radius:18px;padding:44px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:all .2s;background:linear-gradient(160deg,#FAFAF9 0%,#F5F2EE 100%);text-align:center}\n.upload-zone:hover{border-color:#C41101;background:rgba(196,17,1,0.02)}\n.upload-icon{width:52px;height:52px;border-radius:14px;background:#F0EDE5;border:1px solid #DDD5C8;display:flex;align-items:center;justify-content:center}\n.upload-title{font-size:15px;font-weight:600;color:#0A0908}\n.upload-sub{font-size:12px;color:#9E8E7A}\n.privacy-note{background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.07);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:18px}\n.privacy-text{font-size:12px;color:#555;line-height:1.55}\n.doc-row{background:#fff;border:1px solid #E8E2DB;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;margin-bottom:10px;box-shadow:0 1px 6px rgba(10,9,8,0.04)}\n.doc-row:hover{border-color:#C8BFB5}\n.doc-thumb{width:38px;height:48px;background:#F0EDE5;border:1px solid #DDD5C8;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:4px;gap:2px;flex-shrink:0}\n.doc-lines{display:flex;flex-direction:column;gap:2px;width:100%;flex:1;justify-content:center;padding:0 3px}\n.doc-line{height:1.5px;background:#DDD5C8;border-radius:1px}\n.doc-type{font-size:7px;font-weight:700;color:#C41101;letter-spacing:.5px}\n.doc-info{flex:1;min-width:0}\n.doc-title{font-size:13px;font-weight:600;color:#0A0908;margin-bottom:2px}\n.doc-meta{font-size:11px;color:#9E8E7A}\n\n/* ── PROGRESS CHART ── */\n.chart-wrap{position:relative;height:140px;display:flex;align-items:flex-end;gap:8px;padding-bottom:24px;margin-bottom:8px}\n.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}\n.bar{border-radius:4px 4px 0 0;background:#DDD5C8;transition:background .2s;min-height:4px}\n.bar.hi{background:#C41101}\n.bar-lbl{font-size:10px;color:#9E8E7A;white-space:nowrap}\n.bar-val{font-size:10px;font-weight:600;color:#0A0908;white-space:nowrap}\n.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}\n.metric-card{background:#fff;border:1px solid #DDD5C8;border-radius:12px;padding:14px;text-align:center}\n.metric-val{font-family:'Anton',sans-serif;font-size:22px;color:#0A0908;line-height:1;margin-bottom:4px}\n.metric-lbl{font-size:10px;color:#9E8E7A;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:2px;text-transform:uppercase}\n\n/* ── GOALS ── */\n.goal-card{background:#fff;border:1px solid #DDD5C8;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}\n.goal-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.goal-text{flex:1;font-size:13px;font-weight:500;color:#0A0908}\n.goal-actions{display:flex;gap:6px;flex-shrink:0}\n.icon-btn{width:28px;height:28px;border-radius:7px;background:#F0EDE5;border:1px solid #DDD5C8;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}\n.icon-btn:hover{background:#E8E4DC}\n.goal-input{flex:1;background:#F0EDE5;border:1px solid #DDD5C8;border-radius:8px;padding:8px 12px;font-size:13px;color:#0A0908}\n.goal-input:focus{border-color:#C41101}\n.add-btn{width:100%;padding:12px;border:1.5px dashed #DDD5C8;border-radius:12px;font-size:13px;color:#9E8E7A;cursor:pointer;transition:all .15s;background:transparent;margin-top:4px}\n.add-btn:hover{border-color:#C41101;color:#C41101}\n.plan-card{background:#fff;border:1px solid #DDD5C8;border-radius:14px;padding:18px;margin-bottom:10px}\n.plan-code{width:44px;height:44px;border-radius:10px;background:#F0EDE5;border:1px solid #DDD5C8;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#C41101;letter-spacing:.5px;flex-shrink:0}\n.plan-name{font-size:15px;font-weight:600;color:#0A0908;margin-bottom:2px}\n.plan-tag{font-size:11px;color:#9E8E7A}\n.plan-reason{font-size:12px;color:#777;line-height:1.6;margin:10px 0 12px}\n.plan-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:8px}\n.btn-primary{width:100%;padding:14px;background:#C41101;border-radius:10px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(196,17,1,0.25);border:none}\n.btn-primary:hover{background:#A80E01;box-shadow:0 6px 20px rgba(196,17,1,0.35);transform:translateY(-1px)}\n.btn-secondary{width:100%;padding:12px;background:transparent;border:1px solid #DDD5C8;border-radius:10px;font-size:13px;font-weight:500;color:#9E8E7A;cursor:pointer;transition:all .15s}\n.btn-secondary:hover{border-color:#C8BFB5;color:#555}\n\n/* ── CALORIE TRACKER ── */\n.cal-ring-wrap{display:flex;align-items:center;justify-content:center;gap:32px;margin-bottom:24px;flex-wrap:wrap}\n.cal-ring{position:relative;width:140px;height:140px;flex-shrink:0}\n.cal-ring svg{transform:rotate(-90deg)}\n.cal-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}\n.cal-ring-val{font-family:'Anton',sans-serif;font-size:28px;color:#0A0908;line-height:1}\n.cal-ring-lbl{font-size:10px;color:#9E8E7A;text-align:center;margin-top:2px}\n.macro-row{display:flex;flex-direction:column;gap:10px}\n.macro-item{display:flex;align-items:center;gap:10px}\n.macro-bar-wrap{flex:1;height:6px;background:#F0EDE5;border-radius:3px;overflow:hidden}\n.macro-bar{height:100%;border-radius:3px;transition:width .4s;background:#C41101}\n.macro-name{font-size:12px;color:#0A0908;font-weight:500;width:52px}\n.macro-val{font-size:11px;color:#9E8E7A;width:56px;text-align:right}\n.meal-section{margin-bottom:18px}\n.meal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}\n.meal-name{font-size:13px;font-weight:600;color:#0A0908}\n.meal-cal{font-size:12px;color:#9E8E7A}\n.food-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0EDE5}\n.food-row:last-child{border-bottom:none}\n.food-name{flex:1;font-size:13px;color:#0A0908}\n.food-cal{font-size:12px;color:#9E8E7A;font-weight:500}\n.add-food-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:#C41101;font-weight:600;cursor:pointer;padding:6px 0;background:transparent;border:none}\n\n/* ── PROCESSING / SUCCESS ── */\n.upload-processing{display:flex;flex-direction:column;align-items:center;padding:40px 0;gap:20px;text-align:center}\n@keyframes spin{to{transform:rotate(360deg)}}\n@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}\n.spinner{width:56px;height:56px;border:3px solid #DDD5C8;border-top-color:#C41101;border-radius:50%;animation:spin 1s linear infinite}\n.scan-result{background:#fff;border:1px solid #DDD5C8;border-radius:14px;padding:20px;animation:fadeUp .3s ease both}\n.grade-badge{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#C41101,#2A8A50);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:24px;color:#fff;flex-shrink:0}\n.param nd:#fff;border:1px solid #E8E2DB;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .18s}\n.task-item:hover{border-color:#C8BFB5;transform:translateX(2px)}\n.task-item.done{background:#FAFAFA;opacity:.7}\n.task-check{width:22px;height:22px;border-radius:50%;border:2px solid #DDD5C8;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}\n.task-check.done{background:#C41101;border-color:#C41101}\n.task-text{font-size:13px;font-weight:500;color:#0A0908;flex:1;line-height:1.4}\n.task-item.done .task-text{text-decoration:line-through;color:#9E8E7A}\n.task-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:#F0EDE5;color:#9E8E7A;flex-shrink:0}\n\n/* ── SLEEP ── */\n.sleep-card{background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(10,9,8,0.06);margin-bottom:12px}\n.sleep-dial-wrap{display:flex;align-items:center;gap:16px;margin-bottom:12px}\n.sleep-hrs-big{font-family:'Anton',sans-serif;font-size:48px;color:#0A0908;line-height:1}\n.sleep-adj-btn{width:36px;height:36px;border-radius:8px;background:#F0EDE5;border:1px solid #E8E2DB;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#555;transition:background .15s}\n.sleep-adj-btn:hover{background:#E8E4DC}\n.sleep-bar{height:8px;background:#F0EDE5;border-radius:4px;overflow:hidden;margin-bottom:6px}\n.sleep-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0A0908,#555);transition:width .4s}\n\n/* ── WATER ── */\n.water-card{background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(10,9,8,0.06);margin-bottom:12px}\n.water-glasses{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}\n.glass{width:32px;height:40px;border-radius:4px 4px 8px 8px;border:2px solid #DDD5C8;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;background:#fff}\n.glass.filled{border-color:#0A6EBD}\n.glass-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(100,180,255,0.6),rgba(30,120,220,0.8));transition:height .3s}\n.water-add-btn{flex:1;padding:10px;background:#0A0908;color:#F0EDE6;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}\n\n/* ── BREATHING WIDGET ── */\n@keyframes breatheIn{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.55);opacity:1}}\n@keyframes breatheOut{0%{transform:scale(1.55);opacity:1}100%{transform:scale(1);opacity:.7}}\n@keyframes breatheHold{0%,100%{opacity:.9}50%{opacity:1}}\n.breath-ring{width:100px;height:100px;border-radius:50%;border:3px solid rgba(196,17,1,0.25);background:radial-gradient(circle,rgba(196,17,1,0.15),rgba(196,17,1,0.03));display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;transition:all .3s}\n.breath-ring.inhale{animation:breatheIn var(--dur,4s) ease-in-out forwards}\n.breath-ring.exhale{animation:breatheOut var(--dur,6s) ease-in-out forwards}\n.breath-ring.hold{animation:breatheHold var(--dur,4s) ease-in-out infinite}\n.breath-ring-inner{width:60px;height:60px;border-radius:50%;background:rgba(196,17,1,0.2);border:2px solid rgba(196,17,1,0.35)}\n.breath-pattern-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid #DDD5C8;font-size:10px;font-weight:600;color:#9E8E7A;cursor:pointer;background:#fff;transition:all .15s;text-align:center}\n.breath-pattern-btn.on{border-color:#C41101;background:rgba(196,17,1,0.06);color:#C41101}\n.congrats-overlay{position:fixed;inset:0;background:rgba(10,9,8,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease}\n@keyframes fadeIn{from{opacity:0}to{opacity:1}}\n.congrats-card{background:#fff;border-radius:24px;padding:36px 28px;text-align:center;max-width:340px;width:100%;box-shadow:0 24px 64px rgba(10,9,8,0.2);animation:popUp .3s cubic-bezier(.34,1.56,.64,1)}\n@keyframes popUp{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}\n.congrats-emoji{font-size:56px;margin-bottom:12px;display:block}\n\n/* ── PAGE TABS ── */\n.page-tabs{display:flex;gap:0;background:#F0EDE5;border-radius:12px;padding:4px;margin-bottom:24px;}\n.page-tab{flex:1;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;transition:all .18s;color:#9E8E7A;border:none;background:transparent;}\n.page-tab.active{background:#fff;color:#0A0908;box-shadow:0 1px 4px rgba(10,9,8,0.1);}\n.page-tab-count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#C41101;color:#fff;font-size:9px;font-weight:700;margin-left:6px;}\n\n\n/* ── CALENDAR ── */\n.cal-grid-wrap{background:#fff;border:1px solid #E8E2DB;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(10,9,8,0.06);margin-bottom:20px}\n.cal-month-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #F0EDE5}\n.cal-month-title{font-family:'Anton',sans-serif;font-size:20px;color:#0A0908;letter-spacing:.3px}\n.cal-nav-btn{width:32px;height:32px;border-radius:8px;background:#F0EDE5;border:1px solid #E8E2DB;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}\n.cal-nav-btn:hover{background:#E8E4DC}\n.cal-day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:0;background:#F7F5F2;border-bottom:1px solid #F0EDE5}\n.cal-day-hdr{text-align:center;padding:8px 0;font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#9E8E7A}\n.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:0}\n.cal-cell{min-height:72px;padding:6px 4px;border-right:1px solid #F0EDE5;border-bottom:1px solid #F0EDE5;position:relative;cursor:pointer;transition:background .15s}\n.cal-cell:hover{background:#FAFAF8}\n.cal-cell:nth-child(7n){border-right:none}\n.cal-cell.other-month{opacity:.35}\n.cal-cell.today .cal-day-num{background:#C41101;color:#fff;border-radius:50%}\n.cal-cell.has-workout{background:rgba(10,9,8,0.02)}\n.cal-day-num{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#0A0908;margin:0 auto 4px;border-radius:50%}\n.cal-dot-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}\n.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}\n.workout-card{background:#fff;border:1px solid #E8E2DB;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(10,9,8,0.05);cursor:pointer;transition:all .18s}\n.workout-card:hover{border-color:#C8BFB5;transform:translateY(-1px)}\n.workout-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.workout-name{font-size:14px;font-weight:600;color:#0A0908;margin-bottom:2px}\n.workout-meta{font-size:11px;color:#9E8E7A}\n.book-card{background:#0A0908;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}\n.book-icon{width:44px;height:44px;border-radius:12px;background:rgba(196,17,1,0.15);border:1px solid rgba(196,17,1,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.book-name{font-size:14px;font-weight:600;color:#F0EDE6;margin-bottom:2px}\n.book-meta{font-size:11px;color:#555}\n\n/* ── RESPONSIVE ── */\n@media(min-width:920px){\n  .topbar{display:none}\n  .bottom-nav{display:none}\n  .content{padding:36px 40px;margin:0 auto}\n}\n@media(max-width:919px){\n  .sidebar{display:none}\n  .topbar{display:flex}\n  .bottom-nav{display:block}\n  .scan-fab{bottom:76px;right:16px;}\n  .content{padding:14px 14px 20px;max-width:100%;padding-bottom:140px!important;}\n  .grid-4{grid-template-columns:repeat(2,1fr);gap:8px}\n  .metric-row{grid-template-columns:repeat(3,1fr)}\n  .qa-grid{grid-template-columns:repeat(2,1fr)}\n  .cal-ring-wrap{gap:20px}\n  /* Stack weather+AQI on mobile */\n  .wx-card{flex-direction:column}\n  /* Hero text smaller on mobile */\n  .page-title{font-size:28px!important}\n  /* Cal cells smaller */\n  .cal-cell{min-height:44px;padding:4px 2px}\n  .cal-day-num{width:20px;height:20px;font-size:10px}\n  /* Sleep+water full width on very small screens */\n  @media(max-width:400px){\n    .sleep-card,.water-card{min-width:0}\n  }\n  /* Plan product cards full width */\n  .plan-product-card{padding:14px}\n  /* Topbar padding */\n  .topbar{padding:0 14px;min-height:52px}\n  /* Scan FAB label smaller */\n  .scan-fab span{font-size:8px!important;letter-spacing:1px!important}\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<x-dc>\n\n<div class=\"root\">\n\n  <!-- ══ SIDEBAR (desktop) ══ -->\n  <div class=\"sidebar\">\n    <div class=\"sb-logo\">\n      <div class=\"sb-logo-fallback\">\n        <svg viewBox=\"0 0 268 68\" class=\"sb-logo-svg\" xmlns=\"http://www.w3.org/2000/svg\">\n          <text x=\"2\" y=\"60\" font-family=\"Anton,sans-serif\" font-size=\"68\" fill=\"#F0EDE6\">2<\u002Ftext>\n          <circle cx=\"80\" cy=\"35\" r=\"30\" fill=\"none\" stroke=\"#F0EDE6\" stroke-width=\"5\"><\u002Fcircle>\n          <circle cx=\"80\" cy=\"35\" r=\"18\" fill=\"#C41101\"><\u002Fcircle>\n          <text x=\"120\" y=\"60\" font-family=\"Anton,sans-serif\" font-size=\"68\" fill=\"#F0EDE6\">FIT<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"sb-sub\">Health Profile<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"sb-user\" onclick=\"{{ goProfile }}\" style=\"cursor:pointer;transition:background .15s;\" onmouseover=\"this.style.background='#141414'\" onmouseout=\"this.style.background=''\">\n      <div class=\"sb-avatar\">RA<\u002Fdiv>\n      <div style=\"min-width:0;\">\n        <p class=\"sb-name\">Ria Putri Andini<\u002Fp>\n        <p class=\"sb-badge\">Premium Member<\u002Fp>\n      <\u002Fdiv>\n      <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\" style=\"margin-left:auto;flex-shrink:0;opacity:.3;\"><path d=\"M4.5 9l3-3-3-3\" stroke=\"#F0EDE6\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"sb-nav\">\n      <button class=\"sb-item {{ homeOn }}\" onclick=\"{{ goHome }}\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M2 7L8 2L14 7V14H10V10H6V14H2V7Z\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        Home\n      <\u002Fbutton>\n      <button class=\"sb-item {{ medOn }}\" onclick=\"{{ goMed }}\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><rect x=\"2.5\" y=\"1.5\" width=\"9\" height=\"12\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.3\" fill=\"none\"><\u002Frect><path d=\"M5 5.5h5M5 8h3.5\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12.5\" cy=\"12.5\" r=\"3\" fill=\"#0A0908\" stroke=\"currentColor\" stroke-width=\"1.1\"><\u002Fcircle><path d=\"M11.5 12.5h2M12.5 11.5v2\" stroke=\"currentColor\" stroke-width=\"1\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        Medical Record &amp; Plan\n      <\u002Fbutton>\n\n      <button class=\"sb-item {{ progOn }}\" onclick=\"{{ goProg }}\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><polyline points=\"1,12 5,7 8,9 11,4 15,6\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpolyline><\u002Fsvg>\n        Progress\n      <\u002Fbutton>\n\n      <button class=\"sb-item {{ calOn }}\" onclick=\"{{ goCal }}\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><circle cx=\"8\" cy=\"8\" r=\"6.5\" stroke=\"currentColor\" stroke-width=\"1.3\" fill=\"none\"><\u002Fcircle><path d=\"M8 4v4l3 1.5\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        Calorie Tracker\n      <\u002Fbutton>\n\n      <button class=\"sb-item\" onclick=\"{{ openScan }}\" style=\"background:rgba(196,17,1,0.1);color:#C41101;margin-top:8px;border:1px solid rgba(196,17,1,0.18);\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><circle cx=\"8\" cy=\"8\" r=\"4\" stroke=\"currentColor\" stroke-width=\"1.3\" fill=\"none\"><\u002Fcircle><circle cx=\"8\" cy=\"8\" r=\"1.5\" fill=\"currentColor\"><\u002Fcircle><path d=\"M2 5V3.5A1.5 1.5 0 013.5 2H5M11 2h1.5A1.5 1.5 0 0114 3.5V5M14 11v1.5A1.5 1.5 0 0112.5 14H11M5 14H3.5A1.5 1.5 0 012 12.5V11\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        Scan Calories\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"sb-bottom\">\n      <div class=\"sb-back\" onclick=\"{{ goLogin }}\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M9 11.5L4.5 7L9 2.5\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        Sign Out\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ MAIN AREA ══ -->\n  <div class=\"main\">\n\n    <!-- Mobile top bar -->\n    <div class=\"topbar\">\n      <svg viewBox=\"0 0 268 68\" height=\"18\" style=\"display:block;flex-shrink:0;\">\n        <text x=\"2\" y=\"60\" font-family=\"Anton,sans-serif\" font-size=\"68\" fill=\"#0A0908\">2<\u002Ftext>\n        <circle cx=\"80\" cy=\"35\" r=\"30\" fill=\"none\" stroke=\"#0A0908\" stroke-width=\"5\"><\u002Fcircle>\n        <circle cx=\"80\" cy=\"35\" r=\"18\" fill=\"#C41101\"><\u002Fcircle>\n        <text x=\"120\" y=\"60\" font-family=\"Anton,sans-serif\" font-size=\"68\" fill=\"#0A0908\">FIT<\u002Ftext>\n      <\u002Fsvg>\n      <span class=\"tb-title\" style=\"margin-left:10px;\">{{ pageTitle }}<\u002Fspan>\n      <div class=\"tb-avatar\">RA<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Scrollable content -->\n    <div class=\"content\">\n\n      <!-- ════ HOME ════ -->\n      <sc-if value=\"{{ isHome }}\">\n        <div style=\"animation:fadeUp .28s ease both;\">\n          <div style=\"background:#0A0908;border-radius:18px;padding:28px 28px 24px;margin-bottom:24px;position:relative;overflow:hidden;\">\n            <div style=\"position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(196,17,1,0.12);pointer-events:none;\"><\u002Fdiv>\n            <div style=\"position:absolute;bottom:-60px;right:40px;width:140px;height:140px;border-radius:50%;background:rgba(196,17,1,0.07);pointer-events:none;\"><\u002Fdiv>\n            <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:#C41101;margin-bottom:8px;\">Good Morning<\u002Fp>\n            <h1 style=\"font-family:'Anton',sans-serif;font-size:32px;color:#F0EDE6;letter-spacing:.3px;margin-bottom:6px;line-height:1;\">Ria Putri Andini<\u002Fh1>\n            <p style=\"font-size:13px;color:#444;margin-bottom:16px;\">Here's your health snapshot for today.<\u002Fp>\n            <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;\">\n              <span style=\"background:#C41101;color:#fff;font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;letter-spacing:.3px;box-shadow:0 3px 10px rgba(196,17,1,0.35);\">⭐ Premium<\u002Fspan>\n              <button onclick=\"{{ goMed }}\" style=\"background:rgba(255,255,255,0.08);color:#CCC;border:1px solid rgba(255,255,255,0.12);font-size:11px;font-weight:500;padding:6px 16px;border-radius:20px;cursor:pointer;transition:background .15s;\">Medical Record →<\u002Fbutton>\n              <button onclick=\"{{ goCalendar }}\" style=\"background:rgba(255,255,255,0.08);color:#CCC;border:1px solid rgba(255,255,255,0.12);font-size:11px;font-weight:500;padding:6px 16px;border-radius:20px;cursor:pointer;transition:background .15s;\">Schedule →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Weather + AQI side by side -->\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;\">\n\n            <!-- Weather panel -->\n            <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(10,9,8,0.06);\">\n              <span class=\"sec-label\" style=\"margin-bottom:8px;\">Weather · Jakarta<\u002Fspan>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px;\">\n                <svg width=\"36\" height=\"36\" viewBox=\"0 0 36 36\" fill=\"none\">{{ wxIcon }}<\u002Fsvg>\n                <div>\n                  <div style=\"font-family:'Anton',sans-serif;font-size:28px;color:#0A0908;line-height:1;\">{{ wxTemp }}°C<\u002Fdiv>\n                  <p style=\"font-size:11px;color:#9E8E7A;margin-top:1px;\">{{ wxDesc }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"display:inline-block;background:{{ wxRecBg }};color:{{ wxRecColor }};font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px;\">{{ wxRec }}<\u002Fspan>\n              <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#9E8E7A;margin-bottom:5px;\">Try today<\u002Fp>\n              <sc-for list=\"{{ wxWorkoutRecs }}\" as=\"wr\" hint-placeholder-count=\"2\">\n                <p style=\"font-size:11px;color:#555;margin-bottom:3px;display:flex;align-items:center;gap:5px;\"><span>{{ wr.icon }}<\u002Fspan> <span>{{ wr.name }}<\u002Fspan> <span style=\"color:#C8BFB5;font-size:9px;\">· {{ wr.tag }}<\u002Fspan><\u002Fp>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- AQI panel -->\n            <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(10,9,8,0.06);\">\n              <span class=\"sec-label\" style=\"margin-bottom:8px;\">Air Quality · AQI<\u002Fspan>\n              <div style=\"height:60px;border-radius:10px;background:{{ aqiSceneBg }};overflow:hidden;position:relative;margin-bottom:10px;\">\n                <sc-if value=\"{{ aqiGood }}\">\n                  <div style=\"position:absolute;top:8px;right:10px;width:18px;height:18px;border-radius:50%;background:#FFD54F;box-shadow:0 0 10px #FFD54F;animation:sunPulse 3s ease-in-out infinite;\"><\u002Fdiv>\n                  <div style=\"position:absolute;bottom:8px;left:6px;animation:floatCloud 4s ease-in-out infinite;\"><div style=\"background:rgba(255,255,255,0.9);border-radius:10px;width:36px;height:12px;\"><\u002Fdiv><div style=\"background:rgba(255,255,255,0.9);border-radius:8px;width:20px;height:10px;position:absolute;top:-6px;left:6px;\"><\u002Fdiv><\u002Fdiv>\n                  <p style=\"position:absolute;bottom:5px;right:7px;font-size:8px;font-weight:700;color:rgba(255,255,255,0.85);\">Fresh Air ✓<\u002Fp>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ aqiModerate }}\">\n                  <div style=\"position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;background:#FFCA28;opacity:.65;animation:sunPulse 4s ease-in-out infinite;\"><\u002Fdiv>\n                  <div style=\"position:absolute;inset:0;background:rgba(180,140,50,0.3);animation:hazePulse 3s ease-in-out infinite;border-radius:10px;\"><\u002Fdiv>\n                  <p style=\"position:absolute;bottom:5px;right:7px;font-size:8px;font-weight:700;color:rgba(255,255,255,0.7);\">Some Haze<\u002Fp>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ aqiBad }}\">\n                  <div style=\"position:absolute;inset:0;background:rgba(50,40,30,0.65);animation:grimPulse 4s ease-in-out infinite;border-radius:10px;\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:20px;left:8px;width:4px;height:4px;border-radius:50%;background:rgba(200,180,140,0.7);animation:particleDrift 3s ease-out infinite;\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:28px;left:22px;width:3px;height:3px;border-radius:50%;background:rgba(180,160,120,0.6);animation:particleDrift2 2.5s ease-out infinite .5s;\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:24px;right:12px;width:4px;height:4px;border-radius:50%;background:rgba(200,180,140,0.5);animation:particleDrift 3.5s ease-out infinite 1s;\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:8px;right:10px;width:14px;height:14px;border-radius:50%;background:rgba(255,180,50,0.2);\"><\u002Fdiv>\n                  <p style=\"position:absolute;bottom:5px;right:7px;font-size:8px;font-weight:700;color:rgba(255,200,150,0.85);\">Poor Air ⚠<\u002Fp>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:6px;margin-bottom:6px;\">\n                <span style=\"font-family:'Anton',sans-serif;font-size:36px;color:{{ aqiColor }};line-height:1;\">{{ aqiVal }}<\u002Fspan>\n                <span style=\"font-size:10px;color:#9E8E7A;\">AQI<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:6px;background:#F0EDE5;border-radius:3px;overflow:hidden;margin-bottom:6px;\"><div style=\"height:100%;width:{{ aqiPct }}%;background:{{ aqiColor }};border-radius:3px;\"><\u002Fdiv><\u002Fdiv>\n              <p style=\"font-size:11px;font-weight:600;color:{{ aqiColor }};margin-bottom:2px;\">{{ aqiLabel }}<\u002Fp>\n              <p style=\"font-size:10px;color:#9E8E7A;line-height:1.4;\">{{ aqiAdvice }}<\u002Fp>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n\n                    <!-- Stats grid -->\n          <div class=\"grid-4\" style=\"margin-bottom:20px;\">\n            <div class=\"stat-card\" style=\"border-left:3px solid {{ bmiStatColor }};\">\n              <span class=\"lbl\">BMI<\u002Fspan>\n              <div style=\"font-family:'Anton',sans-serif;font-size:32px;color:{{ bmiStatColor }};line-height:1;margin-bottom:6px;\">{{ bmiStatVal }}<\u002Fdiv>\n              <span style=\"font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:{{ bmiStatBg }};color:{{ bmiStatColor }};\">{{ bmiStatLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"stat-card\">\n              <span class=\"lbl\">Weight<\u002Fspan>\n              <div class=\"val\">{{ weightStatDisplay }}<span class=\"unit\"> kg<\u002Fspan><\u002Fdiv>\n              <span style=\"font-size:11px;color:#9E8E7A;\">{{ heightStatDisplay }} cm tall<\u002Fspan>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ isFemale }}\">\n              <div class=\"stat-card\" style=\"border-left:3px solid {{ phaseColor }};\">\n                <span class=\"lbl\">Cycle Phase<\u002Fspan>\n                <div style=\"font-family:'Anton',sans-serif;font-size:18px;color:#0A0908;line-height:1.1;margin-bottom:6px;\">{{ phaseName }}<\u002Fdiv>\n                <span style=\"font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;background:{{ phaseBg }};color:{{ phaseColor }};border:1px solid {{ phaseBorder }};\">Day {{ cycleCurrentDay }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isMale }}\">\n              <div class=\"stat-card\">\n                <span class=\"lbl\">Last Check-up<\u002Fspan>\n                <div style=\"font-family:'Anton',sans-serif;font-size:24px;color:#0A0908;line-height:1;margin-bottom:6px;\">3 mo<\u002Fdiv>\n                <span style=\"font-size:11px;color:#9E8E7A;\">RS Pondok Indah<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- ── DAILY ACHIEVEMENT TASKS ── -->\n          <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:18px 20px;margin-bottom:20px;box-shadow:0 2px 12px rgba(10,9,8,0.06);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;\">\n              <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;display:flex;align-items:center;gap:7px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#C41101;display:inline-block;\"><\u002Fspan>Daily Tasks<\u002Fspan>\n              <span style=\"font-size:11px;color:#C41101;font-weight:600;\">{{ tasksDoneCount }}/{{ tasksTotal }} done<\u002Fspan>\n            <\u002Fdiv>\n            <!-- Battery bar -->\n            <div class=\"task-battery-wrap\"><div class=\"task-battery-fill\" style=\"width:{{ tasksPct }}%;\"><\u002Fdiv><\u002Fdiv>\n            <p style=\"font-size:10px;color:#9E8E7A;margin-bottom:14px;\">{{ tasksMotivation }}<\u002Fp>\n            <!-- Task list -->\n            <sc-for list=\"{{ dailyTasks }}\" as=\"task\" hint-placeholder-count=\"4\">\n              <div class=\"task-item {{ task.doneClass }}\" onclick=\"{{ task.onToggle }}\">\n                <div class=\"task-check {{ task.doneClass }}\">\n                  <sc-if value=\"{{ task.done }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 6l3 3 5-5\" stroke=\"#fff\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                <\u002Fdiv>\n                <p class=\"task-text\">{{ task.label }}<\u002Fp>\n                <span class=\"task-badge\">{{ task.badge }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- ── QUICK EXERCISE RECS ON HOME ── -->\n          <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:16px 18px;margin-bottom:20px;box-shadow:0 2px 12px rgba(10,9,8,0.06);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n              <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;display:flex;align-items:center;gap:7px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#C41101;display:inline-block;\"><\u002Fspan>Recommended Workouts<\u002Fspan>\n              <span style=\"font-size:10px;color:#C41101;font-weight:600;cursor:pointer;\" onclick=\"{{ goProg }}\">See full plan →<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ homeExerciseRecs }}\" as=\"ex\" hint-placeholder-count=\"3\">\n              <div style=\"padding:10px 0;border-bottom:1px solid #F7F5F2;\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;\">\n                  <div style=\"width:36px;height:36px;border-radius:9px;background:{{ ex.iconBg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;\">{{ ex.icon }}<\u002Fdiv>\n                  <div style=\"flex:1;\">\n                    <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:1px;\">\n                      <p style=\"font-size:13px;font-weight:600;color:#0A0908;\">{{ ex.name }}<\u002Fp>\n                      <span style=\"font-size:8px;font-weight:700;padding:1px 7px;border-radius:20px;background:{{ ex.tagBg }};color:{{ ex.tagColor }};\">{{ ex.tag }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"font-size:10px;color:#9E8E7A;\">{{ ex.duration }} · {{ ex.intensity }}<\u002Fp>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ ex.booked }}\">\n                    <span style=\"font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(196,17,1,0.07);color:#C41101;white-space:nowrap;\">Booked ✓<\u002Fspan>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ ex.notBooked }}\">\n                    <button style=\"background:#0A0908;color:#F0EDE6;border:none;border-radius:7px;padding:6px 10px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;\" onclick=\"{{ goCalendar }}\">Book →<\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <p style=\"font-size:10px;color:#9E8E7A;line-height:1.5;padding-left:46px;font-style:italic;\">{{ ex.reason }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- ── SLEEP + WATER SIDE BY SIDE ── -->\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;\">\n          <!-- ── SLEEP TRACKER ── -->\n          <div class=\"sleep-card\" style=\"margin-bottom:0;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n              <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;display:flex;align-items:center;gap:7px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#0A0908;display:inline-block;\"><\u002Fspan>Sleep<\u002Fspan>\n              <sc-if value=\"{{ sleepDone }}\"><span style=\"font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;background:rgba(42,122,79,0.09);color:#2A7A4F;border:1px solid rgba(42,122,79,0.2);\">✓ Goal Met<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div class=\"sleep-dial-wrap\">\n              <button class=\"sleep-adj-btn\" onclick=\"{{ sleepDec }}\">−<\u002Fbutton>\n              <div style=\"flex:1;text-align:center;\">\n                <span class=\"sleep-hrs-big\">{{ sleepHours }}<\u002Fspan>\n                <span style=\"font-size:14px;color:#9E8E7A;font-weight:400;\">h<\u002Fspan>\n              <\u002Fdiv>\n              <button class=\"sleep-adj-btn\" onclick=\"{{ sleepInc }}\">+<\u002Fbutton>\n              <div style=\"text-align:center;flex-shrink:0;\">\n                <p style=\"font-size:9px;color:#9E8E7A;font-weight:600;\">GOAL<\u002Fp>\n                <p style=\"font-family:'Anton',sans-serif;font-size:24px;color:#DDD5C8;line-height:1;\">8h<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"sleep-bar\"><div class=\"sleep-bar-fill\" style=\"width:{{ sleepPct }}%;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;margin-bottom:10px;\"><span style=\"font-size:9px;color:#9E8E7A;\">0h<\u002Fspan><span style=\"font-size:9px;color:#9E8E7A;font-weight:600;\">{{ sleepLabel }}<\u002Fspan><span style=\"font-size:9px;color:#9E8E7A;\">8h+<\u002Fspan><\u002Fdiv>\n            <button style=\"width:100%;background:#0A0908;color:#F0EDE6;border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;\" onclick=\"{{ submitSleep }}\">Log Sleep →<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- ── WATER TRACKER ── -->\n          <div class=\"water-card\" style=\"margin-bottom:0;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n              <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;display:flex;align-items:center;gap:7px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#0A6EBD;display:inline-block;\"><\u002Fspan>Water<\u002Fspan>\n              <sc-if value=\"{{ waterDone }}\"><span style=\"font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;background:rgba(10,110,189,0.09);color:#0A6EBD;border:1px solid rgba(10,110,189,0.2);\">✓ Goal Met<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:4px;margin-bottom:8px;\">\n              <span style=\"font-family:'Anton',sans-serif;font-size:36px;color:#0A0908;line-height:1;\">{{ waterLitres }}<\u002Fspan>\n              <span style=\"font-size:13px;color:#9E8E7A;\">/ 2.0 L<\u002Fspan>\n              <span style=\"margin-left:auto;font-size:11px;color:#9E8E7A;\">{{ waterGlasses }}/8 glasses<\u002Fspan>\n            <\u002Fdiv>\n            <!-- Glass grid -->\n            <div class=\"water-glasses\">\n              <sc-for list=\"{{ waterGlassItems }}\" as=\"g\" hint-placeholder-count=\"8\">\n                <div class=\"glass {{ g.filledClass }}\" onclick=\"{{ g.onToggle }}\" title=\"{{ g.label }}\">\n                  <div class=\"glass-fill\" style=\"height:{{ g.fillPct }}%;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;margin-top:4px;\">\n              <button class=\"water-add-btn\" onclick=\"{{ addGlass }}\">\n                <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M6 1v10M1 6h10\" stroke=\"#F0EDE6\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                Add Glass (250ml)\n              <\u002Fbutton>\n              <button style=\"padding:10px 14px;background:#F0EDE5;border:none;border-radius:10px;font-size:12px;font-weight:600;color:#9E8E7A;cursor:pointer;\" onclick=\"{{ resetWater }}\">Reset<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fdiv><!-- end sleep+water grid -->\n\n          <!-- ── BREATHING EXERCISE ── -->\n          <div style=\"background:#fff;border:1px solid #E8E2DB;border-radius:16px;padding:18px 20px;margin-bottom:20px;box-shadow:0 2px 12px rgba(10,9,8,0.06);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;\">\n              <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#9E8E7A;display:flex;align-items:center;gap:7px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#C41101;display:inline-block;\"><\u002Fspan>Breathing Exercise<\u002Fspan>\n              <sc-if value=\"{{ breathDone }}\"><span style=\"font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;background:rgba(42,122,79,0.08);color:#2A7A4F;border:1px solid rgba(42,122,79,0.2);\">✓ Session Done<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- Pattern selector -->\n            <div style=\"display:flex;gap:6px;margin-bottom:16px;\">\n              <button class=\"breath-pattern-btn {{ breath478On }}\" onclick=\"{{ setBreath478 }}\">4-7-8<\u002Fbutton>\n              <button class=\"breath-pattern-btn {{ breathBoxOn }}\" onclick=\"{{ setBreathBox }}\">Box 4×4<\u002Fbutton>\n              <button class=\"breath-pattern-btn {{ breathRelaxOn }}\" onclick=\"{{ setBreathRelax }}\">Relax 5-5<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- Visual ring -->\n            <div style=\"margin-bottom:16px;position:relative;\">\n              <div class=\"breath-ring {{ breathRingClass }}\" style=\"--dur:{{ breathPhaseDur }}s;\">\n                <div class=\"breath-ring-inner\"><\u002Fdiv>\n              <\u002Fdiv>\n              <!-- Phase label -->\n              <div style=\"text-align:center;margin-top:14px;\">\n                <p style=\"font-family:'Anton',sans-serif;font-size:22px;color:#0A0908;line-height:1;margin-bottom:4px;\">{{ breathPhaseLabel }}<\u002Fp>\n                <p style=\"font-size:13px;color:#9E8E7A;\">{{ breathCountdown }}s<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Progress dots -->\n            <div style=\"display:flex;gap:5px;justify-content:center;margin-bottom:16px;\">\n              <sc-for list=\"{{ breathCycles }}\" as=\"cyc\" hint-placeholder-count=\"4\">\n                <div style=\"width:8px;height:8px;border-radius:50%;background:{{ cyc.bg }};transition:background .3s;\"><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- Start/Stop -->\n            <sc-if value=\"{{ breathInactive }}\">\n              <button style=\"width:100%;background:#C41101;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(196,17,1,0.25);\" onclick=\"{{ startBreath }}\">Start Session →<\u002Fbutton>\n              <p style=\"text-align:center;font-size:11px;color:#9E8E7A;margin-top:8px;\">{{ breathPatternDesc }}<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ breathActive }}\">\n              <button style=\"width:100%;background:#0A0908;color:#F0EDE6;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;\" onclick=\"{{ stopBreath }}\">Stop<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- ── EXERCISE RECOMMENDATION WIDGET ── -->\n          <div style=\"background:#0A0908;border-radius:16px;padding:18px 20px;margin-bottom:20px;position:relative;overflow:hidden;\">\n            <div style=\"position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(196,17,1,0.12);pointer-events:none;\"><\u002Fdiv>\n            <span class=\"sec-label\" style=\"color:#C41101;margin-bottom:6px;\">Today's Exercise Plan<\u002Fspan>\n            <p style=\"font-family:'Anton',sans-serif;font-size:18px;color:#F0EDE6;line-height:1.15;margin-bottom:6px;\">{{ exerciseRecTitle }}<\u002Fp>\n            <p style=\"font-size:11px;color:#555;line-height:1.6;margin-bottom:14px;\">{{ exerciseRecDesc }}<\u002Fp>\n            <!-- Exercise cards -->\n            <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:14px;\">\n              <sc-for list=\"{{ exerciseRecs }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                <div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;\">\n                  <div style=\"width:40px;height:40px;border-radius:10px;background:{{ ex.iconBg }};border:1px solid {{ ex.iconBorder }};display:flex;align-item
