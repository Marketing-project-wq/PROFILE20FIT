<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pembayaran Gagal · 20FIT</title>
<style>
  :root{--red:#C41101;--bg:#0b0b0c;--card:#FFFFFF;--line:#E8E2DB;--txt:#0A0908;--muted:#8A7C68;--dark:#000;--pagetx:#EDE8DF}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--pagetx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:26px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .wrap{max-width:440px;width:100%;margin:auto}
  .logobar{background:var(--dark);border-radius:16px;padding:13px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
  .logobar img{height:34px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:32px 24px;box-shadow:0 8px 34px rgba(0,0,0,.34);color:var(--txt);text-align:center}
  .emoji{font-size:52px;line-height:1;margin:2px 0 10px}
  h1{font-size:22px;font-weight:900;margin:0 0 8px;text-transform:uppercase;letter-spacing:.4px}
  .sub{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 20px}
  button.pri{width:100%;padding:15px;border:0;border-radius:13px;background:var(--red);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  button.ghost{width:100%;padding:14px;border:1px solid var(--line);border-radius:13px;background:transparent;color:var(--txt);font-weight:700;font-size:14px;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logobar"><img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20FIT" /></div>
    <div class="card">
      <div class="emoji">❌</div>
      <h1>Pembayaran Gagal atau Dibatalkan</h1>
      <div class="sub">Pembayaranmu tidak selesai. Kredit scan tidak berubah. Kamu bisa mencoba lagi kapan saja.</div>
      <button class="pri" id="retry">Coba Lagi</button>
      <button class="ghost" id="home">Kembali ke Dashboard</button>
    </div>
  </div>
  <script>
    document.getElementById("retry").addEventListener("click", function(){ location.href = "/calories"; });
    document.getElementById("home").addEventListener("click", function(){ location.href = "/dashboard"; });
  </script>
</body>
</html>
