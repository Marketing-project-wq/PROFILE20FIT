<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" type="image/png" href="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>20FIT</title>
<style>
  /* ===== 20FIT super-app hub — brand 20FIT, light-first + dark via toggle.
     Token warna sama persis dashboard biar konsisten satu app. ===== */
  :root{
    --red:#C41101;--red-ink:#B01C2E;--red-soft:#FCEBED;
    --amber:#C87000;--amber-soft:#FDF1E2;--blue:#2F6BFF;--blue-soft:#EAF1FF;--green:#2A7A4F;--green-soft:#E6F6EE;
    --bg:#F3F2F0;--card:#FFFFFF;--ink:#15171C;--txt:#1A1714;--muted:#8A8D94;--faint:#B7B9BF;--line:#EBEBEF;--inp:#F2F2F5;
    --pagetx:#15171C;--pagemut:#8A8D94;
    --radius-lg:22px;--radius:16px;
    --shadow:0 1px 2px rgba(16,18,22,.04),0 10px 30px rgba(16,18,22,.05);
  }
  html:not(.theme-light){
    --red:#FF5062;--red-ink:#FF7181;--red-soft:#33191D;
    --amber:#F0A945;--amber-soft:#2E2213;--blue:#5C8CFF;--blue-soft:#182238;--green:#3AD98C;--green-soft:#12271C;
    --bg:#0C0D10;--card:#17191F;--ink:#F4F5F7;--txt:#F4F5F7;--muted:#8E9198;--faint:#5C5F66;--line:#25272E;--inp:#23262E;
    --pagetx:#F4F5F7;--pagemut:#8E9198;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 34px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--pagetx);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:18px 16px 40px;
    -webkit-font-smoothing:antialiased;transition:background .3s ease}
  .wrap{max-width:600px;margin:0 auto}

  /* ---- Top bar: logo + akun ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 2px 20px}
  .topbar .brand img{height:30px;width:auto;display:block}
  .acct{width:40px;height:40px;border-radius:999px;background:var(--red);color:#fff;display:grid;place-items:center;
    font-weight:800;font-size:15px;text-decoration:none;flex:0 0 auto;background-size:cover;background-position:center;
    box-shadow:0 6px 16px color-mix(in srgb,var(--red) 30%,transparent)}

  /* ---- Greeting ---- */
  .greet{margin:0 2px 22px}
  .greet .hi{font-size:14px;color:var(--muted);font-weight:650;margin:0 0 3px}
  .greet .nm{font-size:26px;font-weight:850;letter-spacing:-.02em;line-height:1.1;color:var(--pagetx);
    min-height:29px}
  .greet .sub{font-size:13.5px;color:var(--muted);font-weight:600;margin:6px 0 0}

  /* ---- Section ---- */
  .sec{font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;margin:0 2px 12px}

  /* ---- Grid layanan (gaya Gojek: icon + label) ---- */
  .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
  @media(max-width:360px){ .grid{gap:7px} }
  .svc{position:relative;min-width:0;display:flex;flex-direction:column;align-items:center;gap:9px;
    text-decoration:none;color:var(--pagetx);padding:14px 5px 12px;border-radius:var(--radius);
    background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
    transition:transform .12s ease, box-shadow .12s ease;-webkit-tap-highlight-color:transparent}
  .svc:active{transform:scale(.96)}
  .svc .ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto}
  .svc .ic svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .svc .lbl{font-size:11.5px;font-weight:750;text-align:center;line-height:1.15;letter-spacing:-.01em;max-width:100%;overflow-wrap:anywhere}
  /* Warna chip per layanan (brand-friendly, tetap 20FIT-ish) */
  .ic.workout{background:var(--red-soft);color:var(--red)}
  .ic.photo{background:var(--blue-soft);color:var(--blue)}
  .ic.event{background:var(--amber-soft);color:var(--amber)}
  .ic.booking{background:var(--green-soft);color:var(--green)}

  /* ---- Coming soon (non-aktif) ---- */
  .svc.soon{cursor:default}
  .svc.soon .ic{background:var(--inp);color:var(--faint)}
  .svc.soon .lbl{color:var(--muted)}
  .svc.soon .ic,.svc.soon .lbl{opacity:.85}
  .badge{position:absolute;top:6px;right:6px;font-size:8.5px;font-weight:800;letter-spacing:.02em;
    text-transform:uppercase;color:#fff;background:var(--muted);padding:2px 6px;border-radius:999px;line-height:1.3}

  /* ---- Toast ---- */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(90px);
    background:var(--ink);color:var(--bg);font-size:13px;font-weight:700;padding:11px 18px;border-radius:12px;
    box-shadow:0 12px 30px rgba(0,0,0,.28);opacity:0;transition:transform .25s ease,opacity .25s ease;z-index:80;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<!-- Tema mengikuti pilihan tersimpan (dibagi dgn dashboard/login) -->
<script>try{var _t=localStorage.getItem('theme')||'light';var _h=document.documentElement;_h.setAttribute('data-theme',_t);if(_t!=='dark')_h.classList.add('theme-light');}catch(e){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('theme-light');}</script>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="home.html" aria-label="20FIT"><img id="brandLogo" src="https://media.20fit.id/wp-content/uploads/2026/05/Logo-20fit.png" alt="20FIT" /></a>
      <a class="acct" id="acct" href="profile.html" title="Akun" aria-label="Akun">·</a>
    </div>

    <div class="greet">
      <p class="hi" id="hi">Selamat datang</p>
      <div class="nm" id="nm"></div>
      <p class="sub" id="sub">Mau mulai dari mana hari ini?</p>
    </div>

    <div class="sec" id="secTitle">Layanan</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/vendor-supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/meta-pixel.js"></script>
  <script>
    var $ = function(id){ return document.getElementById(id); };
    var L = window.L || function(o){ return (o && (o.id != null ? o.id : o.en)) || ""; };

    // ---- Ikon inline (stroke, currentColor) ----
    var ICON = {
      workout: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
      photo:   '<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.2"/>',
      event:   '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>',
      booking: '<path d="M2 9.5a2.5 2.5 0 0 1 0 5V17a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2.5a2.5 2.5 0 0 1 0-5V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/><line x1="14" x2="14" y1="5" y2="19"/>'
    };
    function svg(k){ return '<svg viewBox="0 0 24 24" aria-hidden="true">' + (ICON[k] || "") + '</svg>'; }

    // ---- Daftar layanan (SATU sumber; nanti tinggal isi href + soap:false utk go-live) ----
    // href: tujuan. external:true -> buka TAB BARU (my.20fit.id tetap kebuka -> gampang balik).
    // soon:true -> tampil non-aktif + badge "Segera hadir".
    var SERVICES = [
      { key:"workout", label:{ en:"Workout", id:"Workout" }, icon:"workout",
        href:"dashboard.html", external:false, soon:false },
      { key:"photo",   label:{ en:"Photo",   id:"Photo"   }, icon:"photo",
        href:"", external:true, soon:true },
      { key:"event",   label:{ en:"Event",   id:"Event"   }, icon:"event",
        href:"", external:true, soon:true },
      { key:"booking", label:{ en:"Booking", id:"Booking" }, icon:"booking",
        href:"", external:true, soon:true }
    ];

    var toastTimer = null;
    function toast(t){
      var el = $("toast"); if(!el) return;
      el.textContent = t; el.classList.add("show");
      clearTimeout(toastTimer); toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 2200);
    }

    function renderGrid(){
      var g = $("grid"); if(!g) return;
      g.innerHTML = SERVICES.map(function(s){
        var lbl = L(s.label);
        var chip = '<div class="ic ' + s.key + '">' + svg(s.icon) + '</div><div class="lbl">' + lbl + '</div>';
        if(s.soon){
          var soonTxt = L({ en:"Soon", id:"Segera" });
          return '<div class="svc soon" data-soon="1" role="button" aria-disabled="true" tabindex="0">' +
                 '<span class="badge">' + soonTxt + '</span>' + chip + '</div>';
        }
        var tgt = s.external ? ' target="_blank" rel="noopener noreferrer"' : '';
        return '<a class="svc" href="' + s.href + '"' + tgt + '>' + chip + '</a>';
      }).join("");
      // Coming soon -> feedback ringan, nggak pindah halaman.
      g.querySelectorAll('.svc.soon').forEach(function(el){
        el.addEventListener("click", function(){ toast(L({ en:"Coming soon", id:"Segera hadir" })); });
      });
    }

    function greetWord(){
      var h = new Date().getHours();
      if(h < 11) return L({ en:"Good morning", id:"Selamat pagi" });
      if(h < 15) return L({ en:"Good afternoon", id:"Selamat siang" });
      if(h < 19) return L({ en:"Good evening", id:"Selamat sore" });
      return L({ en:"Good night", id:"Selamat malam" });
    }
    function applyTexts(){
      $("hi").textContent = greetWord();
      $("sub").textContent = L({ en:"Where do you want to start today?", id:"Mau mulai dari mana hari ini?" });
      $("secTitle").textContent = L({ en:"Services", id:"Layanan" });
      renderGrid();
    }

    // ---- Logo sesuai tema (light -> logo gelap; dark -> logo putih) ----
    var LOGO_LIGHT = "https://media.20fit.id/wp-content/uploads/2026/05/Logo-20fit.png";
    var LOGO_DARK  = "https://media.20fit.id/wp-content/uploads/2026/05/Untitled-design-1.png";
    function applyLogo(){
      var light = document.documentElement.classList.contains("theme-light");
      var img = $("brandLogo"); if(!img) return;
      img.src = light ? LOGO_LIGHT : LOGO_DARK;
      img.style.height = light ? "26px" : "30px";
    }

    // ---- Boot ----
    applyTexts();
    applyLogo();
    try{ new MutationObserver(applyLogo).observe(document.documentElement, { attributes:true, attributeFilter:["class","data-theme"] }); }catch(e){}
    if(window.I18N) I18N.onChange(function(){ applyTexts(); });

    (async function init(){
      try{
        // getProfile() otomatis guard: kalau belum login -> redirect ke login.html.
        var p = await Auth.getProfile();
        var nm = (p && (p.full_name || (p.email ? p.email.split("@")[0] : ""))) || "";
        $("nm").textContent = nm || L({ en:"Member", id:"Member" });
        // Avatar / inisial di pojok kanan atas.
        var a = $("acct");
        if(a){
          a.textContent = ((nm[0] || "M")).toUpperCase();
          if(p && p.avatar_url){ a.style.backgroundImage = "url('" + p.avatar_url + "')"; a.textContent = ""; }
        }
      }catch(e){ /* requireAuth sudah menangani redirect */ }
    })();
  </script>
</body>
</html>
