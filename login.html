<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Masuk · 20fit Health Profile</title>
<style>
  :root { --green:#1db954; --dark:#0e1b13; --muted:#6b7c70; --line:#e3eae5; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#f4f8f5; color:var(--dark); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; width:100%; max-width:380px; border-radius:20px; padding:28px 24px;
          box-shadow:0 10px 40px rgba(0,0,0,.06); }
  .logo { text-align:center; font-weight:800; font-size:22px; margin-bottom:4px; }
  .logo span { color:var(--green); }
  .sub { text-align:center; color:var(--muted); font-size:13px; margin-bottom:22px; }
  .tabs { display:flex; background:#eef3ef; border-radius:12px; padding:4px; margin-bottom:18px; }
  .tabs button { flex:1; border:0; background:transparent; padding:10px; border-radius:9px; font-weight:600; color:var(--muted); cursor:pointer; }
  .tabs button.active { background:#fff; color:var(--dark); box-shadow:0 2px 6px rgba(0,0,0,.05); }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
  input { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:11px; font-size:15px; }
  input:focus { outline:none; border-color:var(--green); }
  .btn { width:100%; margin-top:20px; padding:14px; border:0; border-radius:12px; background:var(--green);
         color:#fff; font-weight:700; font-size:15px; cursor:pointer; }
  .btn:disabled { opacity:.6; cursor:default; }
  .msg { margin-top:14px; font-size:13px; text-align:center; min-height:18px; }
  .msg.err { color:#d63031; }
  .msg.ok { color:var(--green); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">20<span>fit</span></div>
    <div class="sub">Health Profile</div>

    <div class="tabs">
      <button id="tab-in" class="active" onclick="setMode('in')">Masuk</button>
      <button id="tab-up" onclick="setMode('up')">Daftar</button>
    </div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="nama@email.com" autocomplete="email" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />

    <button class="btn" id="submit" onclick="submit()">Masuk</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    let mode = "in";
    function setMode(m) {
      mode = m;
      document.getElementById("tab-in").classList.toggle("active", m === "in");
      document.getElementById("tab-up").classList.toggle("active", m === "up");
      document.getElementById("submit").textContent = m === "in" ? "Masuk" : "Daftar";
      msg("");
    }
    function msg(t, type) {
      const el = document.getElementById("msg");
      el.textContent = t || "";
      el.className = "msg" + (type ? " " + type : "");
    }
    async function submit() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) return msg("Isi email & password dulu ya.", "err");
      const btn = document.getElementById("submit");
      btn.disabled = true;
      try {
        if (mode === "up") {
          await Auth.signUp(email, password);
          // user baru -> langsung mulai OTP
          await Auth.routeAfterAuth();
        } else {
          await Auth.signIn(email, password);
          await Auth.routeAfterAuth();
        }
      } catch (e) {
        msg(terjemah(e.message), "err");
        btn.disabled = false;
      }
    }
    function terjemah(m) {
      m = (m || "").toLowerCase();
      if (m.includes("invalid login")) return "Email atau password salah.";
      if (m.includes("already registered")) return "Email sudah terdaftar. Coba Masuk.";
      if (m.includes("password")) return "Password minimal 6 karakter.";
      if (m.includes("anon")) return "Konfigurasi belum lengkap (anon key).";
      return m || "Terjadi kesalahan.";
    }
  </script>
</body>
</html>
