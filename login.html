<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Masuk · 20fit Health Profile</title>
<style>
  :root{
    --red:#e11d2a; --bg:#0a0a0a; --card:#141414; --line:#262626;
    --txt:#f5f5f5; --muted:#8a8a8a; --inp:#1c1c1c;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:20px;
    background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:48px 48px;}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:30px 26px;}
  .logo{display:flex;align-items:center;gap:2px;font-weight:900;font-size:30px;letter-spacing:-1px}
  .logo .dot{width:22px;height:22px;border-radius:50%;background:var(--red);display:inline-block;margin:0 1px}
  .tag{color:var(--muted);font-size:10px;letter-spacing:3px;margin:6px 0 22px;text-transform:uppercase}
  .tabs{display:flex;background:var(--inp);border-radius:11px;padding:4px;margin-bottom:20px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px;
    border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}
  .tabs button.active{background:var(--red);color:#fff}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  input{width:100%;padding:13px 14px;background:var(--inp);border:1px solid var(--line);
    border-radius:10px;color:var(--txt);font-size:15px}
  input::placeholder{color:#5a5a5a}
  input:focus{outline:none;border-color:var(--red)}
  .btn{width:100%;margin-top:22px;padding:14px;border:0;border-radius:11px;background:var(--red);
    color:#fff;font-weight:800;font-size:15px;cursor:pointer;letter-spacing:.3px}
  .btn:disabled{opacity:.55}
  .msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px}
  .msg.err{color:#ff6b6b}.msg.ok{color:#46d369}
  .hide{display:none}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">20<span class="dot"></span>FIT</div>
    <div class="tag">Health Profile · profile.20fit.id</div>

    <div class="tabs">
      <button id="tab-in" class="active" onclick="setMode('in')">Masuk</button>
      <button id="tab-up" onclick="setMode('up')">Daftar</button>
    </div>

    <!-- Nama & HP hanya untuk Daftar -->
    <div id="name-wrap" class="hide">
      <label>Nama Lengkap</label>
      <input id="name" type="text" placeholder="Nama kamu" autocomplete="name" />
    </div>

    <label>Email</label>
    <input id="email" type="email" placeholder="nama@email.com" autocomplete="email" />

    <div id="phone-wrap" class="hide">
      <label>Nomor HP</label>
      <input id="phone" type="tel" placeholder="+62 812 3456 7890" autocomplete="tel" />
    </div>

    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />

    <button class="btn" id="submit" onclick="submit()">Masuk</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="vendor-supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    let mode="in";
    function setMode(m){
      mode=m;
      document.getElementById("tab-in").classList.toggle("active",m==="in");
      document.getElementById("tab-up").classList.toggle("active",m==="up");
      document.getElementById("name-wrap").classList.toggle("hide",m!=="up");
      document.getElementById("phone-wrap").classList.toggle("hide",m!=="up");
      document.getElementById("submit").textContent=m==="in"?"Masuk":"Daftar";
      document.getElementById("password").autocomplete=m==="in"?"current-password":"new-password";
      msg("");
    }
    function msg(t,type){const el=document.getElementById("msg");el.textContent=t||"";el.className="msg"+(type?" "+type:"")}
    async function submit(){
      const email=document.getElementById("email").value.trim();
      const password=document.getElementById("password").value;
      const name=document.getElementById("name").value.trim();
      const phone=document.getElementById("phone").value.trim();
      if(!email||!password)return msg("Isi email & password dulu ya.","err");
      if(mode==="up"&&!name)return msg("Isi nama kamu dulu.","err");
      if(mode==="up"&&password.length<8)return msg("Password minimal 8 karakter.","err");
      const btn=document.getElementById("submit");btn.disabled=true;msg("Memproses...","");
      try{
        if(mode==="up"){
          await Auth.signUp(email,password,name,phone);
        }else{
          await Auth.signIn(email,password);
        }
        await Auth.routeAfterAuth();
      }catch(e){msg(terjemah(e.message),"err");btn.disabled=false}
    }
    function terjemah(m){
      m=(m||"").toLowerCase();
      if(m.includes("invalid login"))return "Email atau password salah.";
      if(m.includes("already registered")||m.includes("already been"))return "Email sudah terdaftar. Coba Masuk.";
      if(m.includes("password"))return "Password minimal 6 karakter.";
      if(m.includes("not configured")||m.includes("anon"))return "Server belum dikonfigurasi. Hubungi admin.";
      return m||"Terjadi kesalahan.";
    }
  </script>
</body>
</html>
