<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {"@type":"Question","name":"Is 20FIT Profile free to use?","acceptedAnswer":{"@type":"Answer","text":"Yes. Creating your health profile, tracking, and AI check-up analysis are free. Some add-ons (like extra calorie scans) are optional top-ups."}},
    {"@type":"Question","name":"I already have a 20FIT account — can I use it here?","acceptedAnswer":{"@type":"Answer","text":"Absolutely. Sign in with your existing 20FIT email and password, or tap Continue with 20FIT. Your data connects automatically."}},
    {"@type":"Question","name":"What can the AI read from my check-up?","acceptedAnswer":{"@type":"Answer","text":"Upload lab results or an MCU report and the AI highlights what needs attention, explains each parameter, and suggests diet, exercise and follow-ups. It is guidance, not a diagnosis."}},
    {"@type":"Question","name":"How does the calorie food scan work?","acceptedAnswer":{"@type":"Answer","text":"Just snap or upload a photo of your meal. Our AI estimates the calories and full macros (protein, carbs, fat and fiber), gives a health score, and suggests how to make it more balanced. You get free scans every month, with optional top-ups for more."}},
    {"@type":"Question","name":"Is my health data private?","acceptedAnswer":{"@type":"Answer","text":"Yes. Your data is stored securely and only used to power your own profile and recommendations."}},
    {"@type":"Question","name":"Do I need a gym membership to start?","acceptedAnswer":{"@type":"Answer","text":"No. Anyone can start — whether you are new to a healthy lifestyle or a long-time member. 20FIT's services are there when you are ready."}}
  ]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {"@type":"Question","name":"Apakah 20FIT Profile gratis?","acceptedAnswer":{"@type":"Answer","text":"Ya. Membuat profil kesehatan 20FIT, upload hasil medical check-up (MCU) & lab, tracking kesehatan harian, dan mendapatkan analisa berbasis AI semuanya gratis. Kamu hanya membayar untuk add-on opsional seperti scan kalori makanan AI tambahan di luar jatah gratis bulanan, tanpa perlu langganan."}},
    {"@type":"Question","name":"Aku sudah punya akun 20FIT — bisa dipakai di sini?","acceptedAnswer":{"@type":"Answer","text":"Bisa. Masuk pakai email dan password 20FIT kamu, atau klik Masuk dengan 20FIT. Membership dan data kesehatanmu otomatis terhubung, jadi profil, booking kelas, dan riwayat latihan tersimpan dalam satu tempat di ekosistem 20FIT."}},
    {"@type":"Question","name":"Apa yang bisa dibaca AI dari medical check-up?","acceptedAnswer":{"@type":"Answer","text":"Upload hasil lab atau laporan medical check-up (MCU) dari rumah sakit atau klinik mana pun (PDF, JPG, atau PNG). AI 20FIT membaca setiap parameter, menandai nilai di luar batas normal, menjelaskannya dengan bahasa sederhana, lalu memberi saran diet, olahraga, dan tindak lanjut. Ini panduan edukasi, bukan diagnosa medis."}},
    {"@type":"Question","name":"Bagaimana cara kerja scan kalori makanan pakai AI?","acceptedAnswer":{"@type":"Answer","text":"Foto makananmu atau upload gambar, dan AI 20FIT memperkirakan total kalori dan makro lengkap (protein, karbohidrat, lemak, serat), memberi health score, serta tips agar lebih seimbang. Cocok untuk masakan Indonesia dan masakan rumahan. Ada jatah scan gratis tiap bulan dengan opsi top-up."}},
    {"@type":"Question","name":"Apakah data kesehatanku aman dan privat?","acceptedAnswer":{"@type":"Answer","text":"Ya. Data kesehatanmu seperti hasil medical check-up, catatan kalori, berat badan, tidur, dan siklus disimpan dengan aman dan hanya dipakai untuk profil serta rekomendasimu sendiri. Data tidak dijual ke pihak ketiga."}},
    {"@type":"Question","name":"Perlu jadi member gym dulu untuk mulai?","acceptedAnswer":{"@type":"Answer","text":"Tidak. Siapa pun bisa mulai dengan 20FIT Profile tanpa membership — tracking kesehatan, analisa check-up, dan scan makanan bisa langsung dipakai, lalu terhubung ke layanan gym, personal training, EMS, dan physiotherapy 20FIT kapan pun kamu siap."}}
  ]
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@600;700;900&family=JetBrains+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--red:#C41101;--bg:#EDE8DF;--card:#FFFFFF;--dark:#0A0908;--txt:#0A0908;--soft:#555;--muted:#9E8E7A;--border:#E8E2DB;--inp:#F0EDE5}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:Manrope,system-ui,sans-serif}
  /* min-height <100vh di desktop: sisakan sedikit halaman berikutnya "ngintip" di bawah
     supaya user sadar masih bisa scroll ke bawah. */
  .split{display:flex;min-height:88vh}
  .hero{flex:0 0 45%;background:var(--dark);color:#F0EDE6;padding:40px 44px;display:flex;flex-direction:column;justify-content:space-between;position:relative;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:46px 46px}
  .herotop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .brand-logo{height:64px;width:auto;display:block}
  .brand-sub{font-family:"Barlow Condensed";font-weight:600;letter-spacing:3px;font-size:11px;color:var(--muted);text-transform:uppercase;margin-top:8px}
  .lang{display:flex;gap:4px;background:rgba(255,255,255,.08);border-radius:9px;padding:3px}
  .lang button{border:0;background:transparent;color:#cfc7ba;font-weight:700;font-size:12px;padding:6px 11px;border-radius:7px;cursor:pointer}
  .lang button.on{background:var(--red);color:#fff}
  .label{font-family:"Barlow Condensed";font-weight:600;letter-spacing:3px;font-size:12px;color:var(--red);text-transform:uppercase;display:flex;align-items:center;gap:10px}
  .label::before{content:"";width:32px;height:2px;background:var(--red)}
  .headline{font-family:Anton;font-size:46px;line-height:1.02;margin:14px 0 16px;letter-spacing:.5px;
    background:linear-gradient(100deg,#bdb39e 0%,#bdb39e 28%,#ffffff 44%,#ffffff 50%,#fff3cf 54%,#bdb39e 70%,#bdb39e 100%);
    background-size:300% auto;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
    animation:shine 2.8s linear infinite;will-change:background-position}
  @keyframes shine{0%{background-position:200% center}100%{background-position:-100% center}}
  .tagline{color:#bdb4a6;font-size:15px;line-height:1.6;max-width:380px}
  .feat{display:flex;align-items:center;gap:10px;color:#cfc7ba;font-size:13px;margin-top:12px}
  .feat .ic{width:30px;height:30px;border-radius:8px;background:rgba(196,17,1,.15);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:15px}
  .panel{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
  .form{width:100%;max-width:380px}
  .form h2{font-family:Anton;font-size:26px;margin:0 0 4px;letter-spacing:.5px}
  .form .h-sub{color:var(--muted);font-size:14px;margin-bottom:22px}
  .tabs{display:flex;gap:24px;border-bottom:1px solid var(--border);margin-bottom:22px}
  .tabs button{border:0;background:transparent;padding:0 0 12px;font-weight:700;font-size:15px;color:var(--muted);cursor:pointer;position:relative;font-family:Manrope}
  .tabs button.active{color:var(--txt)}
  .tabs button.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;background:var(--red);border-radius:3px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  input{width:100%;padding:13px 14px;background:var(--card);border:1px solid var(--border);border-radius:11px;font-size:15px;color:var(--txt);font-family:Manrope}
  input::placeholder{color:#b9ab98}
  input:focus{outline:none;border-color:var(--red)}
  .btn{width:100%;margin-top:22px;padding:14px;border:0;border-radius:12px;background:var(--red);color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 14px rgba(196,17,1,.25)}
  .btn:disabled{opacity:.6}
  .msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px}
  .msg.err{color:var(--red)}.msg.ok{color:#2A7A4F}
  .orsep{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:18px 0 14px}
  .orsep::before,.orsep::after{content:"";flex:1;height:1px;background:var(--border)}
  .sbtn{width:100%;margin-top:10px;padding:13px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
  .gbtn{background:#fff;border:1px solid var(--border);color:#1f1f1f}
  .gbtn:hover{background:#faf8f4}
  .gbtn svg{width:18px;height:18px}
  .mbtn{background:var(--dark);border:0;color:#fff}
  .mbtn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .fbtn{background:var(--red);border:0;color:#fff;box-shadow:0 4px 14px rgba(196,17,1,.25)}
  .fbtn img{height:16px;width:auto;filter:brightness(0) invert(1)}
  .otp{text-align:center;letter-spacing:8px;font-size:20px}
  .gender2{display:flex;gap:10px}
  .gender2 button{flex:1;padding:12px;border:1px solid var(--border);border-radius:11px;background:var(--card);color:var(--muted);font-weight:700;cursor:pointer;font-family:Manrope;font-size:14px}
  .gender2 button.active{border-color:var(--red);background:rgba(196,17,1,.08);color:var(--red)}
  .hide{display:none}
  @media(max-width:860px){
    .split{flex-direction:column}
    .hero{flex:none;padding:26px 24px}
    .brand-logo{height:50px}
    .headline{font-size:32px}
    .tagline,.feat{display:none}
    /* Carousel fitur tetap tampil di mobile (ukuran disesuaikan) */
    .caro{height:112px;margin-top:16px}
    .caro-slide .cic{width:50px;height:50px;font-size:24px;border-radius:14px}
    .caro-slide .ct{font-size:18px}
    .caro-slide .cd{font-size:14px}
    .panel{padding:26px 22px 40px}
  }
  /* ---- Hero moving carousel ---- */
  .caro{position:relative;height:140px;margin-top:12px}
  .caro-slide{position:absolute;inset:0;opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s;pointer-events:none;display:flex;gap:16px;align-items:flex-start}
  .caro-slide.on{opacity:1;transform:none;pointer-events:auto}
  .caro-slide .cic{width:60px;height:60px;border-radius:16px;background:rgba(196,17,1,.16);display:flex;align-items:center;justify-content:center;font-size:29px;flex:0 0 auto}
  .caro-slide .ct{font-weight:800;font-size:21px;color:#fff;margin-bottom:7px;line-height:1.15}
  .caro-slide .cd{color:#bdb4a6;font-size:15.5px;line-height:1.6;max-width:400px}
  .caro-dots{display:flex;gap:7px;margin-top:20px}
  .caro-dots b{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:.3s}
  .caro-dots b.on{background:var(--red);width:22px;border-radius:4px}
  /* ---- See features button ---- */
  .seebtn{width:100%;margin-top:16px;padding:12px;border-radius:12px;background:transparent;border:1px dashed var(--border);color:var(--soft);font-weight:700;font-size:13.5px;cursor:pointer;font-family:Manrope}
  .seebtn:hover{border-color:var(--red);color:var(--red)}
  /* ---- Scroll cue (petunjuk masih ada info di bawah) ---- */
  .scrollcue{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:70;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--soft);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;
    background:rgba(255,255,255,.78);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:22px;padding:8px 16px 6px;
    box-shadow:0 6px 20px rgba(10,9,8,.12);transition:opacity .4s,transform .4s}
  .scrollcue svg{width:16px;height:16px;stroke:var(--red);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;animation:cuebob 1.4s ease-in-out infinite}
  @keyframes cuebob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
  .scrollcue.gone{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(12px)}
  /* ---- Marketing scroll sections ---- */
  .mkt{max-width:1080px;margin:0 auto;padding:6px 24px 0}
  .mission{background:var(--dark);color:#F0EDE6;border-radius:22px;padding:42px 38px;margin:30px auto;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:44px 44px}
  .mission .label{margin-bottom:14px}
  .mission h2{font-family:Anton;font-size:33px;line-height:1.08;margin:0 0 14px;letter-spacing:.4px}
  .mission p{color:#bdb4a6;font-size:15.5px;line-height:1.7;max-width:700px;margin:0}
  .mission .chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
  .mission .chips span{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#e8e0d4;font-size:13px;font-weight:600;padding:8px 14px;border-radius:20px}
  .mkt-h{text-align:center;margin:46px 0 6px}
  .mkt-h .label{justify-content:center}
  .mkt-h h2{font-family:Anton;font-size:30px;margin:12px 0 6px;letter-spacing:.4px}
  .mkt-h p{color:var(--muted);font-size:15px;max-width:580px;margin:0 auto;line-height:1.6}
  .fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:26px 0}
  .fcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px}
  .fcard .fic{width:46px;height:46px;border-radius:12px;background:rgba(196,17,1,.10);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
  .fcard h3{font-size:16px;font-weight:800;margin:0 0 6px}
  .fcard p{color:var(--soft);font-size:13.5px;line-height:1.6;margin:0}
  /* FAQ */
  .faq{max-width:760px;margin:22px auto 0}
  .faq-item{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .faq-q{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;font-weight:700;font-size:14.5px}
  .faq-q .pl{color:var(--red);font-size:22px;line-height:1;flex:0 0 auto;transition:transform .3s}
  .faq-item.open .faq-q .pl{transform:rotate(45deg)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .faq-a .inner{padding:0 18px 16px;color:var(--soft);font-size:13.5px;line-height:1.65}
  /* Footer */
  .foot{background:var(--dark);color:#cfc7ba;margin-top:54px;padding:46px 24px 30px}
  .foot-in{max-width:1080px;margin:0 auto;display:flex;flex-wrap:wrap;gap:30px 50px;justify-content:space-between}
  .foot .flogo{height:40px;margin-bottom:14px}
  .foot .fabout{max-width:330px;font-size:13.5px;line-height:1.7;color:#a99f90}
  .foot .fcol h4{color:#fff;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin:0 0 12px;font-family:"Barlow Condensed";font-weight:700}
  .foot .fcol a{display:block;color:#bdb4a6;text-decoration:none;font-size:13.5px;margin-bottom:9px}
  .foot .fcol a:hover{color:#fff}
  .foot-bot{max-width:1080px;margin:28px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.09);font-size:12.5px;color:#8a8073;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  @media(max-width:860px){
    .fgrid{grid-template-columns:1fr}
    .mission{padding:30px 22px}.mission h2{font-size:26px}
    .mkt-h h2{font-size:25px}
    .foot-in{gap:26px}
  }
</style>

<body>
  <div class="split">
    <div class="hero">
      <div class="herotop">
        <div>
          <img class="brand-logo" src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20FIT" />
          <div class="brand-sub">Health Profile · my.20fit.id</div>
        </div>
        <div class="lang">
          <button id="lang-en" onclick="setLang('en')">EN</button>
          <button id="lang-id" onclick="setLang('id')">ID</button>
        </div>
      </div>
      <div>
        <div class="label" data-k="dhp">Digital Health Platform</div>
        <div class="headline">ALL YOUR HEALTH NEEDS, ONE PLACE.</div>
        <div class="tagline" data-k="tag"></div>
      </div>
      <div>
        <div class="caro" id="caro"></div>
        <div class="caro-dots" id="caroDots"></div>
      </div>
    </div>

    <div class="panel">
      <div class="form">
        <h2 id="title">Welcome</h2>
        <div class="h-sub" id="sub" data-k="sub"></div>

        <div class="tabs">
          <button id="tab-in" class="active" onclick="setMode('in')"></button>
          <button id="tab-up" onclick="setMode('up')"></button>
        </div>

        <form id="authform" autocomplete="on" onsubmit="event.preventDefault();doLogin();return false;">
        <div id="name-wrap" class="hide">
          <label data-k="name"></label>
          <input id="name" name="name" type="text" autocomplete="name" />
        </div>

        <label data-k="email">Email</label>
        <input id="email" name="username" type="email" placeholder="name@email.com" autocomplete="username" />

        <div id="phone-wrap" class="hide">
          <label data-k="phone"></label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" />
        </div>

        <div id="gender-wrap" class="hide">
          <label data-k="gender">Gender</label>
          <div class="gender2">
            <button type="button" id="g-male" onclick="pickGender('male')" data-k="male">Male</button>
            <button type="button" id="g-female" onclick="pickGender('female')" data-k="female">Female</button>
          </div>
        </div>
        <div id="dob-wrap" class="hide">
          <label data-k="dob">Date of Birth</label>
          <input id="birthdate" type="date" />
        </div>

        <label data-k="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" />

        <div id="confirm-wrap" class="hide">
          <label data-k="confirm">Confirm Password</label>
          <input id="confirm" name="confirm" type="password" placeholder="••••••••" autocomplete="new-password" />
        </div>

        <button class="btn" id="submit" type="submit"></button>
        </form>
        <div style="text-align:center;margin-top:14px;font-size:13px"><a id="forgot" href="reset-password.html" style="color:var(--red);text-decoration:none;font-weight:600"></a></div>

        <div class="orsep"><span data-k="orsep">or</span></div>
        <button class="sbtn mbtn" id="btn20fit" type="button" onclick="loginWith20fit()">
          <img src="https://media.20fit.id/wp-content/uploads/2026/05/Copy-of-new-logo-20fit-putih-3.png" alt="20FIT" style="height:16px;width:auto" />
          <span data-k="with20fit">Continue with 20FIT</span>
        </button>
        <div class="msg" id="msg"></div>
        <button type="button" class="seebtn" data-k="seeFeatures" onclick="document.getElementById('features').scrollIntoView({behavior:'smooth'})"></button>
      </div>
    </div>
  </div>

  <!-- Petunjuk scroll -->

      {en:{q:"Is 20FIT Profile free to use?",           a:"Yes. Creating your 20FIT health profile, uploading medical check-up (MCU) and lab results, tracking your daily health, and getting AI-powered analysis are all completely free. You only pay for optional add-ons — such as extra AI calorie food scans beyond your free monthly quota — and there is no subscription required to start understanding your health."},
       id:{q:"Apakah 20FIT Profile gratis?",            a:"Ya. Membuat profil kesehatan 20FIT, upload hasil medical check-up (MCU) & lab, tracking kesehatan harian, dan mendapatkan analisa berbasis AI semuanya sepenuhnya gratis. Kamu hanya membayar untuk add-on opsional — seperti scan kalori makanan AI tambahan di luar jatah gratis bulanan — dan tidak perlu langganan untuk mulai memahami kondisi kesehatanmu."}},

      {en:{q:"Is my health data private and secure?",              a:"Yes. Your health data — medical check-up results, calorie logs, weight, sleep, and cycle information — is stored securely and used only to power your own profile, insights, and recommendations. It is never sold to third parties, and you stay in full control of the information you choose to upload."},

    let caroIdx=0, caroTimer=null;
    function renderMarketing(){
      const pick=o=>o[lang]||o.en;
      const caro=document.getElementById("caro");
      if(caro) caro.innerHTML=FEATURES.map((f,i)=>'<div class="caro-slide'+(i===0?' on':'')+'" data-i="'+i+'"><div class="cic">'+f.ic+'</div><div><div class="ct">'+pick(f).t+'</div><div class="cd">'+pick(f).d+'</div></div></div>').join("");
      const dots=document.getElementById("caroDots");
      if(dots) dots.innerHTML=FEATURES.map((f,i)=>'<b'+(i===0?' class="on"':'')+' data-i="'+i+'" onclick="caroUser('+i+')"></b>').join("");
      caroIdx=0;
      const g=document.getElementById("fgrid");
      if(g) g.innerHTML=FEATURES.map(f=>'<div class="fcard"><div class="fic">'+f.ic+'</div><h3>'+pick(f).t+'</h3><p>'+pick(f).d+'</p></div>').join("");
      const fq=document.getElementById("faq");
      if(fq) fq.innerHTML=FAQS.map((f,i)=>'<div class="faq-item" id="faqi'+i+'"><div class="faq-q" onclick="toggleFaq('+i+')">'+pick(f).q+'<span class="pl">+</span></div><div class="faq-a"><div class="inner">'+pick(f).a+'</div></div></div>').join("");
      bindCaro();
    }
    function caroGo(i){
      if(!FEATURES.length) return;
      caroIdx=(i+FEATURES.length)%FEATURES.length;
      document.querySelectorAll(".caro-slide").forEach(s=>s.classList.toggle("on",+s.dataset.i===caroIdx));
      document.querySelectorAll(".caro-dots b").forEach(b=>b.classList.toggle("on",+b.dataset.i===caroIdx));
    }
    function startCaro(){ if(caroTimer)clearInterval(caroTimer); caroTimer=setInterval(()=>caroGo(caroIdx+1),3800); }
    // Navigasi manual oleh user (klik dot / klik slide / swipe) -> pindah + reset timer auto.
    function caroUser(i){ caroGo(i); startCaro(); }
    function bindCaro(){
      const c=document.getElementById("caro"); if(!c||c.dataset.bound)return; c.dataset.bound="1";
      c.style.cursor="pointer"; c.style.touchAction="pan-y";
      let x0=null;
      c.addEventListener("pointerdown",e=>{ x0=e.clientX; });
      c.addEventListener("pointerup",e=>{
        if(x0==null)return; const dx=e.clientX-x0; x0=null;
        if(Math.abs(dx)>40){ caroUser(caroIdx+(dx<0?1:-1)); }  // swipe kiri/kanan
        else { caroUser(caroIdx+1); }                          // klik biasa -> berikutnya
      });
      c.addEventListener("pointercancel",()=>{ x0=null; });
    }
    function toggleFaq(i){
      const el=document.getElementById("faqi"+i); if(!el) return;
      const open=el.classList.contains("open");
      el.classList.toggle("open",!open);
      const a=el.querySelector(".faq-a");
      a.style.maxHeight=open?"0":(a.querySelector(".inner").scrollHeight+20)+"px";
    }

      refreshMode();
    }
    function refreshMode(){
      const d=T[lang];
      document.getElementById("tab-in").textContent=d.tabIn;
      document.getElementById("tab-up").textContent=d.tabUp;
      document.getElementById("submit").textContent=mode==="in"?d.btnIn:d.btnUp;
      document.getElementById("title").textContent=mode==="in"?d.titleIn:d.titleUp;
    }
    function setMode(m){
      mode=m;
      document.getElementById("tab-in").classList.toggle("active",m==="in");
      document.getElementById("tab-up").classList.toggle("active",m==="up");
      document.getElementById("name-wrap").classList.toggle("hide",m!=="up");
      document.getElementById("phone-wrap").classList.toggle("hide",m!=="up");
      document.getElementById("gender-wrap").classList.toggle("hide",m!=="up");
      document.getElementById("dob-wrap").classList.toggle("hide",m!=="up");
      document.getElementById("confirm-wrap").classList.toggle("hide",m!=="up");
      document.getElementById("password").autocomplete=m==="in"?"current-password":"new-password";
      msg("");
      refreshMode();
    }
    function msg(t,type){const el=document.getElementById("msg");el.textContent=t||"";el.className="msg"+(type?" "+type:"")}

    // Simpan email+password ke password manager browser (sinkron antar device)
    function saveCredential(id,password){
      try{
        if(window.PasswordCredential && navigator.credentials){
          const c=new window.PasswordCredential({id:id,password:password,name:id});
          navigator.credentials.store(c).catch(function(){});
        }
      }catch(e){}
    }
    async function doLogin(){
      const d=T[lang];
      const email=document.getElementById("email").value.trim();
      const password=document.getElementById("password").value;
      const name=document.getElementById("name").value.trim();
      const phone=document.getElementById("phone").value.trim();
      const birthdate=document.getElementById("birthdate").value;
      if(!email||!password)return msg(d.errFill,"err");
      if(mode==="up"&&!name)return msg(d.errName,"err");
      if(mode==="up"&&!gender)return msg(d.errGender,"err");
      if(mode==="up"&&!birthdate)return msg(d.errDob,"err");
      if(mode==="up"&&password.length<8)return msg(d.errPw,"err");
      if(mode==="up"&&password!==document.getElementById("confirm").value)return msg(d.errMatch,"err");
      const btn=document.getElementById("submit");btn.disabled=true;msg(d.processing,"");
      try{
        if(mode==="up"){
          // REGISTER lewat API 20FIT (developer). Data gender + tgl lahir ikut terkirim.
          await Auth.fitcoRegister({name:name,email:email,password:password,phone:phone,gender:gender,date_of_birth:birthdate});
        }
        else{
          // SIGN IN biasa (tombol MERAH): pakai akun web/Supabase.
          // Login pakai akun 20FIT ada di tombol HITAM (loginWith20fit).
          await Auth.signIn(email,password);
        }
        saveCredential(email,password);
        await Auth.routeAfterAuth();
      }catch(e){msg(terjemah(e.message),"err");btn.disabled=false}
    }
    function terjemah(m){
      const d=T[lang]; m=(m||"").toLowerCase();
      if(m.includes("invalid login"))return d.errCred;
      if(m.includes("already registered")||m.includes("already been")||m.includes("sudah terdaftar"))return d.errExists;
      if(m.includes("20FIT")&&(m.includes("salah")||m.includes("wrong")))return d.errCred;
      if(m.includes("menghubungi server 20FIT")||m.includes("contact"))return lang==="en"?"Couldn't reach 20FIT. Try again.":"Tidak bisa menghubungi 20FIT. Coba lagi.";
      if(m.includes("password minimal")||(m.includes("password")&&m.includes("8")))return d.errPw;
      if(m.includes("password"))return d.errCred;
      if(m.includes("dikonfigurasi")||m.includes("service key"))return lang==="en"?"Use “Email me a login code” below to sign in.":"Pakai “Kirim kode login ke email” di bawah untuk masuk.";
      if(m.includes("supabaseurl")||m.includes("not configured")||m.includes("anon"))return lang==="en"?"Server not ready. Refresh in a moment.":"Server belum siap. Coba refresh.";
      if(m.includes("fetch")||m.includes("network"))return lang==="en"?"Connection failed. Try again.":"Koneksi gagal. Coba lagi.";
      return "Error: "+(m||"unknown");
    }

    // ---- Tombol HITAM "Masuk dengan 20FIT" ----
    // Login LANGSUNG pakai akun 20FIT: email+password dari form -> API FITCO
    // (Auth.fitcoLogin). Bukan SSO redirect.
    async function loginWith20fit(){
      const d=T[lang];
      const email=document.getElementById("email").value.trim();
      const password=document.getElementById("password").value;
      if(!email||!password)return msg(d.errFill,"err");
      const b=document.getElementById("btn20fit"); if(b)b.disabled=true;
      msg(lang==="en"?"Signing in with 20FIT…":"Masuk dengan akun 20FIT…","");
      try{
        await Auth.fitcoLogin(email,password);
        saveCredential(email,password);
        await Auth.routeAfterAuth();
      }catch(e){ msg(terjemah(e.message),"err"); if(b)b.disabled=false; }
    }

    // Prefill email & password dari password manager browser (kalau ada)
    async function tryAutofill(){
      try{
        if(navigator.credentials && window.PasswordCredential){
          const cred=await navigator.credentials.get({password:true, mediation:"optional"});
          if(cred){
            if(cred.id) document.getElementById("email").value=cred.id;
            if(cred.password) document.getElementById("password").value=cred.password;
          }
        }
      }catch(e){}
    }

    // SSO SEAMLESS: kalau app utama 20FIT mengoper access_token lewat URL
    //   my.20fit.id/login.html?token=XXX  (atau ?access_token=  / #token= )
    // -> langsung buat sesi TANPA user ketik apa pun.
    async function tryTokenSSO(){
      try{
        const q=new URLSearchParams(location.search);
        let tok=q.get("token")||q.get("access_token")||q.get("fittoken")||q.get("fitco_token");
        if(!tok && location.hash){ const h=new URLSearchParams(location.hash.replace(/^#/,"")); tok=h.get("token")||h.get("access_token"); }
        if(!tok) return false;
        // Bersihkan token dari URL supaya tidak ke-share / ke-log.
        try{ history.replaceState(null,"",location.pathname); }catch(e){}
        msg(lang==="en"?"Signing you in…":"Menyiapkan sesi kamu…","ok");
        await Auth.tokenLogin(tok);
        await Auth.routeAfterAuth();
        return true;
      }catch(e){
        msg(lang==="en"?"Auto sign-in failed — please sign in below.":"Masuk otomatis gagal — silakan masuk di bawah.","err");
        return false;
      }
    }

    // Auto-enter hanya kalau user sudah SIAP PENUH. Selain itu -> tampilkan pilihan login/sign up dulu.
    (async function(){
      try{
        await Auth.ready;
        // 0) Token SSO dari app utama -> langsung masuk.
        if(await tryTokenSSO()) return;
        // Route HANYA saat user AKTIF login / balik dari Google (evt SIGNED_IN), bukan saat sesi lama kebaca.
        Auth.supabase.auth.onAuthStateChange((evt,sess)=>{ if(evt==="SIGNED_IN" && sess && sess.user){ Auth.routeAfterAuth(); } });
        // Ada sesi -> arahkan sesuai flow (data dulu -> password -> dashboard).
        const u=await Auth.getUser();
        if(u){ try{ await Auth.routeAfterAuth(); return; }catch(e){} }
        tryAutofill();
      }catch(e){}
    })();
    applyLang();
    startCaro();   // jalankan carousel fitur yang bergerak
    // Sembunyikan tanda scroll setelah user mulai scroll
    window.addEventListener("scroll",function(){
      var c=document.getElementById("scrollcue"); if(c) c.classList.toggle("gone", window.scrollY>60);
    },{passive:true});
    // Prefill dari URL (mis. dari halaman kode saat email belum terdaftar -> dorong Buat Akun)
    (function(){
      try{
        const q=new URLSearchParams(location.search);
        const em=q.get("email"); if(em) document.getElementById("email").value=em;
        if(q.get("mode")==="up"){ setMode("up"); if(em) msg(lang==="en"?"This email has no account yet — create one below.":"Email ini belum punya akun — buat akunnya di bawah ya.","err"); }
      }catch(e){}
    })();
  </script>
</body>
</html>
